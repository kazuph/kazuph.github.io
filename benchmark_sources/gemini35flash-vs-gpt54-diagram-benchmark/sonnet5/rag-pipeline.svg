<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feOffset in="blur" dx="0" dy="3" result="offBlur"/>
      <feComponentTransfer in="offBlur" result="shadow"><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#d97706"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="900" fill="url(#bgGrad)"/>
  <rect x="12" y="12" width="1176" height="876" rx="22" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <!-- title -->
  <text x="600" y="40" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#0f172a" text-anchor="middle">RAG Pipeline Architecture</text>
  <text x="600" y="62" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Retrieval-Augmented Generation — Offline Indexing &amp; Online Inference</text>

  <!-- ===================== OFFLINE LANE ===================== -->
  <text x="60" y="98" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#92400e">OFFLINE — Document Ingestion（事前処理・バッチ）</text>
  <rect x="40" y="108" width="1120" height="222" rx="20" fill="#fffbeb" stroke="#f59e0b" stroke-width="2" stroke-dasharray="10,6"/>

  <!-- Documents box -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="60" y="152" width="240" height="118" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5" filter="url(#softShadow)"/>
    <rect x="76" y="255" width="208" height="4" rx="2" fill="#f59e0b" opacity="0.55"/>
    <circle cx="280" cy="170" r="13" fill="#d97706"/>
    <text x="280" y="174.5" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <g transform="translate(78,168)">
      <rect x="0" y="0" width="20" height="26" rx="2" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
      <line x1="4" y1="8" x2="16" y2="8" stroke="#d97706" stroke-width="1.6"/>
      <line x1="4" y1="13" x2="16" y2="13" stroke="#d97706" stroke-width="1.6"/>
      <line x1="4" y1="18" x2="12" y2="18" stroke="#d97706" stroke-width="1.6"/>
    </g>
    <text x="180" y="222" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Documents</text>
    <text x="180" y="242" font-size="11" fill="#64748b" text-anchor="middle">PDF · HTML · Wiki · DB dumps</text>
  </g>

  <!-- Chunking box -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="480" y="152" width="240" height="118" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5" filter="url(#softShadow)"/>
    <rect x="496" y="255" width="208" height="4" rx="2" fill="#f59e0b" opacity="0.55"/>
    <circle cx="700" cy="170" r="13" fill="#d97706"/>
    <text x="700" y="174.5" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <g transform="translate(498,174)">
      <rect x="0" y="6" width="8" height="16" rx="2" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
      <rect x="12" y="6" width="8" height="16" rx="2" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
      <rect x="24" y="6" width="8" height="16" rx="2" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    </g>
    <text x="600" y="222" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Chunking</text>
    <text x="600" y="242" font-size="11" fill="#64748b" text-anchor="middle">Split into overlapping passages</text>
  </g>

  <!-- Embedding Model box -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="900" y="152" width="240" height="118" rx="14" fill="#ffffff" stroke="#f59e0b" stroke-width="2.5" filter="url(#softShadow)"/>
    <rect x="916" y="255" width="208" height="4" rx="2" fill="#f59e0b" opacity="0.55"/>
    <circle cx="1120" cy="170" r="13" fill="#d97706"/>
    <text x="1120" y="174.5" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <g transform="translate(918,168)">
      <line x1="4" y1="20" x2="14" y2="4" stroke="#d97706" stroke-width="1.6"/>
      <line x1="14" y1="4" x2="24" y2="20" stroke="#d97706" stroke-width="1.6"/>
      <line x1="4" y1="20" x2="24" y2="20" stroke="#d97706" stroke-width="1.6"/>
      <circle cx="4" cy="20" r="3.4" fill="#ffffff" stroke="#d97706" stroke-width="1.8"/>
      <circle cx="14" cy="4" r="3.4" fill="#ffffff" stroke="#d97706" stroke-width="1.8"/>
      <circle cx="24" cy="20" r="3.4" fill="#ffffff" stroke="#d97706" stroke-width="1.8"/>
    </g>
    <text x="1020" y="222" font-size="15" font-weight="700" fill="#0f172a" text-anchor="middle">Embedding Model</text>
    <text x="1020" y="242" font-size="11" fill="#64748b" text-anchor="middle">Text → dense vector</text>
  </g>

  <!-- offline horizontal arrows -->
  <line x1="300" y1="211" x2="476" y2="211" stroke="#d97706" stroke-width="2.4" marker-end="url(#arrowAmber)"/>
  <rect x="345" y="191" width="90" height="17" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="390" y="203.5" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#92400e" text-anchor="middle">raw documents</text>

  <line x1="724" y1="211" x2="896" y2="211" stroke="#d97706" stroke-width="2.4" marker-end="url(#arrowAmber)"/>
  <rect x="765" y="191" width="90" height="17" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="810" y="203.5" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#92400e" text-anchor="middle">text chunks</text>

  <!-- elbow arrow: Embedding Model -> Vector DB -->
  <path d="M1020,270 L1020,306 L650,306 L650,328" fill="none" stroke="#d97706" stroke-width="2.4" marker-end="url(#arrowAmber)"/>
  <rect x="762" y="288" width="184" height="17" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="854" y="300.5" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#92400e" text-anchor="middle">upsert / index vectors</text>

  <!-- ===================== VECTOR DB (shared) ===================== -->
  <g font-family="Arial, Helvetica, sans-serif" filter="url(#softShadow)">
    <path d="M485,345 L485,430 A115,20 0 0 0 715,430 L715,345 Z" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
    <ellipse cx="600" cy="345" rx="115" ry="20" fill="#ede9fe" stroke="#7c3aed" stroke-width="2.5"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="600" y="396" font-size="16" font-weight="700" fill="#4c1d95" text-anchor="middle">Vector Database</text>
    <text x="600" y="414" font-size="10.5" fill="#6d28d9" text-anchor="middle">embeddings + metadata index</text>
  </g>

  <!-- ===================== ONLINE LANE ===================== -->
  <text x="60" y="483" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1e3a8a">ONLINE — Query Answering（推論時・リアルタイム）</text>
  <rect x="40" y="493" width="1120" height="372" rx="20" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>

  <!-- User Query box -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="60" y="560" width="180" height="118" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" filter="url(#softShadow)"/>
    <rect x="76" y="666" width="148" height="4" rx="2" fill="#3b82f6" opacity="0.55"/>
    <circle cx="220" cy="578" r="13" fill="#2563eb"/>
    <text x="220" y="582.5" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
    <g transform="translate(78,576)">
      <circle cx="10" cy="7" r="6" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <path d="M0,26 C0,17 20,17 20,26" fill="none" stroke="#2563eb" stroke-width="2"/>
    </g>
    <text x="150" y="632" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">User Query</text>
    <text x="150" y="652" font-size="10.5" fill="#64748b" text-anchor="middle">Natural-language question</text>
  </g>

  <!-- Embed / Retrieve box -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="285" y="560" width="180" height="118" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" filter="url(#softShadow)"/>
    <rect x="301" y="666" width="148" height="4" rx="2" fill="#3b82f6" opacity="0.55"/>
    <circle cx="445" cy="578" r="13" fill="#2563eb"/>
    <text x="445" y="582.5" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
    <g transform="translate(303,576)">
      <circle cx="9" cy="9" r="7" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <line x1="14.5" y1="14.5" x2="22" y2="22" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round"/>
    </g>
    <text x="375" y="632" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Embed / Retrieve</text>
    <text x="375" y="652" font-size="10.5" fill="#64748b" text-anchor="middle">Query → vector → search</text>
  </g>

  <!-- Retrieved Context box -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="510" y="560" width="180" height="118" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" filter="url(#softShadow)"/>
    <rect x="526" y="666" width="148" height="4" rx="2" fill="#3b82f6" opacity="0.55"/>
    <circle cx="670" cy="578" r="13" fill="#2563eb"/>
    <text x="670" y="582.5" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
    <g transform="translate(528,578)">
      <rect x="0" y="4" width="22" height="6" rx="1.5" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
      <rect x="0" y="12" width="22" height="6" rx="1.5" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
      <rect x="0" y="20" width="16" height="6" rx="1.5" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
    </g>
    <text x="600" y="632" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Retrieved Context</text>
    <text x="600" y="652" font-size="10.5" fill="#64748b" text-anchor="middle">Top-k relevant chunks</text>
  </g>

  <!-- LLM box -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="735" y="560" width="180" height="118" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" filter="url(#softShadow)"/>
    <rect x="751" y="666" width="148" height="4" rx="2" fill="#3b82f6" opacity="0.55"/>
    <circle cx="895" cy="578" r="13" fill="#2563eb"/>
    <text x="895" y="582.5" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
    <g transform="translate(753,574)">
      <rect x="4" y="4" width="18" height="18" rx="3" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
      <line x1="0" y1="9" x2="4" y2="9" stroke="#2563eb" stroke-width="2"/>
      <line x1="0" y1="17" x2="4" y2="17" stroke="#2563eb" stroke-width="2"/>
      <line x1="22" y1="9" x2="26" y2="9" stroke="#2563eb" stroke-width="2"/>
      <line x1="22" y1="17" x2="26" y2="17" stroke="#2563eb" stroke-width="2"/>
      <line x1="9" y1="0" x2="9" y2="4" stroke="#2563eb" stroke-width="2"/>
      <line x1="17" y1="0" x2="17" y2="4" stroke="#2563eb" stroke-width="2"/>
      <line x1="9" y1="22" x2="9" y2="26" stroke="#2563eb" stroke-width="2"/>
      <line x1="17" y1="22" x2="17" y2="26" stroke="#2563eb" stroke-width="2"/>
    </g>
    <text x="825" y="632" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">LLM</text>
    <text x="825" y="652" font-size="10.5" fill="#64748b" text-anchor="middle">Generates grounded answer</text>
  </g>

  <!-- Answer box -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="960" y="560" width="180" height="118" rx="14" fill="#ffffff" stroke="#3b82f6" stroke-width="2.5" filter="url(#softShadow)"/>
    <rect x="976" y="666" width="148" height="4" rx="2" fill="#3b82f6" opacity="0.55"/>
    <circle cx="1120" cy="578" r="13" fill="#2563eb"/>
    <text x="1120" y="582.5" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
    <g transform="translate(978,576)">
      <path d="M0,2 h22 a3,3 0 0 1 3,3 v10 a3,3 0 0 1 -3,3 h-13 l-6,5 v-5 h-3 a3,3 0 0 1 -3,-3 v-10 a3,3 0 0 1 3,-3 z" fill="#ffffff" stroke="#2563eb" stroke-width="1.8"/>
      <path d="M6,10 l4,4 l9,-9" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="1050" y="632" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">Answer</text>
    <text x="1050" y="652" font-size="10.5" fill="#64748b" text-anchor="middle">Final response to user</text>
  </g>

  <!-- online horizontal arrows -->
  <line x1="240" y1="619" x2="281" y2="619" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
  <line x1="690" y1="619" x2="731" y2="619" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
  <rect x="655" y="601" width="110" height="16" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="710" y="613" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1e3a8a" text-anchor="middle">context passage</text>
  <line x1="915" y1="619" x2="956" y2="619" stroke="#2563eb" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
  <rect x="882" y="601" width="106" height="16" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="935" y="613" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#1e3a8a" text-anchor="middle">generated text</text>

  <!-- purple: Vector DB interactions -->
  <line x1="365" y1="560" x2="486" y2="360" stroke="#7c3aed" stroke-width="2.2" stroke-dasharray="6,4" marker-end="url(#arrowPurple)"/>
  <line x1="486" y1="414" x2="386" y2="560" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
  <line x1="600" y1="450" x2="600" y2="558" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowPurple)"/>

  <rect x="244" y="500" width="212" height="17" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="350" y="512.5" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#4c1d95" text-anchor="middle">① embed query → vector</text>
  <rect x="244" y="524" width="196" height="17" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="342" y="536.5" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#4c1d95" text-anchor="middle">② ANN / cosine search</text>
  <rect x="610" y="514" width="118" height="17" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="669" y="526.5" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#4c1d95" text-anchor="middle">③ top-k chunks</text>

  <!-- gray: original query passthrough to LLM -->
  <path d="M150,678 C150,772 825,772 825,678" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,5" marker-end="url(#arrowGray)"/>
  <rect x="380" y="750" width="215" height="18" rx="3" fill="#ffffff" fill-opacity="0.9"/>
  <text x="487" y="763" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#334155" text-anchor="middle">original query (prompt = query + context)</text>

  <!-- delivered to user -->
  <line x1="1140" y1="619" x2="1158" y2="619" stroke="#2563eb" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <circle cx="1170" cy="613" r="5" fill="#ffffff" stroke="#2563eb" stroke-width="1.6"/>
  <path d="M1162,628 C1162,621 1178,621 1178,628" fill="none" stroke="#2563eb" stroke-width="1.6"/>
  <text x="1170" y="642" font-family="Arial, Helvetica, sans-serif" font-size="8.5" fill="#475569" text-anchor="middle">user</text>

  <!-- legend -->
  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="60" y="872" width="26" height="12" rx="2" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="94" y="882" font-size="11.5" fill="#334155">Offline batch — periodic document indexing</text>
    <rect x="430" y="872" width="26" height="12" rx="2" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="464" y="882" font-size="11.5" fill="#334155">Online real-time — per user request</text>
    <line x1="760" y1="878" x2="796" y2="878" stroke="#7c3aed" stroke-width="2.5" marker-end="url(#arrowPurple)"/>
    <text x="804" y="882" font-size="11.5" fill="#334155">Vector DB read / write path</text>
  </g>
</svg>
