<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#32323C"/>
    </marker>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF"/>
  <text x="600" y="70" text-anchor="middle" font-size="30" font-weight="bold" fill="#28323C">Kalman filter block diagram</text>

  <!-- Prediction block -->
  <rect x="90" y="330" width="270" height="150" rx="12" fill="#D7E3F5" stroke="#5082C8" stroke-width="3"/>
  <text x="225" y="368" text-anchor="middle" font-size="21" font-weight="bold">Prediction</text>
  <text x="225" y="408" text-anchor="middle" font-size="16" font-style="italic">x&#x302;ₖ|ₖ₋₁ = F x&#x302;ₖ₋₁ + B uₖ</text>
  <text x="225" y="442" text-anchor="middle" font-size="16" font-style="italic">Pₖ|ₖ₋₁ = F Pₖ₋₁ Fᵀ + Q</text>

  <!-- Measurement block -->
  <rect x="520" y="130" width="250" height="100" rx="12" fill="#FAE8D2" stroke="#E69646" stroke-width="3"/>
  <text x="645" y="170" text-anchor="middle" font-size="21" font-weight="bold">Measurement</text>
  <text x="645" y="205" text-anchor="middle" font-size="16" font-style="italic">sensor output zₖ</text>

  <!-- Kalman gain block -->
  <rect x="510" y="600" width="270" height="110" rx="12" fill="#EFDFEF" stroke="#B46EB4" stroke-width="3"/>
  <text x="645" y="640" text-anchor="middle" font-size="21" font-weight="bold">Kalman gain</text>
  <text x="645" y="678" text-anchor="middle" font-size="16" font-style="italic">Kₖ = Pₖ|ₖ₋₁ Hᵀ Sₖ⁻¹</text>

  <!-- Update block -->
  <rect x="840" y="330" width="290" height="150" rx="12" fill="#DCEEE1" stroke="#5AAA6E" stroke-width="3"/>
  <text x="985" y="368" text-anchor="middle" font-size="21" font-weight="bold">Update</text>
  <text x="985" y="408" text-anchor="middle" font-size="16" font-style="italic">x&#x302;ₖ = x&#x302;ₖ|ₖ₋₁ + Kₖ yₖ</text>
  <text x="985" y="442" text-anchor="middle" font-size="16" font-style="italic">Pₖ = (I − Kₖ H) Pₖ|ₖ₋₁</text>

  <!-- H block -->
  <rect x="420" y="375" width="64" height="60" rx="8" fill="#EBEBEE" stroke="#6E6E78" stroke-width="2.5"/>
  <text x="452" y="412" text-anchor="middle" font-size="19" font-style="italic">H</text>

  <!-- delay block -->
  <rect x="370" y="770" width="76" height="58" rx="8" fill="#EBEBEE" stroke="#6E6E78" stroke-width="2.5"/>
  <text x="408" y="806" text-anchor="middle" font-size="18" font-style="italic">z⁻¹</text>

  <!-- residual sum junction -->
  <circle cx="645" cy="405" r="24" fill="#FFFFFF" stroke="#1A1A22" stroke-width="3"/>
  <text x="645" y="412" text-anchor="middle" font-size="20">+</text>
  <text x="608" y="448" text-anchor="middle" font-size="18">−</text>

  <!-- arrows -->
  <g stroke="#32323C" stroke-width="3" fill="none">
    <!-- input -->
    <line x1="15" y1="405" x2="84" y2="405" marker-end="url(#arr)"/>
    <!-- prediction -> H -> sum -->
    <line x1="360" y1="405" x2="414" y2="405" marker-end="url(#arr)"/>
    <line x1="484" y1="405" x2="615" y2="405" marker-end="url(#arr)"/>
    <!-- measurement -> sum -->
    <line x1="645" y1="230" x2="645" y2="375" marker-end="url(#arr)"/>
    <!-- sum -> update -->
    <line x1="669" y1="405" x2="834" y2="405" marker-end="url(#arr)"/>
    <!-- prediction P -> gain -->
    <polyline points="225,480 225,655 504,655" marker-end="url(#arr)"/>
    <!-- gain -> update -->
    <polyline points="780,655 935,655 935,486" marker-end="url(#arr)"/>
    <!-- update -> output -->
    <line x1="1130" y1="405" x2="1190" y2="405" marker-end="url(#arr)"/>
    <!-- feedback through delay -->
    <polyline points="1160,405 1160,799 452,799"/>
    <polyline points="370,799 60,799 60,470 84,440" marker-end="url(#arr)"/>
  </g>

  <!-- labels -->
  <g font-size="16" fill="#28323C">
    <text x="18" y="385">control input uₖ</text>
    <text x="500" y="385" font-style="italic">H x&#x302;ₖ|ₖ₋₁</text>
    <text x="660" y="300" font-style="italic">zₖ</text>
    <text x="700" y="385" font-style="italic">residual yₖ</text>
    <text x="245" y="560" font-style="italic">Pₖ|ₖ₋₁</text>
    <text x="950" y="560" font-style="italic">Kₖ</text>
    <text x="1185" y="380" text-anchor="end" font-style="italic">state estimate x&#x302;ₖ</text>
    <text x="80" y="770" font-style="italic">x&#x302;ₖ₋₁, Pₖ₋₁</text>
  </g>
</svg>
