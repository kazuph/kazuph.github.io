<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#1d4ed8"/>
    </marker>
    <radialGradient id="sphereGrad" cx="38%" cy="28%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="58%" stop-color="#eef5ff"/>
      <stop offset="100%" stop-color="#c7d8ee"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
    <style>
      .axis { stroke:#1f2937; stroke-width:3.2; fill:none; marker-end:url(#arrow); }
      .axisBack { stroke:#6b7280; stroke-width:2.2; fill:none; stroke-dasharray:8 8; opacity:.65; }
      .equatorFront { stroke:#334155; stroke-width:2.4; fill:none; }
      .equatorBack { stroke:#64748b; stroke-width:2.1; fill:none; stroke-dasharray:8 8; opacity:.65; }
      .gridFront { stroke:#7c8da3; stroke-width:1.4; fill:none; opacity:.45; }
      .gridBack { stroke:#7c8da3; stroke-width:1.3; fill:none; stroke-dasharray:6 7; opacity:.32; }
      .label { font-family:"Times New Roman", Times, serif; font-size:36px; fill:#111827; }
      .smallLabel { font-family:"Times New Roman", Times, serif; font-size:30px; fill:#111827; }
      .state { stroke:#1d4ed8; stroke-width:5; fill:none; marker-end:url(#arrowBlue); }
      .stateGuide { stroke:#2563eb; stroke-width:2.2; fill:none; stroke-dasharray:7 7; opacity:.55; }
      .angle { stroke:#be123c; stroke-width:3.2; fill:none; }
      .phiAngle { stroke:#047857; stroke-width:3.2; fill:none; }
      .point { fill:#1d4ed8; stroke:white; stroke-width:4; }
    </style>
  </defs>

  <rect width="1200" height="900" fill="#fbfdff"/>

  <g transform="translate(600 460)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="270" fill="url(#sphereGrad)" stroke="#334155" stroke-width="3"/>

    <ellipse class="gridBack" cx="0" cy="0" rx="270" ry="72" transform="rotate(-28)"/>
    <ellipse class="gridBack" cx="0" cy="0" rx="270" ry="72" transform="rotate(28)"/>
    <ellipse class="gridBack" cx="0" cy="0" rx="86" ry="270"/>
    <ellipse class="gridFront" cx="0" cy="0" rx="160" ry="270"/>

    <path class="equatorBack" d="M -238 126 A 270 82 0 0 1 238 -126"/>
    <path class="equatorFront" d="M -238 126 A 270 82 0 0 0 238 -126"/>

    <line class="axisBack" x1="0" y1="0" x2="-230" y2="132"/>
    <line class="axis" x1="0" y1="0" x2="292" y2="-168"/>
    <line class="axis" x1="0" y1="0" x2="305" y2="112"/>
    <line class="axis" x1="0" y1="0" x2="0" y2="-332"/>

    <line class="stateGuide" x1="0" y1="0" x2="154" y2="57"/>
    <line class="stateGuide" x1="154" y1="57" x2="154" y2="-190"/>
    <line class="state" x1="0" y1="0" x2="154" y2="-190"/>
    <circle class="point" cx="154" cy="-190" r="9"/>

    <path class="angle" d="M 0 -82 A 82 82 0 0 1 53 -62"/>
    <path class="phiAngle" d="M 76 28 A 82 30 0 0 0 46 -50"/>

    <text class="label" x="312" y="-176">x</text>
    <text class="label" x="322" y="128">y</text>
    <text class="label" x="-12" y="-350">z</text>

    <text class="smallLabel" x="177" y="-207">|ψ⟩</text>
    <text class="smallLabel" x="62" y="-88" fill="#be123c">θ</text>
    <text class="smallLabel" x="94" y="22" fill="#047857">φ</text>

    <text class="smallLabel" x="-38" y="-282">|0⟩</text>
    <text class="smallLabel" x="-36" y="318">|1⟩</text>
  </g>

  <text x="600" y="820" text-anchor="middle" font-family="Times New Roman, Times, serif" font-size="30" fill="#374151">
    |ψ⟩ = cos(θ/2)|0⟩ + e<tspan baseline-shift="super" font-size="22">iφ</tspan> sin(θ/2)|1⟩
  </text>
</svg>
