<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Zero Trust Authentication and Token Exchange</title>
  <desc id="desc">A security architecture diagram showing User, Browser, IdP, API Gateway, Service A, and Service B with separate ID token, access token, and service token flows across trust boundaries.</desc>

  <defs>
    <marker id="arrowAccess" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowId" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowService" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#dc2626"/>
    </marker>
    <marker id="arrowControl" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>

    <filter id="softShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>

    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 14px Arial, sans-serif; fill: #475569; }
      .zone-title { font: 700 15px Arial, sans-serif; fill: #334155; }
      .zone-note { font: 400 12px Arial, sans-serif; fill: #64748b; }
      .node { fill: #ffffff; stroke: #334155; stroke-width: 1.5; filter: url(#softShadow); }
      .node-title { font: 700 18px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .node-sub { font: 400 12px Arial, sans-serif; fill: #64748b; text-anchor: middle; }
      .small { font: 400 11px Arial, sans-serif; fill: #475569; }
      .label { font: 700 12px Arial, sans-serif; fill: #0f172a; }
      .id { stroke: #16a34a; stroke-width: 4; fill: none; marker-end: url(#arrowId); }
      .access { stroke: #2563eb; stroke-width: 4; fill: none; marker-end: url(#arrowAccess); }
      .service { stroke: #dc2626; stroke-width: 4; fill: none; marker-end: url(#arrowService); }
      .control { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrowControl); }
      .thin { stroke-width: 2.5; }
      .tokenbox { fill: #ffffff; stroke-width: 1.3; rx: 8; }
      .step { font: 700 13px Arial, sans-serif; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .stepdot { fill: #0f172a; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="900"/>

  <text class="title" x="60" y="50">Zero Trust Authentication and Token Exchange</text>
  <text class="subtitle" x="60" y="76">Every request is authenticated, authorized, scoped, exchanged, and logged across explicit trust boundaries.</text>

  <rect x="40" y="105" width="250" height="690" rx="18" fill="#ecfeff" stroke="#0891b2" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="zone-title" x="64" y="135">Untrusted User / Device Zone</text>
  <text class="zone-note" x="64" y="157">No implicit trust from network location</text>

  <rect x="320" y="105" width="250" height="690" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="zone-title" x="344" y="135">Identity Trust Boundary</text>
  <text class="zone-note" x="344" y="157">IdP issues signed identity artifacts</text>

  <rect x="600" y="105" width="250" height="690" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="zone-title" x="624" y="135">API Enforcement Boundary</text>
  <text class="zone-note" x="624" y="157">Policy, token validation, token exchange</text>

  <rect x="880" y="105" width="280" height="690" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2" stroke-dasharray="12 8"/>
  <text class="zone-title" x="904" y="135">Private Service Boundary</text>
  <text class="zone-note" x="904" y="157">Service-to-service trust is explicit</text>

  <rect class="node" x="80" y="260" width="170" height="105" rx="14"/>
  <circle cx="165" cy="292" r="17" fill="#0891b2" opacity="0.16"/>
  <path d="M165 282 a10 10 0 1 0 0.1 0 M137 344 c8-23 48-23 56 0" stroke="#0891b2" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text class="node-title" x="165" y="319">User</text>
  <text class="node-sub" x="165" y="342">Human + device posture</text>

  <rect class="node" x="80" y="505" width="170" height="105" rx="14"/>
  <rect x="117" y="531" width="96" height="54" rx="7" fill="#e0f2fe" stroke="#0891b2" stroke-width="2"/>
  <rect x="117" y="531" width="96" height="14" rx="7" fill="#0891b2"/>
  <text class="node-title" x="165" y="565">Browser</text>
  <text class="node-sub" x="165" y="588">OIDC client / session</text>

  <rect class="node" x="360" y="290" width="170" height="120" rx="14"/>
  <circle cx="445" cy="326" r="22" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <path d="M435 326 h22 M456 326 l-7 -7 M456 326 l-7 7" stroke="#16a34a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text class="node-title" x="445" y="363">IdP</text>
  <text class="node-sub" x="445" y="386">AuthN, MFA, claims</text>

  <rect class="node" x="640" y="360" width="170" height="130" rx="14"/>
  <path d="M680 391 h90 v58 h-90 z" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <path d="M695 407 h60 M695 425 h44" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <text class="node-title" x="725" y="436">API Gateway</text>
  <text class="node-sub" x="725" y="461">Policy Decision + Exchange</text>

  <rect class="node" x="925" y="260" width="170" height="115" rx="14"/>
  <rect x="969" y="290" width="82" height="44" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <path d="M982 312 h56" stroke="#ea580c" stroke-width="4" stroke-linecap="round"/>
  <text class="node-title" x="1010" y="326">Service A</text>
  <text class="node-sub" x="1010" y="350">Resource API</text>

  <rect class="node" x="925" y="545" width="170" height="115" rx="14"/>
  <rect x="969" y="575" width="82" height="44" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <path d="M982 597 h56" stroke="#dc2626" stroke-width="4" stroke-linecap="round"/>
  <text class="node-title" x="1010" y="611">Service B</text>
  <text class="node-sub" x="1010" y="635">Downstream service</text>

  <path class="control" d="M165 365 C165 425 165 460 165 505"/>
  <circle class="stepdot" cx="165" cy="435" r="13"/>
  <text class="step" x="165" y="435">1</text>
  <text class="label" x="183" y="430">User starts session</text>
  <text class="small" x="183" y="448">Device posture + local session context</text>

  <path class="control" d="M250 540 C300 520 323 405 360 360"/>
  <circle class="stepdot" cx="306" cy="471" r="13"/>
  <text class="step" x="306" y="471">2</text>
  <text class="label" x="301" y="444">Authenticate</text>
  <text class="small" x="288" y="462">Redirect to IdP, MFA, consent</text>

  <path class="id" d="M360 335 C305 335 290 535 250 555"/>
  <circle class="stepdot" cx="314" cy="393" r="13"/>
  <text class="step" x="314" y="393">3</text>
  <rect class="tokenbox" x="277" y="285" width="154" height="44" fill="#f0fdf4" stroke="#16a34a"/>
  <text class="label" x="354" y="303" text-anchor="middle">ID token</text>
  <text class="small" x="354" y="320" text-anchor="middle">identity claims only</text>

  <path class="access" d="M250 565 C400 625 555 505 640 440"/>
  <circle class="stepdot" cx="452" cy="572" r="13"/>
  <text class="step" x="452" y="572">4</text>
  <rect class="tokenbox" x="400" y="608" width="176" height="48" fill="#eff6ff" stroke="#2563eb"/>
  <text class="label" x="488" y="627" text-anchor="middle">Access token</text>
  <text class="small" x="488" y="645" text-anchor="middle">aud: API Gateway, scopes</text>

  <path class="control thin" d="M640 408 C584 392 560 358 530 350"/>
  <circle class="stepdot" cx="588" cy="385" r="13"/>
  <text class="step" x="588" y="385">5</text>
  <text class="label" x="552" y="331">Validate token</text>
  <text class="small" x="552" y="349">JWKS, issuer, audience, expiry, policy</text>

  <path class="service" d="M810 410 C865 370 895 330 925 318"/>
  <circle class="stepdot" cx="865" cy="371" r="13"/>
  <text class="step" x="865" y="371">6</text>
  <rect class="tokenbox" x="822" y="289" width="150" height="48" fill="#fef2f2" stroke="#dc2626"/>
  <text class="label" x="897" y="308" text-anchor="middle">Service token</text>
  <text class="small" x="897" y="326" text-anchor="middle">aud: Service A, least privilege</text>

  <path class="service" d="M1010 375 C1015 430 1015 490 1010 545"/>
  <circle class="stepdot" cx="1016" cy="461" r="13"/>
  <text class="step" x="1016" y="461">7</text>
  <rect class="tokenbox" x="1036" y="434" width="128" height="50" fill="#fef2f2" stroke="#dc2626"/>
  <text class="label" x="1100" y="453" text-anchor="middle">Service token</text>
  <text class="small" x="1100" y="471" text-anchor="middle">A delegates to B</text>

  <path class="control thin" d="M925 618 C835 660 760 615 725 490"/>
  <text class="label" x="747" y="671">Response path</text>
  <text class="small" x="747" y="690">Claims minimized, audit events emitted</text>

  <rect x="610" y="535" width="230" height="130" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
  <text class="label" x="725" y="560" text-anchor="middle">Gateway enforcement checklist</text>
  <text class="small" x="632" y="586">- deny by default</text>
  <text class="small" x="632" y="607">- validate signature and claims</text>
  <text class="small" x="632" y="628">- exchange user token to service token</text>
  <text class="small" x="632" y="649">- log subject, scope, decision, target</text>

  <rect x="70" y="820" width="1060" height="50" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="105" y1="845" x2="165" y2="845" class="id"/>
  <text class="label" x="180" y="850">ID token: proves user identity to the client</text>
  <line x1="445" y1="845" x2="505" y2="845" class="access"/>
  <text class="label" x="520" y="850">Access token: browser calls gateway with scopes</text>
  <line x1="830" y1="845" x2="890" y2="845" class="service"/>
  <text class="label" x="905" y="850">Service token: gateway/service-to-service authorization</text>

  <path d="M290 105 V795" stroke="#0f172a" stroke-width="1" stroke-dasharray="4 8" opacity="0.22"/>
  <path d="M570 105 V795" stroke="#0f172a" stroke-width="1" stroke-dasharray="4 8" opacity="0.22"/>
  <path d="M850 105 V795" stroke="#0f172a" stroke-width="1" stroke-dasharray="4 8" opacity="0.22"/>

  <text class="small" x="292" y="782">Boundary crossing requires explicit verification</text>
  <text class="small" x="572" y="782">User token is not blindly forwarded</text>
  <text class="small" x="852" y="782">Internal network is not automatically trusted</text>
</svg>
