<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="rot" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="#f4f6f8"/>
  <text x="300" y="60" text-anchor="middle" font-size="30" font-weight="bold" fill="#1f2933">7-Axis Robot Arm</text>

  <!-- floor + base (slight 3D) -->
  <polygon points="300,810 860,810 940,740 380,740" fill="#d9dee4"/>
  <polygon points="460,770 700,770 760,710 520,710" fill="#5a6677"/>
  <polygon points="460,660 700,660 700,770 460,770" fill="#4a5568"/>
  <polygon points="700,660 760,710 760,770 700,770" fill="#3a4452"/>
  <text x="610" y="755" text-anchor="middle" font-size="20" fill="#ffffff">Base</text>

  <!-- links (J1->J2->...->J7) -->
  <g stroke="#d88a22" stroke-width="4" stroke-linecap="round">
    <line x1="590" y1="650" x2="590" y2="480" stroke="#f2a53a" stroke-width="42"/>
    <line x1="590" y1="480" x2="460" y2="290" stroke="#f2a53a" stroke-width="40"/>
    <line x1="460" y1="290" x2="560" y2="160" stroke="#f2a53a" stroke-width="36"/>
    <line x1="560" y1="160" x2="670" y2="100" stroke="#f2a53a" stroke-width="32"/>
    <line x1="670" y1="100" x2="750" y2="95" stroke="#f2a53a" stroke-width="28"/>
    <line x1="750" y1="95" x2="810" y2="95" stroke="#f2a53a" stroke-width="24"/>
  </g>
  <!-- gripper -->
  <line x1="810" y1="95" x2="870" y2="60" stroke="#4a5568" stroke-width="9" stroke-linecap="round"/>
  <line x1="810" y1="95" x2="870" y2="130" stroke="#4a5568" stroke-width="9" stroke-linecap="round"/>

  <!-- rotation arcs -->
  <g fill="none" stroke="#c0392b" stroke-width="4">
    <path d="M650 650 A62 62 0 1 1 530 650" marker-end="url(#rot)"/>
    <path d="M650 480 A60 60 0 1 1 535 455" marker-end="url(#rot)"/>
    <path d="M520 290 A58 58 0 1 1 405 310" marker-end="url(#rot)"/>
    <path d="M730 100 A55 55 0 1 1 612 90" marker-end="url(#rot)"/>
  </g>

  <!-- joints J1..J7 -->
  <g>
    <circle cx="590" cy="650" r="34" fill="#2c5282"/><circle cx="590" cy="650" r="17" fill="#4a7bc0"/>
    <circle cx="590" cy="480" r="33" fill="#2c5282"/><circle cx="590" cy="480" r="17" fill="#4a7bc0"/>
    <circle cx="460" cy="290" r="32" fill="#2c5282"/><circle cx="460" cy="290" r="16" fill="#4a7bc0"/>
    <circle cx="560" cy="160" r="30" fill="#2c5282"/><circle cx="560" cy="160" r="15" fill="#4a7bc0"/>
    <circle cx="670" cy="100" r="28" fill="#2c5282"/><circle cx="670" cy="100" r="14" fill="#4a7bc0"/>
    <circle cx="750" cy="95" r="26" fill="#2c5282"/><circle cx="750" cy="95" r="13" fill="#4a7bc0"/>
    <circle cx="810" cy="95" r="24" fill="#2c5282"/><circle cx="810" cy="95" r="12" fill="#4a7bc0"/>
  </g>
  <g font-size="22" font-weight="bold" fill="#1f2933">
    <text x="590" y="712" text-anchor="middle">J1</text>
    <text x="640" y="486" text-anchor="start">J2</text>
    <text x="408" y="296" text-anchor="end">J3</text>
    <text x="512" y="152" text-anchor="end">J4</text>
    <text x="668" y="62" text-anchor="middle">J5</text>
    <text x="748" y="58" text-anchor="middle">J6</text>
    <text x="842" y="100" text-anchor="start">J7</text>
  </g>

  <!-- legend -->
  <g font-size="20" fill="#1f2933">
    <circle cx="90" cy="160" r="15" fill="#2c5282"/>
    <text x="115" y="167">Joint (J1–J7)</text>
    <rect x="75" y="195" width="30" height="20" fill="#f2a53a"/>
    <text x="115" y="212">Link</text>
    <path d="M75 250 A18 18 0 0 1 110 250" fill="none" stroke="#c0392b" stroke-width="4"/>
    <text x="115" y="257">Rotation</text>
  </g>
</svg>
