<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <rect width="1200" height="900" fill="#fff6ec"/>
  <ellipse cx="600" cy="800" rx="300" ry="34" fill="#eedcc8"/>

  <!-- ears -->
  <g>
    <circle cx="445" cy="205" r="95" fill="#b67c51"/>
    <circle cx="445" cy="205" r="50" fill="#e3bd98"/>
    <circle cx="755" cy="205" r="95" fill="#b67c51"/>
    <circle cx="755" cy="205" r="50" fill="#e3bd98"/>
  </g>

  <!-- body -->
  <ellipse cx="600" cy="530" rx="255" ry="245" fill="#cb9367"/>
  <ellipse cx="600" cy="565" rx="155" ry="170" fill="#f4e6d5"/>

  <!-- arms -->
  <ellipse cx="355" cy="460" rx="85" ry="115" fill="#cb9367"/>
  <ellipse cx="845" cy="460" rx="85" ry="115" fill="#cb9367"/>
  <ellipse cx="350" cy="535" rx="50" ry="55" fill="#f0dac1"/>
  <ellipse cx="850" cy="535" rx="50" ry="55" fill="#f0dac1"/>

  <!-- legs -->
  <ellipse cx="475" cy="745" rx="105" ry="95" fill="#cb9367"/>
  <ellipse cx="725" cy="745" rx="105" ry="95" fill="#cb9367"/>
  <ellipse cx="475" cy="760" rx="62" ry="50" fill="#f0dac1"/>
  <ellipse cx="725" cy="760" rx="62" ry="50" fill="#f0dac1"/>
  <ellipse cx="475" cy="760" rx="32" ry="24" fill="#f2a65a"/>
  <ellipse cx="725" cy="760" rx="32" ry="24" fill="#f2a65a"/>

  <!-- chest patch -->
  <circle cx="600" cy="485" r="62" fill="#f2a65a"/>
  <circle cx="600" cy="485" r="62" fill="none" stroke="#b67c51" stroke-width="4" stroke-dasharray="8 8"/>
  <path d="M600 515 l-34 -34 a20 20 0 0 1 34 -10 a20 20 0 0 1 34 10 z" fill="#4a332a"/>

  <!-- head -->
  <circle cx="600" cy="300" r="205" fill="#cb9367"/>
  <ellipse cx="600" cy="380" rx="120" ry="95" fill="#f1dec8"/>

  <!-- cheeks -->
  <ellipse cx="485" cy="345" rx="30" ry="20" fill="#e27d9a" opacity="0.45"/>
  <ellipse cx="715" cy="345" rx="30" ry="20" fill="#e27d9a" opacity="0.45"/>

  <!-- eyes -->
  <circle cx="522" cy="275" r="24" fill="#4a332a"/>
  <circle cx="678" cy="275" r="24" fill="#4a332a"/>
  <circle cx="528" cy="264" r="8" fill="#ffffff"/>
  <circle cx="684" cy="264" r="8" fill="#ffffff"/>

  <!-- nose + mouth -->
  <ellipse cx="600" cy="345" rx="26" ry="20" fill="#4a332a"/>
  <path d="M600 365 L600 395 Q565 415 535 380" fill="none" stroke="#4a332a" stroke-width="5" stroke-linecap="round"/>
  <path d="M600 395 Q635 415 665 380" fill="none" stroke="#4a332a" stroke-width="5" stroke-linecap="round"/>

  <!-- neck ribbon -->
  <polygon points="495,565 585,540 585,610" fill="#e27d9a"/>
  <polygon points="705,565 615,540 615,610" fill="#e27d9a"/>
  <circle cx="600" cy="575" r="28" fill="#e27d9a"/>
</svg>
