<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EM-90 — エスプレッソマシン内部構造</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #161310; }
  #app { position: fixed; inset: 0; }
  .hud { position: fixed; font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #d8cfc2; user-select: none; }
  .hud-tl { top: 18px; left: 20px; pointer-events: none; }
  .hud-tl h1 { margin: 0; font-size: 18px; letter-spacing: 0.18em; color: #f3ede2; }
  .hud-tl p { margin: 6px 0 0; font-size: 11px; color: #94876f; letter-spacing: 0.08em; }
  .hud-bl { bottom: 18px; left: 20px; display: flex; gap: 6px; }
  .hud-bl button { font: 12px ui-monospace, Menlo, monospace; letter-spacing: 0.1em; color: #d8cfc2; background: rgba(28, 23, 17, 0.88); border: 1px solid #4a3f30; border-radius: 6px; padding: 8px 14px; cursor: pointer; }
  .hud-bl button:hover { border-color: #d49c4a; }
  .hud-bl button.on { color: #1a140c; background: #d49c4a; border-color: #d49c4a; }
  .hud-br { bottom: 18px; right: 20px; font-size: 10px; color: #6e624e; letter-spacing: 0.1em; text-align: right; line-height: 1.8; pointer-events: none; }
  .legend { top: 18px; right: 20px; background: rgba(24, 20, 14, 0.85); border: 1px solid #3a3226; border-radius: 8px; padding: 12px 14px; font-size: 10px; line-height: 1.9; pointer-events: none; }
  .legend h2 { margin: 0 0 4px; font-size: 10px; letter-spacing: 0.2em; color: #d49c4a; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 7px; }
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
</head>
<body>
<div id="app"></div>
<div class="hud hud-tl">
  <h1>EM-90 SEMI-AUTO</h1>
  <p>セミオート エスプレッソマシン / 単一ボイラー / 振動ポンプ</p>
</div>
<div class="hud legend">
  <h2>抽出経路</h2>
  <span class="dot" style="background:#66ccff"></span>給水（タンク → ポンプ → ボイラー）<br>
  <span class="dot" style="background:#ff9944"></span>熱水（ボイラー → グループヘッド）<br>
  <span class="dot" style="background:#a0522d"></span>エスプレッソ（→ カップ）
</div>
<div class="hud hud-bl">
  <button id="m-normal" class="on">通常</button>
  <button id="m-cut">断面</button>
  <button id="m-exp">分解</button>
  <button id="t-label" class="on">ラベル ON</button>
</div>
<div class="hud hud-br">ドラッグ: 回転 / ホイール: ズーム</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x161310);
scene.fog = new THREE.Fog(0x161310, 300, 700);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.localClippingEnabled = true;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.5, 1500);
camera.position.set(70, 55, 95);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 20, 0);

scene.add(new THREE.HemisphereLight(0xfff0dc, 0x14100c, 0.9));
const keyL = new THREE.DirectionalLight(0xfff0d8, 2.2);
keyL.position.set(70, 110, 60);
keyL.castShadow = true;
keyL.shadow.mapSize.set(2048, 2048);
keyL.shadow.camera.left = -80; keyL.shadow.camera.right = 80;
keyL.shadow.camera.top = 80; keyL.shadow.camera.bottom = -80;
scene.add(keyL);
const rimL = new THREE.DirectionalLight(0x6688ff, 0.5);
rimL.position.set(-80, 40, -60);
scene.add(rimL);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(700, 700), new THREE.MeshStandardMaterial({ color: 0x1d1813, roughness: 0.95 }));
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const clipPlane = new THREE.Plane(new THREE.Vector3(-1, 0, 0), 0.001);
function matStd(color, opt = {}) {
  return new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide, ...opt });
}
const STEELM = matStd(0xb8bcc2, { roughness: 0.3, metalness: 0.85 });
const PANEL = matStd(0x2e2a26, { roughness: 0.6, metalness: 0.4 });
const COPPER = matStd(0xc97a3a, { roughness: 0.35, metalness: 0.9 });
const CHROME = matStd(0xd5d9de, { roughness: 0.15, metalness: 1.0 });
const BLACKP = matStd(0x1c1a18, { roughness: 0.5 });
const TANKM = matStd(0x7fd4ff, { roughness: 0.15, metalness: 0, transparent: true, opacity: 0.4 });
const WATERM = matStd(0x3aa9e0, { roughness: 0.2, transparent: true, opacity: 0.6 });
const PIPEM = matStd(0x9aa0a8, { roughness: 0.35, metalness: 0.9 });
const clippables = [STEELM, PANEL, COPPER, TANKM, WATERM, BLACKP];

// ---- parts registry (for explode + labels) --------------------------------
const parts = [];
const labels = new THREE.Group();
scene.add(labels);
function textSprite(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 48px ui-monospace, "Hiragino Sans", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(0,0,0,0.75)'; ctx.lineWidth = 9;
  ctx.strokeText(text, 256, 64);
  ctx.fillStyle = '#f0d9a0';
  ctx.fillText(text, 256, 64);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthTest: false }));
  sp.scale.set(24, 6, 1);
  return sp;
}
function addPart(group, explodeOffset, labelText, anchor, labelPos) {
  scene.add(group);
  const rec = { group, base: group.position.clone(), off: explodeOffset };
  parts.push(rec);
  if (labelText) {
    const holder = new THREE.Group();
    const sp = textSprite(labelText);
    sp.position.copy(labelPos);
    holder.add(sp);
    const line = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([anchor, labelPos]),
      new THREE.LineBasicMaterial({ color: 0xd49c4a, transparent: true, opacity: 0.7, depthTest: false })
    );
    holder.add(line);
    group.add(holder);
  }
  return rec;
}

// ---- housing ---------------------------------------------------------------
const housing = new THREE.Group();
const shell = new THREE.Mesh(new THREE.BoxGeometry(40, 36, 30), STEELM);
shell.position.set(0, 24, -2);
shell.castShadow = true;
housing.add(shell);
const front = new THREE.Mesh(new THREE.BoxGeometry(36, 30, 1.6), PANEL);
front.position.set(0, 25, 13.5);
housing.add(front);
const topGrill = new THREE.Mesh(new THREE.BoxGeometry(36, 1.2, 24), PANEL);
topGrill.position.set(0, 42.5, -2);
housing.add(topGrill);
for (let i = 0; i < 7; i++) {
  const slit = new THREE.Mesh(new THREE.BoxGeometry(30, 0.5, 1), BLACKP);
  slit.position.set(0, 43.2, -12 + i * 3.4);
  housing.add(slit);
}
const lamp = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 1, 12), new THREE.MeshBasicMaterial({ color: 0xff8833 }));
lamp.rotation.x = Math.PI / 2;
lamp.position.set(-12, 32, 14.4);
housing.add(lamp);
const sw = new THREE.Mesh(new THREE.BoxGeometry(5, 3, 1.5), BLACKP);
sw.position.set(12, 32, 14.2);
housing.add(sw);
addPart(housing, new THREE.Vector3(0, 0, 0), '外装', new THREE.Vector3(18, 40, -2), new THREE.Vector3(34, 48, -2));

// drip tray
const tray = new THREE.Group();
const trayBody = new THREE.Mesh(new THREE.BoxGeometry(34, 3, 16), BLACKP);
trayBody.position.set(0, 7.5, 16);
trayBody.castShadow = true;
tray.add(trayBody);
const trayGrill = new THREE.Mesh(new THREE.BoxGeometry(32, 0.6, 14), CHROME);
trayGrill.position.set(0, 9.2, 16);
tray.add(trayGrill);
addPart(tray, new THREE.Vector3(0, -8, 14), 'ドリップトレイ', new THREE.Vector3(14, 9, 16), new THREE.Vector3(34, 2, 22));

// legs + base
const basePlate = new THREE.Group();
const bp = new THREE.Mesh(new THREE.BoxGeometry(40, 6, 30), PANEL);
bp.position.set(0, 3, -2);
bp.castShadow = true;
basePlate.add(bp);
addPart(basePlate, new THREE.Vector3(0, -14, 0));

// boiler
const boiler = new THREE.Group();
const bShell = new THREE.Mesh(new THREE.CylinderGeometry(9, 9, 22, 40), COPPER);
bShell.rotation.z = Math.PI / 2;
bShell.position.set(0, 26, -4);
bShell.castShadow = true;
boiler.add(bShell);
for (const ex of [-11.4, 11.4]) {
  const cap = new THREE.Mesh(new THREE.SphereGeometry(9, 32, 16), COPPER);
  cap.scale.x = 0.35;
  cap.position.set(ex, 26, -4);
  boiler.add(cap);
}
const water = new THREE.Mesh(new THREE.CylinderGeometry(7.8, 7.8, 20, 32), WATERM);
water.rotation.z = Math.PI / 2;
water.position.set(0, 24.8, -4);
boiler.add(water);
const heater = new THREE.Mesh(new THREE.TorusGeometry(5, 0.8, 10, 40), matStd(0x884444, { roughness: 0.4, metalness: 0.6 }));
heater.rotation.x = Math.PI / 2;
heater.position.set(0, 19.5, -4);
boiler.add(heater);
addPart(boiler, new THREE.Vector3(0, 26, 0), 'ボイラー', new THREE.Vector3(0, 33, -4), new THREE.Vector3(-26, 48, -10));

// group head + portafilter
const groupHead = new THREE.Group();
const ghBody = new THREE.Mesh(new THREE.CylinderGeometry(5, 5.6, 9, 32), CHROME);
ghBody.position.set(0, 20, 17);
ghBody.castShadow = true;
groupHead.add(ghBody);
const ghNeck = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), CHROME);
ghNeck.position.set(0, 24, 13);
groupHead.add(ghNeck);
addPart(groupHead, new THREE.Vector3(0, 10, 22), 'グループヘッド', new THREE.Vector3(5, 22, 17), new THREE.Vector3(30, 36, 20));

const porta = new THREE.Group();
const basket = new THREE.Mesh(new THREE.CylinderGeometry(4.6, 3.8, 3.4, 32), CHROME);
basket.position.set(0, 14, 17);
basket.castShadow = true;
porta.add(basket);
const spoutL = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.1, 3, 12), CHROME);
spoutL.position.set(-1.6, 11.6, 17);
spoutL.rotation.z = 0.3;
porta.add(spoutL);
const spoutR = spoutL.clone(); spoutR.position.x = 1.6; spoutR.rotation.z = -0.3;
porta.add(spoutR);
const handle = new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.4, 14, 16), BLACKP);
handle.rotation.x = Math.PI / 2;
handle.position.set(0, 14, 26);
handle.castShadow = true;
porta.add(handle);
addPart(porta, new THREE.Vector3(0, -2, 30), 'ポルタフィルター', new THREE.Vector3(0, 14, 24), new THREE.Vector3(-30, 6, 28));

// water tank (rear, translucent)
const tank = new THREE.Group();
const tk = new THREE.Mesh(new THREE.BoxGeometry(30, 26, 7), TANKM);
tk.position.set(0, 26, -20.5);
tank.add(tk);
const tkWater = new THREE.Mesh(new THREE.BoxGeometry(28.6, 18, 5.6), WATERM);
tkWater.position.set(0, 22, -20.5);
tank.add(tkWater);
addPart(tank, new THREE.Vector3(0, 6, -22), '給水タンク', new THREE.Vector3(0, 36, -20), new THREE.Vector3(-30, 48, -22));

// pump
const pump = new THREE.Group();
const pm = new THREE.Mesh(new THREE.CapsuleGeometry(3, 7, 8, 20), matStd(0x556070, { roughness: 0.4, metalness: 0.7 }));
pm.rotation.z = Math.PI / 2;
pm.position.set(6, 10, -10);
pm.castShadow = true;
pump.add(pm);
addPart(pump, new THREE.Vector3(20, -4, -8), 'ポンプ（振動式）', new THREE.Vector3(10, 10, -10), new THREE.Vector3(34, 14, -16));

// steam wand
const wandCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(14, 28, 2),
  new THREE.Vector3(20, 24, 6),
  new THREE.Vector3(23, 14, 10),
]);
const wand = new THREE.Group();
const wm = new THREE.Mesh(new THREE.TubeGeometry(wandCurve, 24, 0.9, 12), CHROME);
wm.castShadow = true;
wand.add(wm);
const wTip = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 0.8, 3, 12), BLACKP);
wTip.position.set(23, 12.5, 10);
wand.add(wTip);
addPart(wand, new THREE.Vector3(16, 0, 8), 'スチームワンド', new THREE.Vector3(23, 14, 10), new THREE.Vector3(34, 26, 14));

// cup
const cup = new THREE.Group();
const cupBody = new THREE.Mesh(new THREE.CylinderGeometry(3.4, 2.6, 5, 24), matStd(0xf3ede2, { roughness: 0.7 }));
cupBody.position.set(0, 12, 17);
cupBody.castShadow = true;
cup.add(cupBody);
const cupHandle = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.5, 8, 20), matStd(0xf3ede2, { roughness: 0.7 }));
cupHandle.position.set(3.8, 12, 17);
cup.add(cupHandle);
cup.position.y = -2.2;   // sits on tray grill
addPart(cup, new THREE.Vector3(0, -2, 16), 'カップ', new THREE.Vector3(3, 12, 17), new THREE.Vector3(26, 10, 26));

// ---- pipes + flow particles -------------------------------------------------
const coldCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 14, -20),
  new THREE.Vector3(2, 8, -14),
  new THREE.Vector3(6, 10, -10),
  new THREE.Vector3(4, 16, -6),
  new THREE.Vector3(0, 22, -4),
]);
const hotCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, 30, -4),
  new THREE.Vector3(0, 34, 2),
  new THREE.Vector3(0, 30, 10),
  new THREE.Vector3(0, 25, 14),
  new THREE.Vector3(0, 21, 17),
]);
const dripA = new THREE.Vector3(-1.6, 10.4, 17);
const dripB = new THREE.Vector3(-1.2, 7.6, 17);
const pipes = new THREE.Group();
pipes.add(new THREE.Mesh(new THREE.TubeGeometry(coldCurve, 40, 0.7, 10), PIPEM));
pipes.add(new THREE.Mesh(new THREE.TubeGeometry(hotCurve, 40, 0.7, 10), PIPEM));
scene.add(pipes);

const flows = new THREE.Group();
scene.add(flows);
function flowBalls(n, color, r) {
  const arr = [];
  for (let i = 0; i < n; i++) {
    const b = new THREE.Mesh(new THREE.SphereGeometry(r, 10, 8), new THREE.MeshBasicMaterial({ color }));
    flows.add(b);
    arr.push(b);
  }
  return arr;
}
const coldBalls = flowBalls(7, 0x66ccff, 0.55);
const hotBalls = flowBalls(7, 0xff9944, 0.55);
const dripBalls = flowBalls(4, 0xa0522d, 0.45);

// ---- modes ------------------------------------------------------------------
let explodeT = 0, explodeTarget = 0, mode = 'normal';
const btns = { 'm-normal': 'normal', 'm-cut': 'cut', 'm-exp': 'exp' };
function setMode(m) {
  mode = m;
  for (const [id, mm] of Object.entries(btns)) document.getElementById(id).classList.toggle('on', mm === m);
  for (const mat of clippables) {
    mat.clippingPlanes = m === 'cut' ? [clipPlane] : null;
    mat.needsUpdate = true;
  }
  explodeTarget = m === 'exp' ? 1 : 0;
}
for (const id of Object.keys(btns)) document.getElementById(id).addEventListener('click', () => setMode(btns[id]));
const bLabel = document.getElementById('t-label');
let labelOn = true;
bLabel.addEventListener('click', () => {
  labelOn = !labelOn;
  bLabel.classList.toggle('on');
  bLabel.textContent = labelOn ? 'ラベル ON' : 'ラベル OFF';
  scene.traverse(o => { if (o.isSprite || (o.isLine && o.material.depthTest === false)) o.visible = labelOn; });
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  explodeT += (explodeTarget - explodeT) * Math.min(1, dt * 4);
  for (const p of parts) {
    p.group.position.copy(p.base).addScaledVector(p.off, explodeT);
  }
  const showFlow = explodeT < 0.3;
  pipes.visible = showFlow;
  flows.visible = showFlow;
  if (showFlow) {
    coldBalls.forEach((b, i) => b.position.copy(coldCurve.getPoint((t * 0.12 + i / 7) % 1)));
    hotBalls.forEach((b, i) => b.position.copy(hotCurve.getPoint((t * 0.15 + i / 7) % 1)));
    dripBalls.forEach((b, i) => {
      const k = (t * 0.5 + i / 4) % 1;
      b.position.lerpVectors(dripA, dripB, k);
      b.material.opacity = 1;
    });
  }
  controls.update();
  renderer.render(scene, camera);
}
setMode('normal');
animate();
</script>
</body>
</html>
