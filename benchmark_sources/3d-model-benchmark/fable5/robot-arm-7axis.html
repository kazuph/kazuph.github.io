<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RX-7A — 7軸ロボットアーム</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #131722; }
  #app { position: fixed; inset: 0; }
  .hud { position: fixed; font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #c8d2e0; user-select: none; }
  .hud-tl { top: 18px; left: 20px; pointer-events: none; }
  .hud-tl h1 { margin: 0; font-size: 18px; letter-spacing: 0.18em; color: #eef3fa; }
  .hud-tl p { margin: 6px 0 0; font-size: 11px; color: #76829a; letter-spacing: 0.08em; }
  #tcp { top: 18px; right: 20px; text-align: right; font-size: 11px; color: #62d6e8; line-height: 1.8; pointer-events: none; }
  #panel { bottom: 18px; right: 20px; background: rgba(15, 19, 28, 0.88); border: 1px solid #2a3346; border-radius: 10px; padding: 14px 16px; width: 240px; }
  #panel h2 { margin: 0 0 10px; font-size: 11px; letter-spacing: 0.22em; color: #62d6e8; }
  .jrow { display: flex; align-items: center; gap: 8px; margin: 6px 0; font-size: 11px; }
  .jrow label { width: 24px; color: #9aa6ba; }
  .jrow input[type=range] { flex: 1; accent-color: #e8742c; }
  .jrow output { width: 46px; text-align: right; color: #eef3fa; }
  .btns { display: flex; gap: 6px; margin-top: 10px; }
  .btns button { flex: 1; font: 11px ui-monospace, Menlo, monospace; color: #c8d2e0; background: rgba(30, 38, 52, 0.9); border: 1px solid #2a3346; border-radius: 6px; padding: 7px 0; cursor: pointer; letter-spacing: 0.1em; }
  .btns button:hover { border-color: #62d6e8; }
  .btns button.on { color: #0c1118; background: #e8742c; border-color: #e8742c; }
  .hint { bottom: 18px; left: 20px; font-size: 10px; color: #59637a; letter-spacing: 0.1em; pointer-events: none; }
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
</head>
<body>
<div id="app"></div>
<div class="hud hud-tl">
  <h1>RX-7A MANIPULATOR</h1>
  <p>7軸 垂直多関節ロボットアーム / 可搬 7 kg / DEMO RIG</p>
</div>
<div class="hud" id="tcp">TCP X: ---<br>TCP Y: ---<br>TCP Z: ---</div>
<div class="hud" id="panel">
  <h2>JOINT CONTROL</h2>
  <div id="sliders"></div>
  <div class="btns">
    <button id="b-demo">デモ再生</button>
    <button id="b-reset">リセット</button>
    <button id="b-grip">グリップ</button>
  </div>
</div>
<div class="hud hint">ドラッグ: 回転 / ホイール: ズーム / スライダー: 各軸ジョグ</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x131722);
scene.fog = new THREE.Fog(0x131722, 400, 900);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 1, 2000);
camera.position.set(110, 80, 130);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 45, 0);

scene.add(new THREE.HemisphereLight(0xbcd0ff, 0x10131c, 0.9));
const key = new THREE.DirectionalLight(0xffffff, 2.2);
key.position.set(90, 160, 70);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -150; key.shadow.camera.right = 150;
key.shadow.camera.top = 180; key.shadow.camera.bottom = -60;
scene.add(key);
const rim = new THREE.DirectionalLight(0x62d6e8, 0.4);
rim.position.set(-120, 60, -80);
scene.add(rim);

const grid = new THREE.GridHelper(600, 30, 0x233044, 0x1a2230);
scene.add(grid);
const ground = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), new THREE.ShadowMaterial({ opacity: 0.4 }));
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const SHELL = new THREE.MeshStandardMaterial({ color: 0xe9ebef, roughness: 0.45, metalness: 0.15 });
const JOINT = new THREE.MeshStandardMaterial({ color: 0xe8742c, roughness: 0.4, metalness: 0.3 });
const DARK = new THREE.MeshStandardMaterial({ color: 0x252a35, roughness: 0.5, metalness: 0.6 });

function cyl(r1, r2, h, mat, rs = 32) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(r1, r2, h, rs), mat);
  m.castShadow = m.receiveShadow = true;
  return m;
}
function capsuleLink(r, len, mat) {
  const m = new THREE.Mesh(new THREE.CapsuleGeometry(r, len, 8, 24), mat);
  m.castShadow = true;
  return m;
}
function jointRing(r, axis) {
  // torus marking the rotation axis: y-roll => flat ring, x-pitch => upright ring
  const m = new THREE.Mesh(new THREE.TorusGeometry(r, r * 0.18, 14, 40), JOINT);
  if (axis === 'y') m.rotation.x = Math.PI / 2;
  else m.rotation.y = Math.PI / 2;
  m.castShadow = true;
  return m;
}
function label(text) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 64px ui-monospace, Menlo, monospace';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(0,0,0,0.8)'; ctx.lineWidth = 10;
  ctx.strokeText(text, 128, 64);
  ctx.fillStyle = '#62d6e8';
  ctx.fillText(text, 128, 64);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthTest: false }));
  sp.scale.set(10, 5, 1);
  return sp;
}

// ---- kinematic chain ------------------------------------------------------
// J1 yaw, J2 pitch, J3 roll, J4 pitch, J5 roll, J6 pitch, J7 roll
const joints = [];
function addJoint(parent, offsetY, axis, ringR, name, labelOff) {
  const g = new THREE.Group();
  g.position.y = offsetY;
  parent.add(g);
  const ring = jointRing(ringR, axis);
  g.add(ring);
  const lb = label(name);
  lb.position.set(labelOff, 0, 0);
  g.add(lb);
  joints.push({ group: g, axis, angle: 0 });
  return g;
}

const pedestal = cyl(13, 15, 8, DARK, 48);
pedestal.position.y = 4;
scene.add(pedestal);
for (let i = 0; i < 6; i++) {
  const bolt = cyl(1, 1, 1.6, SHELL, 12);
  const a = i / 6 * Math.PI * 2;
  bolt.position.set(Math.cos(a) * 12.5, 8.4, Math.sin(a) * 12.5);
  scene.add(bolt);
}
const root = new THREE.Group();
root.position.y = 8;
scene.add(root);

const j1 = addJoint(root, 2, 'y', 9.5, 'J1', 14);
const column = cyl(8, 9.5, 14, SHELL);
column.position.y = 8;
j1.add(column);

const j2 = addJoint(j1, 15, 'x', 7.5, 'J2', 13);
const upper = capsuleLink(5.5, 14, SHELL);
upper.position.y = 9;
j2.add(upper);

const j3 = addJoint(j2, 18, 'y', 6, 'J3', 11);
const mid = capsuleLink(4.8, 12, SHELL);
mid.position.y = 8;
j3.add(mid);

const j4 = addJoint(j3, 16, 'x', 5.5, 'J4', 10.5);
const fore = capsuleLink(4.2, 11, SHELL);
fore.position.y = 7.5;
j4.add(fore);

const j5 = addJoint(j4, 15, 'y', 4.8, 'J5', 10);
const wrist1 = capsuleLink(3.6, 8, SHELL);
wrist1.position.y = 6;
j5.add(wrist1);

const j6 = addJoint(j5, 12, 'x', 4.2, 'J6', 9.5);
const wrist2 = cyl(3.2, 3.6, 6, SHELL);
wrist2.position.y = 4;
j6.add(wrist2);

const j7 = addJoint(j6, 8, 'y', 3.6, 'J7', 9);
const flange = cyl(3.4, 3.4, 2, DARK);
flange.position.y = 1.5;
j7.add(flange);

// gripper
const gripBase = new THREE.Mesh(new THREE.BoxGeometry(7, 3, 4), DARK);
gripBase.position.y = 4;
gripBase.castShadow = true;
j7.add(gripBase);
const fingers = [];
for (const sx of [-1, 1]) {
  const f = new THREE.Group();
  f.position.set(sx * 2.4, 5.5, 0);
  const seg = new THREE.Mesh(new THREE.BoxGeometry(1.2, 6, 2.4), JOINT);
  seg.position.y = 3;
  seg.castShadow = true;
  f.add(seg);
  const tip = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 2.4), DARK);
  tip.position.set(-sx * 0.5, 6.6, 0);
  tip.rotation.z = sx * 0.35;
  tip.castShadow = true;
  f.add(tip);
  j7.add(f);
  fingers.push({ g: f, sx });
}
const tcpAxes = new THREE.AxesHelper(8);
tcpAxes.position.y = 6;
j7.add(tcpAxes);

// ---- UI -------------------------------------------------------------------
const LIMITS = [170, 120, 170, 120, 170, 120, 175];
const HOME = [0, -30, 0, 60, 0, -45, 0];
const slidersDiv = document.getElementById('sliders');
const inputs = [];
for (let i = 0; i < 7; i++) {
  const row = document.createElement('div');
  row.className = 'jrow';
  row.innerHTML = `<label>J${i + 1}</label><input type="range" min="${-LIMITS[i]}" max="${LIMITS[i]}" value="${HOME[i]}" step="1"><output>${HOME[i]}°</output>`;
  slidersDiv.appendChild(row);
  const inp = row.querySelector('input');
  const out = row.querySelector('output');
  inp.addEventListener('input', () => {
    demo = false; bDemo.classList.remove('on');
    setJoint(i, Number(inp.value));
  });
  inputs.push({ inp, out });
}
function setJoint(i, deg) {
  joints[i].angle = deg;
  const rad = THREE.MathUtils.degToRad(deg);
  if (joints[i].axis === 'y') joints[i].group.rotation.y = rad;
  else joints[i].group.rotation.x = rad;
  inputs[i].inp.value = String(Math.round(deg));
  inputs[i].out.textContent = `${Math.round(deg)}°`;
}
HOME.forEach((d, i) => setJoint(i, d));

let demo = false, gripClosed = false, gripT = 0;
const bDemo = document.getElementById('b-demo');
bDemo.addEventListener('click', () => { demo = !demo; bDemo.classList.toggle('on'); });
document.getElementById('b-reset').addEventListener('click', () => {
  demo = false; bDemo.classList.remove('on');
  HOME.forEach((d, i) => setJoint(i, d));
});
const bGrip = document.getElementById('b-grip');
bGrip.addEventListener('click', () => { gripClosed = !gripClosed; bGrip.classList.toggle('on'); });

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const tcpDiv = document.getElementById('tcp');
const tcpPos = new THREE.Vector3();
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  if (demo) {
    const amp = [80, 50, 70, 55, 80, 50, 90];
    for (let i = 0; i < 7; i++) {
      setJoint(i, HOME[i] + amp[i] * Math.sin(t * (0.4 + i * 0.13)));
    }
  }
  gripT += ((gripClosed ? 1 : 0) - gripT) * Math.min(1, dt * 8);
  for (const f of fingers) f.g.position.x = f.sx * (2.4 - gripT * 1.3);

  tcpAxes.getWorldPosition(tcpPos);
  tcpDiv.innerHTML = `TCP X: ${tcpPos.x.toFixed(1)}<br>TCP Y: ${tcpPos.y.toFixed(1)}<br>TCP Z: ${tcpPos.z.toFixed(1)}`;

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
