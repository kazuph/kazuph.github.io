<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CAL.2026 — 機械式時計ムーブメント</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #15130f; }
  #app { position: fixed; inset: 0; }
  .hud { position: fixed; font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #d8cfbe; user-select: none; pointer-events: none; }
  .hud-tl { top: 18px; left: 20px; }
  .hud-tl h1 { margin: 0; font-size: 18px; letter-spacing: 0.18em; color: #f3ecdd; }
  .hud-tl p { margin: 6px 0 0; font-size: 11px; letter-spacing: 0.08em; color: #978b76; }
  .hud-bl { bottom: 18px; left: 20px; pointer-events: auto; display: flex; gap: 8px; }
  .hud-bl button { font: 12px ui-monospace, Menlo, monospace; letter-spacing: 0.1em; color: #d8cfbe; background: rgba(30, 26, 18, 0.85); border: 1px solid #4a4030; border-radius: 6px; padding: 8px 14px; cursor: pointer; }
  .hud-bl button:hover { border-color: #d4a64a; }
  .hud-bl button.on { color: #1a150c; background: #d4a64a; border-color: #d4a64a; }
  .hud-br { bottom: 18px; right: 20px; font-size: 10px; color: #6e6250; letter-spacing: 0.1em; text-align: right; line-height: 1.8; }
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
</head>
<body>
<div id="app"></div>
<div class="hud hud-tl">
  <h1>CAL.2026 / 17 JEWELS</h1>
  <p>手巻きムーブメント 輪列・脱進機デモ / 2振動毎秒</p>
</div>
<div class="hud hud-bl">
  <button id="b-play" class="on">⏸ 停止</button>
  <button id="b-label" class="on">ラベル ON</button>
</div>
<div class="hud hud-br">ドラッグ: 回転 / ホイール: ズーム<br>香箱 → 輪列 → ガンギ車 → アンクル → テンプ</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15130f);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.5, 2000);
camera.position.set(40, 95, 85);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 8, -8);

scene.add(new THREE.HemisphereLight(0xfff2dc, 0x171310, 0.9));
const keyL = new THREE.DirectionalLight(0xfff0d8, 2.2);
keyL.position.set(60, 120, 60);
keyL.castShadow = true;
keyL.shadow.mapSize.set(2048, 2048);
keyL.shadow.camera.left = -80; keyL.shadow.camera.right = 80;
keyL.shadow.camera.top = 80; keyL.shadow.camera.bottom = -80;
scene.add(keyL);
const fill = new THREE.PointLight(0x88aaff, 400);
fill.position.set(-60, 50, -40);
scene.add(fill);

const BRASS = new THREE.MeshStandardMaterial({ color: 0xd4ab62, roughness: 0.3, metalness: 0.9 });
const BRASS2 = new THREE.MeshStandardMaterial({ color: 0xc09a52, roughness: 0.42, metalness: 0.85 });
const STEEL = new THREE.MeshStandardMaterial({ color: 0xb9c2cc, roughness: 0.25, metalness: 0.95 });
const BLUED = new THREE.MeshStandardMaterial({ color: 0x3a5bd0, roughness: 0.3, metalness: 0.8 });
const RUBY = new THREE.MeshPhysicalMaterial({ color: 0xd01040, roughness: 0.1, metalness: 0.1, emissive: 0x550014, clearcoat: 1 });
const PLATE = new THREE.MeshStandardMaterial({ color: 0xcdb070, roughness: 0.5, metalness: 0.75 });

function gearGeometry(teeth, rRoot, rTip, depth) {
  const pts = [];
  for (let i = 0; i < teeth; i++) {
    const a = i / teeth, T = Math.PI * 2;
    pts.push([(a) * T, rRoot], [(a + 0.22) * T, rRoot], [(a + 0.32) * T, rTip], [(a + 0.52) * T, rTip], [(a + 0.62) * T, rRoot]);
  }
  const shape = new THREE.Shape();
  pts.forEach(([ang, r], i) => {
    const x = Math.cos(ang) * r, y = Math.sin(ang) * r;
    i === 0 ? shape.moveTo(x, y) : shape.lineTo(x, y);
  });
  shape.closePath();
  const hole = new THREE.Path();
  hole.absarc(0, 0, Math.max(rRoot * 0.12, 0.5), 0, Math.PI * 2, true);
  shape.holes.push(hole);
  const geo = new THREE.ExtrudeGeometry(shape, { depth, bevelEnabled: false, curveSegments: 6 });
  geo.rotateX(-Math.PI / 2);
  geo.translate(0, depth / 2, 0);
  return geo;
}
function spokedWheel(teeth, rPitch, depth, mat, spokes = 4) {
  const g = new THREE.Group();
  const rim = new THREE.Mesh(gearGeometry(teeth, rPitch * 0.94, rPitch * 1.06, depth), mat);
  rim.castShadow = true;
  g.add(rim);
  const hub = new THREE.Mesh(new THREE.CylinderGeometry(rPitch * 0.18, rPitch * 0.18, depth * 1.4, 16), mat);
  hub.castShadow = true;
  g.add(hub);
  for (let i = 0; i < spokes; i++) {
    const sp = new THREE.Mesh(new THREE.BoxGeometry(rPitch * 0.78, depth * 0.7, rPitch * 0.12), mat);
    sp.position.x = rPitch * 0.45 * Math.cos((i / spokes) * Math.PI * 2);
    sp.position.z = rPitch * 0.45 * Math.sin((i / spokes) * Math.PI * 2);
    sp.rotation.y = -(i / spokes) * Math.PI * 2;
    sp.castShadow = true;
    g.add(sp);
  }
  return g;
}
function pinion(teeth, rPitch, depth, mat) {
  const m = new THREE.Mesh(gearGeometry(teeth, rPitch * 0.82, rPitch * 1.18, depth), mat);
  m.castShadow = true;
  return m;
}
function jewel(y) {
  const j = new THREE.Mesh(new THREE.CylinderGeometry(1.1, 1.1, 0.7, 16), RUBY);
  j.position.y = y;
  return j;
}
function textSprite(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 52px ui-monospace, "Hiragino Sans", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.strokeStyle = 'rgba(0,0,0,0.7)'; ctx.lineWidth = 8;
  ctx.strokeText(text, 256, 64);
  ctx.fillStyle = '#f0d9a0';
  ctx.fillText(text, 256, 64);
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthTest: false }));
  sp.scale.set(22, 5.5, 1);
  return sp;
}

// ---- main plate -----------------------------------------------------------
const plate = new THREE.Mesh(new THREE.CylinderGeometry(42, 42, 3, 96), PLATE);
plate.position.y = -2;
plate.receiveShadow = true;
scene.add(plate);
const plateRim = new THREE.Mesh(new THREE.TorusGeometry(42, 1.2, 12, 96), BRASS2);
plateRim.rotation.x = Math.PI / 2;
plateRim.position.y = -1;
scene.add(plateRim);

// crown + stem (hand-wound)
const stem = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 14, 12), STEEL);
stem.rotation.z = Math.PI / 2;
stem.position.set(-46, 0, 4);
scene.add(stem);
const crown = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 4, 24), STEEL);
crown.rotation.z = Math.PI / 2;
crown.position.set(-54, 0, 4);
crown.castShadow = true;
scene.add(crown);

// ---- gear train layout ----------------------------------------------------
// pitch radii: wheel drives next pinion, center distance = rWheel + rPinion
const labels = new THREE.Group();
scene.add(labels);
function place(def) {
  const g = new THREE.Group();
  g.position.set(def.x, 0, def.z);
  scene.add(g);
  const arbor = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, def.top + 4, 10), STEEL);
  arbor.position.y = (def.top + 4) / 2 - 2;
  g.add(arbor);
  g.add(jewel(def.top + 2.2));
  const sp = textSprite(def.label);
  sp.position.set(def.x, def.top + 9, def.z);
  labels.add(sp);
  return g;
}

const defs = {
  barrel:  { x: -22, z: 6,   top: 8,  label: '香箱' },
  center:  { x: -2,  z: 6,   top: 11, label: '二番車' },
  third:   { x: 4.5, z: -8,  top: 14, label: '三番車' },
  fourth:  { x: 16.8,z: -3.6,top: 17, label: '四番車' },
  escape:  { x: 22.5,z: -13.5,top: 20, label: 'ガンギ車' },
  pallet:  { x: 19.5,z: -23.2,top: 20, label: 'アンクル' },
  balance: { x: 14,  z: -34,  top: 24, label: 'テンプ' },
};

const barrelG = place(defs.barrel);
const barrelBody = new THREE.Mesh(new THREE.CylinderGeometry(15, 15, 6, 48), BRASS2);
barrelBody.position.y = 3;
barrelBody.castShadow = true;
const barrelTeethM = new THREE.Mesh(gearGeometry(80, 15.2, 16.8, 2), BRASS);
barrelTeethM.position.y = 6;
const barrelSpin = new THREE.Group();
barrelSpin.add(barrelBody, barrelTeethM);
barrelG.add(barrelSpin);

const centerG = place(defs.center);
const centerSpin = new THREE.Group();
const centerWheel = spokedWheel(64, 12, 1.4, BRASS, 5);
centerWheel.position.y = 9;
centerSpin.add(centerWheel);
const centerPin = pinion(10, 4, 3, STEEL); centerPin.position.y = 6;
centerSpin.add(centerPin);
centerG.add(centerSpin);

const thirdG = place(defs.third);
const thirdSpin = new THREE.Group();
const thirdPin = pinion(9, 3.5, 3, STEEL); thirdPin.position.y = 9;
const thirdWheel = spokedWheel(60, 10, 1.2, BRASS, 5); thirdWheel.position.y = 12;
thirdSpin.add(thirdPin, thirdWheel);
thirdG.add(thirdSpin);

const fourthG = place(defs.fourth);
const fourthSpin = new THREE.Group();
const fourthPin = pinion(8, 3, 3, STEEL); fourthPin.position.y = 12;
const fourthWheel = spokedWheel(56, 9, 1.2, BRASS, 4); fourthWheel.position.y = 15;
fourthSpin.add(fourthPin, fourthWheel);
fourthG.add(fourthSpin);

const escapeG = place(defs.escape);
const escapeSpin = new THREE.Group();
const escPin = pinion(7, 2.5, 3, STEEL); escPin.position.y = 15;
const escWheel = new THREE.Mesh(gearGeometry(15, 5.4, 7.2, 1), STEEL);
escWheel.position.y = 18;
escWheel.castShadow = true;
escapeSpin.add(escPin, escWheel);
escapeG.add(escapeSpin);

// pallet fork (アンクル)
const palletG = place(defs.pallet);
const palletSpin = new THREE.Group();
palletSpin.position.y = 18.5;
const forkBody = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 13), STEEL);
forkBody.position.z = -5;
forkBody.castShadow = true;
palletSpin.add(forkBody);
const forkArmL = new THREE.Mesh(new THREE.BoxGeometry(7, 1, 2), STEEL);
forkArmL.position.set(-2.6, 0, 1.2);
forkArmL.rotation.y = 0.5;
palletSpin.add(forkArmL);
const forkArmR = new THREE.Mesh(new THREE.BoxGeometry(7, 1, 2), STEEL);
forkArmR.position.set(2.6, 0, 1.2);
forkArmR.rotation.y = -0.5;
palletSpin.add(forkArmR);
for (const sx of [-1, 1]) {
  const stone = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 2.6), RUBY);
  stone.position.set(sx * 5.4, 0, 2.3);
  stone.rotation.y = -sx * 0.5;
  palletSpin.add(stone);
}
const horns = new THREE.Mesh(new THREE.BoxGeometry(3.4, 1, 2), STEEL);
horns.position.z = -11;
palletSpin.add(horns);
palletG.add(palletSpin);

// balance wheel (テンプ)
const balanceG = place(defs.balance);
const balSpin = new THREE.Group();
balSpin.position.y = 21;
const balRim = new THREE.Mesh(new THREE.TorusGeometry(11, 1.1, 12, 64), BRASS);
balRim.rotation.x = Math.PI / 2;
balRim.castShadow = true;
balSpin.add(balRim);
for (let i = 0; i < 2; i++) {
  const arm = new THREE.Mesh(new THREE.BoxGeometry(22, 0.9, 1.6), BRASS);
  arm.rotation.y = i * Math.PI / 2;
  balSpin.add(arm);
}
for (let i = 0; i < 8; i++) {
  const screw = new THREE.Mesh(new THREE.CylinderGeometry(0.55, 0.55, 1.4, 8), STEEL);
  const a = (i / 8) * Math.PI * 2;
  screw.position.set(Math.cos(a) * 11, 0, Math.sin(a) * 11);
  balSpin.add(screw);
}
// hairspring (ひげぜんまい) - archimedean spiral
const spiralPts = [];
for (let i = 0; i <= 320; i++) {
  const a = i / 320 * Math.PI * 8;
  const r = 1.5 + (i / 320) * 7.5;
  spiralPts.push(new THREE.Vector3(Math.cos(a) * r, 1.6, Math.sin(a) * r));
}
const spiral = new THREE.Line(new THREE.BufferGeometry().setFromPoints(spiralPts), new THREE.LineBasicMaterial({ color: 0x4a6cff }));
balSpin.add(spiral);
const balStaff = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.6, 8, 10), BLUED);
balSpin.add(balStaff);
balanceG.add(balSpin);

// bridges (brass cocks over the train)
function bridge(x1, z1, x2, z2, y, wid) {
  const len = Math.hypot(x2 - x1, z2 - z1) + 8;
  const g = new THREE.Group();
  const bar = new THREE.Mesh(new THREE.BoxGeometry(len, 1.6, wid), BRASS2);
  bar.castShadow = true;
  g.add(bar);
  for (const e of [-1, 1]) {
    const screw = new THREE.Mesh(new THREE.CylinderGeometry(1.3, 1.3, 2, 12), BLUED);
    screw.position.set(e * (len / 2 - 2), 0.4, 0);
    g.add(screw);
  }
  g.position.set((x1 + x2) / 2, y, (z1 + z2) / 2);
  g.rotation.y = -Math.atan2(z2 - z1, x2 - x1);
  return g;
}
scene.add(bridge(-22, 6, -2, 6, 13.5, 10));        // barrel bridge
scene.add(bridge(4.5, -8, 22.5, -13.5, 22, 8));    // train bridge
scene.add(bridge(14, -34, 30, -38, 26.5, 6));      // balance cock

// ---- kinematics -----------------------------------------------------------
// wheel A (rW) drives pinion B (rP): omegaB = -omegaA * rW / rP
const TICKS = 2;                                   // beats per second
const ESC_TOOTH = Math.PI * 2 / 15;
const wEsc = TICKS * ESC_TOOTH / 2;                // mean escape speed
const wFourth = -wEsc * 2.5 / 9;
const wThird = -wFourth * 3 / 10;
const wCenter = -wThird * 3.5 / 12;
const wBarrel = -wCenter * 4 / 16;

let running = true, simT = 0;
const bPlay = document.getElementById('b-play');
bPlay.addEventListener('click', () => {
  running = !running;
  bPlay.classList.toggle('on');
  bPlay.textContent = running ? '⏸ 停止' : '▶ 再生';
});
const bLabel = document.getElementById('b-label');
bLabel.addEventListener('click', () => {
  labels.visible = !labels.visible;
  bLabel.classList.toggle('on');
  bLabel.textContent = labels.visible ? 'ラベル ON' : 'ラベル OFF';
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
function smooth(x) { return x * x * (3 - 2 * x); }
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  if (running) simT += dt;

  // escapement: discrete tick twice per beat-second, eased
  const phase = simT * TICKS;
  const idx = Math.floor(phase);
  const frac = phase - idx;
  const eased = idx + (frac < 0.75 ? 0 : smooth((frac - 0.75) / 0.25));
  escapeSpin.rotation.y = -eased * ESC_TOOTH / 2;

  // continuous train (mean speeds)
  fourthSpin.rotation.y = -simT * wFourth;
  thirdSpin.rotation.y = -simT * wThird;
  centerSpin.rotation.y = -simT * wCenter;
  barrelSpin.rotation.y = -simT * wBarrel;

  // balance oscillation + pallet lock/unlock
  balSpin.rotation.y = 2.4 * Math.sin(Math.PI * 2 * simT * TICKS / 2);
  palletSpin.rotation.y = 0.22 * Math.tanh(3 * Math.cos(Math.PI * 2 * simT * TICKS / 2));

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
