<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <!-- 背景グラデーション -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbf7" />
      <stop offset="40%" stop-color="#fff3ea" />
      <stop offset="100%" stop-color="#ffdcd0" />
    </linearGradient>

    <!-- クマの毛並み（暖色系のやさしいブラウン） -->
    <radialGradient id="bear-fur" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#dca068" />
      <stop offset="55%" stop-color="#bf7f45" />
      <stop offset="100%" stop-color="#945520" />
    </radialGradient>
    
    <radialGradient id="bear-fur-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ab6b34" />
      <stop offset="100%" stop-color="#7a4216" />
    </radialGradient>

    <!-- 耳の内側・足の裏（ソフトなピンクベージュ） -->
    <radialGradient id="bear-inner-ear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe1e5" />
      <stop offset="80%" stop-color="#f3b5bd" />
      <stop offset="100%" stop-color="#e29ca5" />
    </radialGradient>

    <radialGradient id="bear-inner-ear-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5b3b9" />
      <stop offset="100%" stop-color="#d6848c" />
    </radialGradient>

    <!-- マズル（口元） -->
    <linearGradient id="bear-muzzle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#faf6f0" />
      <stop offset="100%" stop-color="#e5d5c0" />
    </linearGradient>

    <!-- ワッペン（フェルト風のイエロー） -->
    <radialGradient id="patch-grad" cx="45%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#fff2af" />
      <stop offset="70%" stop-color="#fdd835" />
      <stop offset="100%" stop-color="#f57f17" />
    </radialGradient>

    <!-- リボンのグラデーション -->
    <linearGradient id="ribbon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b90" />
      <stop offset="50%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#be123c" />
    </linearGradient>
    <linearGradient id="ribbon-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="100%" stop-color="#9f1239" />
    </linearGradient>

    <!-- ぼかしフィルター（チークや影用） -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" />
    </filter>
    <filter id="shadow-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" />
    </filter>
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="900" fill="url(#bg-grad)" />

  <!-- 床の影 -->
  <ellipse cx="600" cy="815" rx="320" ry="45" fill="#5c3821" opacity="0.12" filter="url(#shadow-blur)" />

  <!-- === 背面パーツ === -->
  <!-- 左耳 -->
  <g id="left-ear">
    <ellipse cx="420" cy="210" rx="80" ry="80" fill="url(#bear-fur)" filter="url(#subtle-shadow)" />
    <ellipse cx="425" cy="215" rx="52" ry="52" fill="url(#bear-inner-ear)" />
    <!-- ステッチ -->
    <ellipse cx="420" cy="210" rx="74" ry="74" fill="none" stroke="#754117" stroke-width="2" stroke-dasharray="6,6" />
    <ellipse cx="425" cy="215" rx="46" ry="46" fill="none" stroke="#be828a" stroke-width="1.5" stroke-dasharray="4,4" />
  </g>

  <!-- 右耳 -->
  <g id="right-ear">
    <ellipse cx="780" cy="210" rx="80" ry="80" fill="url(#bear-fur)" filter="url(#subtle-shadow)" />
    <ellipse cx="775" cy="215" rx="52" ry="52" fill="url(#bear-inner-ear)" />
    <!-- ステッチ -->
    <ellipse cx="780" cy="210" rx="74" ry="74" fill="none" stroke="#754117" stroke-width="2" stroke-dasharray="6,6" />
    <ellipse cx="775" cy="215" rx="46" ry="46" fill="none" stroke="#be828a" stroke-width="1.5" stroke-dasharray="4,4" />
  </g>

  <!-- === 脚パーツ === -->
  <!-- 左脚 -->
  <g id="left-leg">
    <ellipse cx="450" cy="740" rx="105" ry="85" fill="url(#bear-fur)" transform="rotate(-12, 450, 740)" filter="url(#subtle-shadow)" />
    <!-- 足裏パッド -->
    <ellipse cx="450" cy="740" rx="80" ry="62" fill="url(#bear-inner-ear)" transform="rotate(-12, 450, 740)" />
    <!-- 肉球 -->
    <ellipse cx="450" cy="748" rx="46" ry="34" fill="url(#bear-inner-ear-dark)" transform="rotate(-12, 450, 740)" />
    <circle cx="410" cy="695" r="14" fill="url(#bear-inner-ear-dark)" />
    <circle cx="452" cy="680" r="15" fill="url(#bear-inner-ear-dark)" />
    <circle cx="494" cy="698" r="14" fill="url(#bear-inner-ear-dark)" />
    <!-- ステッチ -->
    <ellipse cx="450" cy="740" rx="98" ry="78" fill="none" stroke="#754117" stroke-width="2" stroke-dasharray="6,6" transform="rotate(-12, 450, 740)" />
    <ellipse cx="450" cy="740" rx="74" ry="56" fill="none" stroke="#be828a" stroke-width="1.5" stroke-dasharray="5,5" transform="rotate(-12, 450, 740)" />
  </g>

  <!-- 右脚 -->
  <g id="right-leg">
    <ellipse cx="750" cy="740" rx="105" ry="85" fill="url(#bear-fur)" transform="rotate(12, 750, 740)" filter="url(#subtle-shadow)" />
    <!-- 足裏パッド -->
    <ellipse cx="750" cy="740" rx="80" ry="62" fill="url(#bear-inner-ear)" transform="rotate(12, 750, 740)" />
    <!-- 肉球 -->
    <ellipse cx="750" cy="748" rx="46" ry="34" fill="url(#bear-inner-ear-dark)" transform="rotate(12, 750, 740)" />
    <circle cx="706" cy="698" r="14" fill="url(#bear-inner-ear-dark)" />
    <circle cx="748" cy="680" r="15" fill="url(#bear-inner-ear-dark)" />
    <circle cx="790" cy="695" r="14" fill="url(#bear-inner-ear-dark)" />
    <!-- ステッチ -->
    <ellipse cx="750" cy="740" rx="98" ry="78" fill="none" stroke="#754117" stroke-width="2" stroke-dasharray="6,6" transform="rotate(12, 750, 740)" />
    <ellipse cx="750" cy="740" rx="74" ry="56" fill="none" stroke="#be828a" stroke-width="1.5" stroke-dasharray="5,5" transform="rotate(12, 750, 740)" />
  </g>

  <!-- === 胴体パーツ === -->
  <g id="body">
    <!-- 柔らかい綿入り感のある、少し横幅のあるぽっちゃり胴体 -->
    <path d="M 430,730 C 390,580 450,460 600,460 C 750,460 810,580 770,730 C 740,795 460,795 430,730 Z" fill="url(#bear-fur)" filter="url(#subtle-shadow)" />
    
    <!-- お腹の光沢・立体感マチ -->
    <path d="M 460,720 C 430,600 480,490 600,490 C 720,490 770,600 740,720 C 710,770 490,770 460,720 Z" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.08" stroke-linecap="round" />
    
    <!-- ぬいぐるみの中央の縫い合わせライン -->
    <path d="M 600,460 L 600,778" stroke="#754117" stroke-width="2.5" stroke-dasharray="6,6" />

    <!-- 胴体外周ステッチ -->
    <path d="M 430,730 C 390,580 450,460 600,460 C 750,460 810,580 770,730 C 740,795 460,795 430,730 Z" fill="none" stroke="#754117" stroke-width="2" stroke-dasharray="7,7" />
  </g>

  <!-- === 胸のワッペン === -->
  <!-- やさしいフェルト生地の風合いとステッチで質感差を表現 -->
  <g id="patch" transform="translate(60, 20)">
    <!-- ワッペンの影 -->
    <path d="M 490,540 C 490,540 465,510 445,530 C 425,550 455,590 490,610 C 525,590 555,550 535,530 C 515,510 490,540 490,540 Z" fill="#5c3821" opacity="0.15" transform="rotate(-10, 490, 560) translate(2, 4)" />
    <!-- ワッペン本体（ハート型） -->
    <path d="M 490,540 C 490,540 465,510 445,530 C 425,550 455,590 490,610 C 525,590 555,550 535,530 C 515,510 490,540 490,540 Z" fill="url(#patch-grad)" stroke="#d97706" stroke-width="3" stroke-linecap="round" transform="rotate(-10, 490, 560)" />
    <!-- ワッペンの手縫い風ステッチ -->
    <path d="M 490,543 C 490,543 468,515 450,533 C 433,550 460,585 490,603 C 520,585 547,550 530,533 C 512,515 490,543 490,543 Z" fill="none" stroke="#b45309" stroke-width="2" stroke-dasharray="5,4" transform="rotate(-10, 490, 560)" />
    <!-- ワッペンの中央のデザイン（小さなバツ印の縫い目） -->
    <path d="M 485,560 L 495,570 M 495,560 L 485,570" stroke="#b45309" stroke-width="2.5" stroke-linecap="round" transform="rotate(-10, 490, 560)" />
  </g>

  <!-- === 首元のリボン === -->
  <g id="neck-ribbon">
    <!-- リボンの帯（首の後ろ） -->
    <path d="M 470,458 Q 600,490 730,458" fill="none" stroke="url(#ribbon-dark)" stroke-width="24" stroke-linecap="round" filter="url(#subtle-shadow)" />
    <path d="M 470,458 Q 600,490 730,458" fill="none" stroke="#ffe4e6" stroke-width="2.5" stroke-dasharray="5,5" opacity="0.6" />

    <!-- 左リボンの輪 -->
    <path d="M 600,470 C 540,430 480,480 585,492 Z" fill="url(#ribbon-grad)" stroke="url(#ribbon-dark)" stroke-width="2" filter="url(#subtle-shadow)" />
    <path d="M 590,473 C 545,440 500,475 580,485" fill="none" stroke="#ffe4e6" stroke-width="2" stroke-dasharray="4,4" opacity="0.6" />

    <!-- 右リボンの輪 -->
    <path d="M 600,470 C 660,430 720,480 615,492 Z" fill="url(#ribbon-grad)" stroke="url(#ribbon-dark)" stroke-width="2" filter="url(#subtle-shadow)" />
    <path d="M 610,473 C 655,440 700,475 620,485" fill="none" stroke="#ffe4e6" stroke-width="2" stroke-dasharray="4,4" opacity="0.6" />

    <!-- 左垂れ -->
    <path d="M 590,485 L 530,570 L 565,580 L 595,495 Z" fill="url(#ribbon-dark)" filter="url(#subtle-shadow)" />
    <path d="M 583,490 L 538,558" fill="none" stroke="#ffe4e6" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5" />

    <!-- 右垂れ -->
    <path d="M 610,485 L 670,570 L 635,580 L 605,495 Z" fill="url(#ribbon-dark)" filter="url(#subtle-shadow)" />
    <path d="M 617,490 L 662,558" fill="none" stroke="#ffe4e6" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5" />

    <!-- 結び目 -->
    <rect x="585" y="458" width="30" height="28" rx="8" fill="url(#ribbon-grad)" stroke="url(#ribbon-dark)" stroke-width="2" filter="url(#subtle-shadow)" />
    <rect x="589" y="462" width="22" height="20" rx="5" fill="none" stroke="#ffe4e6" stroke-width="1.5" stroke-dasharray="3,3" opacity="0.6" />
  </g>

  <!-- === 頭部パーツ === -->
  <g id="head">
    <!-- まあるく少し平らで愛らしい形の頭 -->
    <ellipse cx="600" cy="335" rx="205" ry="175" fill="url(#bear-fur)" filter="url(#subtle-shadow)" />
    
    <!-- 頭頂 of 縫い目 -->
    <path d="M 600,160 L 600,235" stroke="#754117" stroke-width="2.5" stroke-dasharray="6,6" />
    
    <!-- おでこ〜頬のハイライト・光沢（立体感を出し、綿のふっくら感を表現） -->
    <path d="M 430,280 C 445,210 510,175 600,175" fill="none" stroke="#ffffff" stroke-width="12" opacity="0.08" stroke-linecap="round" />
    
    <!-- 頭部外周ステッチ -->
    <ellipse cx="600" cy="335" rx="198" ry="168" fill="none" stroke="#754117" stroke-width="2.5" stroke-dasharray="7,7" />
  </g>

  <!-- === 顔のパーツ === -->
  <g id="face">
    <!-- チーク（やさしいぼかしの入ったほっぺ） -->
    <circle cx="465" cy="370" r="32" fill="#ff6b6b" opacity="0.32" filter="url(#glow)" />
    <circle cx="735" cy="370" r="32" fill="#ff6b6b" opacity="0.32" filter="url(#glow)" />

    <!-- マズル（口元エリア・立体感のあるドーム形状） -->
    <ellipse cx="600" cy="385" rx="82" ry="58" fill="url(#bear-muzzle)" filter="url(#subtle-shadow)" />
    <!-- マズルのステッチ -->
    <ellipse cx="600" cy="385" rx="76" ry="52" fill="none" stroke="#bfa38a" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- 鼻（少し丸みのある愛らしい逆三角形） -->
    <path d="M 576,358 C 576,346 624,346 624,358 C 624,374 600,392 600,392 C 600,392 576,374 576,358 Z" fill="#3d2314" filter="url(#subtle-shadow)" />
    <!-- 鼻のハイライト -->
    <ellipse cx="590" cy="354" rx="6" ry="3" fill="#ffffff" opacity="0.4" transform="rotate(-15, 590, 354)" />

    <!-- 口（やさしい微笑み、Wの形のステッチライン） -->
    <path d="M 566,396 C 566,412 598,414 600,392" fill="none" stroke="#3d2314" stroke-width="3.5" stroke-linecap="round" />
    <path d="M 600,392 C 602,414 634,412 634,396" fill="none" stroke="#3d2314" stroke-width="3.5" stroke-linecap="round" />
    <!-- アゴの縫い目 -->
    <path d="M 600,412 L 600,432" stroke="#bfa38a" stroke-width="2" stroke-dasharray="3,3" />

    <!-- 左目（くりっとしたプラスチックボタンのような質感） -->
    <g id="left-eye">
      <!-- 目の影 -->
      <ellipse cx="508" cy="316" rx="20" ry="24" fill="#1f1107" opacity="0.2" filter="url(#subtle-shadow)" />
      <!-- 目本体 -->
      <ellipse cx="508" cy="314" rx="19" ry="23" fill="#26150a" />
      <!-- アイシャドウ/光彩効果（高級感のあるボタンの照り返し） -->
      <path d="M 494,314 A 14 18 0 0 0 522,314" fill="none" stroke="#523624" stroke-width="2" />
      <!-- メインハイライト -->
      <circle cx="502" cy="305" r="7" fill="#ffffff" />
      <!-- サブハイライト -->
      <circle cx="515" cy="322" r="3.5" fill="#ffffff" opacity="0.8" />
    </g>

    <!-- 右目 -->
    <g id="right-eye">
      <!-- 目の影 -->
      <ellipse cx="692" cy="316" rx="20" ry="24" fill="#1f1107" opacity="0.2" filter="url(#subtle-shadow)" />
      <!-- 目本体 -->
      <ellipse cx="692" cy="314" rx="19" ry="23" fill="#26150a" />
      <!-- アイシャドウ/光彩効果 -->
      <path d="M 678,314 A 14 18 0 0 0 706,314" fill="none" stroke="#523624" stroke-width="2" />
      <!-- メインハイライト -->
      <circle cx="686" cy="305" r="7" fill="#ffffff" />
      <!-- サブハイライト -->
      <circle cx="699" cy="322" r="3.5" fill="#ffffff" opacity="0.8" />
    </g>
  </g>

  <!-- === 手（腕）パーツ === -->
  <!-- 胴体の手前に重ねて描画することで、立体的な抱っこポーズを表現 -->
  <!-- 左腕 -->
  <g id="left-arm">
    <!-- 腕の影 -->
    <path d="M 445,490 C 355,505 320,590 380,625 C 440,650 465,560 460,490 Z" fill="#5c3821" opacity="0.15" filter="url(#subtle-shadow)" />
    <!-- 腕本体 -->
    <path d="M 445,486 C 355,501 320,586 380,621 C 440,646 465,556 460,486 Z" fill="url(#bear-fur)" />
    <!-- ハイライト -->
    <path d="M 370,520 C 345,550 355,595 385,610" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.1" stroke-linecap="round" />
    <!-- ステッチ -->
    <path d="M 445,486 C 355,501 320,586 380,621 C 440,646 465,556 460,486 Z" fill="none" stroke="#754117" stroke-width="2" stroke-dasharray="6,6" />
  </g>

  <!-- 右腕 -->
  <g id="right-arm">
    <!-- 腕の影 -->
    <path d="M 755,490 C 845,505 880,590 820,625 C 760,650 735,560 740,490 Z" fill="#5c3821" opacity="0.15" filter="url(#subtle-shadow)" />
    <!-- 腕本体 -->
    <path d="M 755,486 C 845,501 880,586 820,621 C 760,646 735,556 740,486 Z" fill="url(#bear-fur)" />
    <!-- ハイライト -->
    <path d="M 830,520 C 855,550 845,595 815,610" fill="none" stroke="#ffffff" stroke-width="6" opacity="0.1" stroke-linecap="round" />
    <!-- ステッチ -->
    <path d="M 755,486 C 845,501 880,586 820,621 C 760,646 735,556 740,486 Z" fill="none" stroke="#754117" stroke-width="2" stroke-dasharray="6,6" />
  </g>
</svg>
