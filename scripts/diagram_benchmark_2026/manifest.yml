    title: クマのぬいぐるみ
    category: illustration
    source: user-mandatory
    prompt:
      - かわいいクマのぬいぐるみを正面向きで描く
      - 頭は丸く、耳は左右対称で少し大きめ
      - 胴体は柔らかい綿入りの感じが出るように、少し横幅を持たせる
      - 腕と脚は短めで、ぬいぐるみらしい丸みを付ける
      - 目、鼻、口、足裏、胸のワッペンなどで質感差を出す
      - 暖色寄りでやさしい配色にする
