<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title>Transformer Encoder-Decoder Architecture</title>
  <desc>Readable paper-style block diagram of the Transformer encoder-decoder architecture with residual connections, masked self-attention, cross-attention, linear and softmax layers.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f3a45"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b6cb0"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f7f9fb; stroke: #263238; stroke-width: 2; }
      .stack { fill: #ffffff; stroke: #263238; stroke-width: 2; }
      .block { fill: #ffffff; stroke: #263238; stroke-width: 1.8; rx: 8; ry: 8; }
      .embed { fill: #edf7ed; stroke: #2f6f3e; }
      .pos { fill: #fff7e6; stroke: #a56516; }
      .attn { fill: #eaf3ff; stroke: #2b6cb0; }
      .masked { fill: #e9e7ff; stroke: #5b46b2; }
      .ffn { fill: #fff0f0; stroke: #b83232; }
      .norm { fill: #f2f2f2; stroke: #555555; }
      .out { fill: #eef6f7; stroke: #25636a; }
      .label { font-family: Arial, Helvetica, sans-serif; font-size: 18px; fill: #16202a; text-anchor: middle; dominant-baseline: middle; }
      .small { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #2f3a45; text-anchor: middle; dominant-baseline: middle; }
      .tiny { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #2f3a45; text-anchor: middle; dominant-baseline: middle; }
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; fill: #111827; text-anchor: middle; }
      .section { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; fill: #111827; text-anchor: middle; }
      .note { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #374151; text-anchor: middle; }
      .arrow { fill: none; stroke: #2f3a45; stroke-width: 2.2; marker-end: url(#arrow); }
      .arrowThin { fill: none; stroke: #2f3a45; stroke-width: 1.7; marker-end: url(#arrow); }
      .arrowBlue { fill: none; stroke: #2b6cb0; stroke-width: 2.4; marker-end: url(#arrowBlue); }
      .residual { fill: none; stroke: #6b7280; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .divider { stroke: #d0d7de; stroke-width: 2; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="900"/>
  <text class="title" x="600" y="48">Transformer Architecture</text>
  <line class="divider" x1="600" y1="85" x2="600" y2="840"/>

  <text class="section" x="315" y="104">Encoder Stack</text>
  <text class="section" x="885" y="104">Decoder Stack</text>

  <rect class="panel" x="120" y="130" width="390" height="650" rx="12"/>
  <rect class="panel" x="690" y="130" width="390" height="650" rx="12"/>

  <rect class="embed block" x="195" y="715" width="240" height="48"/>
  <text class="label" x="315" y="739">Input Embedding</text>

  <rect class="pos block" x="195" y="650" width="240" height="48"/>
  <text class="label" x="315" y="674">Positional Encoding</text>

  <rect class="stack" x="165" y="245" width="300" height="365" rx="12"/>
  <text class="small" x="315" y="268">N x</text>

  <rect class="attn block" x="210" y="310" width="210" height="58"/>
  <text class="small" x="315" y="330">Multi-Head</text>
  <text class="small" x="315" y="350">Self-Attention</text>

  <rect class="norm block" x="210" y="390" width="210" height="48"/>
  <text class="label" x="315" y="414">Add &amp; Norm</text>

  <rect class="ffn block" x="210" y="470" width="210" height="58"/>
  <text class="label" x="315" y="499">Feed Forward</text>

  <rect class="norm block" x="210" y="550" width="210" height="48"/>
  <text class="label" x="315" y="574">Add &amp; Norm</text>

  <text class="small" x="315" y="812">Encoder Output</text>

  <path class="arrow" d="M315 763 L315 700"/>
  <path class="arrow" d="M315 650 L315 610"/>
  <path class="arrow" d="M315 610 L315 368"/>
  <path class="arrow" d="M315 368 L315 390"/>
  <path class="arrow" d="M315 438 L315 470"/>
  <path class="arrow" d="M315 528 L315 550"/>
  <path class="arrow" d="M315 598 L315 810"/>

  <path class="residual" d="M210 339 C155 339 155 414 210 414"/>
  <text class="tiny" x="151" y="376">residual</text>
  <path class="residual" d="M420 499 C475 499 475 574 420 574"/>
  <text class="tiny" x="481" y="536">residual</text>

  <rect class="embed block" x="765" y="715" width="240" height="48"/>
  <text class="label" x="885" y="739">Output Embedding</text>

  <rect class="pos block" x="765" y="650" width="240" height="48"/>
  <text class="label" x="885" y="674">Positional Encoding</text>

  <rect class="stack" x="720" y="185" width="330" height="425" rx="12"/>
  <text class="small" x="885" y="208">N x</text>

  <rect class="masked block" x="780" y="235" width="210" height="58"/>
  <text class="small" x="885" y="255">Masked Multi-Head</text>
  <text class="small" x="885" y="275">Self-Attention</text>

  <rect class="norm block" x="780" y="315" width="210" height="48"/>
  <text class="label" x="885" y="339">Add &amp; Norm</text>

  <rect class="attn block" x="780" y="385" width="210" height="58"/>
  <text class="small" x="885" y="405">Cross-Attention</text>
  <text class="tiny" x="885" y="426">queries from decoder, keys/values from encoder</text>

  <rect class="norm block" x="780" y="465" width="210" height="48"/>
  <text class="label" x="885" y="489">Add &amp; Norm</text>

  <rect class="ffn block" x="780" y="535" width="210" height="48"/>
  <text class="label" x="885" y="559">Feed Forward</text>

  <rect class="norm block" x="780" y="625" width="210" height="48"/>
  <text class="label" x="885" y="649">Add &amp; Norm</text>

  <rect class="out block" x="765" y="90" width="240" height="48"/>
  <text class="label" x="885" y="114">Linear</text>

  <rect class="out block" x="765" y="25" width="240" height="48"/>
  <text class="label" x="885" y="49">Softmax</text>

  <text class="small" x="885" y="812">Output Probabilities</text>

  <path class="arrow" d="M885 763 L885 700"/>
  <path class="arrow" d="M885 650 L885 673"/>
  <path class="arrow" d="M885 650 L885 293"/>
  <path class="arrow" d="M885 293 L885 315"/>
  <path class="arrow" d="M885 363 L885 385"/>
  <path class="arrow" d="M885 443 L885 465"/>
  <path class="arrow" d="M885 513 L885 535"/>
  <path class="arrow" d="M885 583 L885 625"/>
  <path class="arrow" d="M885 625 L885 138"/>
  <path class="arrow" d="M885 90 L885 73"/>

  <path class="residual" d="M780 264 C725 264 725 339 780 339"/>
  <text class="tiny" x="721" y="301">residual</text>
  <path class="residual" d="M990 414 C1045 414 1045 489 990 489"/>
  <text class="tiny" x="1051" y="451">residual</text>
  <path class="residual" d="M780 559 C725 559 725 649 780 649"/>
  <text class="tiny" x="721" y="604">residual</text>

  <path class="arrowBlue" d="M465 574 C570 574 635 414 780 414"/>
  <text class="note" x="625" y="452">encoder output to cross-attention</text>

  <path class="arrowThin" d="M137 739 L195 739"/>
  <text class="small" x="92" y="739">Inputs</text>

  <path class="arrowThin" d="M707 739 L765 739"/>
  <text class="small" x="655" y="739">Shifted Outputs</text>

  <path class="arrowThin" d="M885 25 L885 3"/>
  <text class="small" x="1038" y="49">Next-token distribution</text>

  <rect x="130" y="150" width="18" height="18" fill="#eaf3ff" stroke="#2b6cb0"/>
  <text class="tiny" x="228" y="159">Self-attention block</text>
  <rect x="130" y="176" width="18" height="18" fill="#e9e7ff" stroke="#5b46b2"/>
  <text class="tiny" x="243" y="185">Masked decoder attention</text>
  <line x1="130" y1="211" x2="168" y2="211" stroke="#6b7280" stroke-width="2" stroke-dasharray="7 5" marker-end="url(#arrow)"/>
  <text class="tiny" x="240" y="211">Residual connection into Add &amp; Norm</text>
</svg>
