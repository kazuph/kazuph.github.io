<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="夏祭りの花火大会">
  <defs>
    <linearGradient id="nightSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#07112d"/>
      <stop offset="45%" stop-color="#0b1e46"/>
      <stop offset="78%" stop-color="#10284f"/>
      <stop offset="100%" stop-color="#09101f"/>
    </linearGradient>

    <radialGradient id="horizonGlow" cx="50%" cy="74%" r="58%">
      <stop offset="0%" stop-color="#f6b35d" stop-opacity="0.32"/>
      <stop offset="38%" stop-color="#e87545" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#07112d" stop-opacity="0"/>
