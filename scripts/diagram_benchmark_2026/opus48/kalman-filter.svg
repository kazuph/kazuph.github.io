<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900" font-family="'Helvetica Neue', Arial, sans-serif">
  <defs>
    <marker id="s" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#4b5563"/>
    </marker>
    <marker id="f" markerWidth="11" markerHeight="11" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#b91c1c"/>
    </marker>
  </defs>
  <rect width="1200" height="900" fill="#ffffff"/>
  <text x="560" y="70" text-anchor="middle" font-size="30" font-weight="bold" fill="#1f2933">Kalman Filter — Block Diagram</text>

  <!-- phase labels -->
  <text x="250" y="150" text-anchor="middle" font-size="18" fill="#9ca3af">Time update (predict)</text>
  <text x="690" y="330" text-anchor="middle" font-size="18" fill="#9ca3af">Measurement update (correct)</text>

  <!-- boxes -->
  <g>
    <rect x="120" y="180" width="300" height="140" rx="14" fill="#3b82f62e" stroke="#3b82f6" stroke-width="3"/>
    <text x="270" y="240" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f2933">Prediction</text>
    <text x="270" y="280" text-anchor="middle" font-size="18" fill="#374151">x̂<tspan baseline-shift="super" font-size="12">−</tspan><tspan baseline-shift="sub" font-size="12">k</tspan> , P<tspan baseline-shift="super" font-size="12">−</tspan><tspan baseline-shift="sub" font-size="12">k</tspan></text>

    <rect x="120" y="560" width="300" height="140" rx="14" fill="#f59e0b2e" stroke="#f59e0b" stroke-width="3"/>
    <text x="270" y="620" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f2933">Measurement</text>
    <text x="270" y="660" text-anchor="middle" font-size="18" fill="#374151">z<tspan baseline-shift="sub" font-size="12">k</tspan></text>

    <rect x="540" y="370" width="320" height="140" rx="14" fill="#10b9812e" stroke="#10b981" stroke-width="3"/>
    <text x="700" y="430" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f2933">Update</text>
    <text x="700" y="470" text-anchor="middle" font-size="18" fill="#374151">Kalman gain K<tspan baseline-shift="sub" font-size="12">k</tspan></text>

    <rect x="960" y="370" width="220" height="140" rx="14" fill="#8b5cf62e" stroke="#8b5cf6" stroke-width="3"/>
    <text x="1070" y="430" text-anchor="middle" font-size="19" font-weight="bold" fill="#1f2933">State estimate</text>
    <text x="1070" y="470" text-anchor="middle" font-size="18" fill="#374151">x̂<tspan baseline-shift="sub" font-size="12">k</tspan> , P<tspan baseline-shift="sub" font-size="12">k</tspan></text>
  </g>

  <!-- signal flows -->
  <line x1="420" y1="250" x2="545" y2="410" stroke="#4b5563" stroke-width="3" marker-end="url(#s)"/>
  <text x="468" y="320" font-size="18" fill="#374151">x̂<tspan baseline-shift="super" font-size="12">−</tspan><tspan baseline-shift="sub" font-size="12">k</tspan></text>
  <line x1="420" y1="630" x2="545" y2="470" stroke="#4b5563" stroke-width="3" marker-end="url(#s)"/>
  <text x="470" y="600" font-size="18" fill="#374151">z<tspan baseline-shift="sub" font-size="12">k</tspan></text>
  <line x1="860" y1="440" x2="955" y2="440" stroke="#4b5563" stroke-width="3" marker-end="url(#s)"/>
  <text x="908" y="420" text-anchor="middle" font-size="18" fill="#374151">x̂<tspan baseline-shift="sub" font-size="12">k</tspan></text>
  <text x="475" y="540" text-anchor="middle" font-size="16" fill="#b91c1c">residual z<tspan baseline-shift="sub" font-size="11">k</tspan> − H x̂<tspan baseline-shift="super" font-size="11">−</tspan><tspan baseline-shift="sub" font-size="11">k</tspan></text>

  <!-- control input -->
  <line x1="40" y1="250" x2="115" y2="250" stroke="#4b5563" stroke-width="3" marker-end="url(#s)"/>
  <text x="40" y="230" font-size="18" fill="#374151">control u<tspan baseline-shift="sub" font-size="12">k</tspan></text>

  <!-- delay + feedback -->
  <rect x="640" y="150" width="120" height="90" rx="10" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="700" y="205" text-anchor="middle" font-size="22" fill="#374151">z<tspan baseline-shift="super" font-size="13">−1</tspan></text>
  <polyline points="1070,370 1070,195 762,195" fill="none" stroke="#b91c1c" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#f)"/>
  <polyline points="640,195 270,195 270,178" fill="none" stroke="#b91c1c" stroke-width="3" stroke-dasharray="9 6" marker-end="url(#f)"/>
  <text x="455" y="180" text-anchor="middle" font-size="16" fill="#b91c1c">prev x̂<tspan baseline-shift="sub" font-size="11">k−1</tspan></text>
</svg>
