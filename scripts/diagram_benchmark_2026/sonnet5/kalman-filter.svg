<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f4e8c"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#a05a1f"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="900" fill="#ffffff"/>
  <rect x="2" y="2" width="1196" height="896" fill="none" stroke="#e2e2e2" stroke-width="1"/>

  <text x="600" y="42" font-size="28" font-weight="700" fill="#152a4a" text-anchor="middle">Kalman Filter — Block Diagram</text>
  <text x="600" y="66" font-size="14" font-style="italic" fill="#5a6478" text-anchor="middle">Recursive Predict → Update loop  —  boxes = operations, circles = summing junctions, arrows = signal flow</text>

  <!-- ============ PREDICTION BAND ============ -->
  <rect x="40" y="88" width="1130" height="210" rx="16" fill="#eaf2fb" stroke="#5b8fc7" stroke-width="2"/>
  <text x="64" y="112" font-size="16" font-weight="700" fill="#1f4e8c">PREDICTION  (Time Update)</text>

  <!-- control input -->
  <rect x="380" y="98" width="150" height="36" rx="6" fill="#ffffff" stroke="#5b8fc7" stroke-width="1.5"/>
  <text x="455" y="121" font-size="11.5" text-anchor="middle" fill="#1f4e8c">Control Input u(k)</text>
  <line x1="455" y1="134" x2="455" y2="147" stroke="#5b8fc7" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- process noise -->
  <rect x="650" y="98" width="170" height="36" rx="6" fill="#ffffff" stroke="#5b8fc7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="735" y="121" font-size="11.5" text-anchor="middle" fill="#1f4e8c">Process Noise Q</text>
  <line x1="735" y1="134" x2="735" y2="147" stroke="#5b8fc7" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>

  <!-- PrevState box -->
  <rect x="70" y="148" width="190" height="118" rx="10" fill="#ffffff" stroke="#2b5ea3" stroke-width="2"/>
  <text x="165" y="176" font-size="12.5" font-weight="700" text-anchor="middle" fill="#152a4a">Previous Estimate</text>
  <text x="165" y="201" font-size="12.5" text-anchor="middle" fill="#152a4a" font-family="Consolas, Menlo, monospace">x̂(k−1|k−1)</text>
  <text x="165" y="222" font-size="12.5" text-anchor="middle" fill="#152a4a" font-family="Consolas, Menlo, monospace">P(k−1|k−1)</text>
  <text x="165" y="248" font-size="10" font-style="italic" text-anchor="middle" fill="#7a8496">(fed back from output)</text>

  <line x1="260" y1="207" x2="388" y2="207" stroke="#2b5ea3" stroke-width="2.2" marker-end="url(#arrowBlue)"/>

  <!-- StateTransition box -->
  <rect x="390" y="148" width="300" height="118" rx="10" fill="#ffffff" stroke="#2b5ea3" stroke-width="2"/>
  <text x="540" y="174" font-size="12.5" font-weight="700" text-anchor="middle" fill="#152a4a">State Transition  ×A, ×B</text>
  <text x="540" y="200" font-size="11.5" text-anchor="middle" fill="#152a4a" font-family="Consolas, Menlo, monospace">x̂(k|k−1) = A x̂(k−1|k−1) + B u(k)</text>
  <text x="540" y="222" font-size="11.5" text-anchor="middle" fill="#152a4a" font-family="Consolas, Menlo, monospace">P(k|k−1) = A P(k−1|k−1) Aᵀ + Q</text>
  <text x="540" y="248" font-size="10" font-style="italic" text-anchor="middle" fill="#7a8496">(process model propagation)</text>

  <line x1="690" y1="207" x2="758" y2="207" stroke="#2b5ea3" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <text x="724" y="198" font-size="9.5" text-anchor="middle" fill="#5a6478">predict</text>

  <!-- PredictedState box -->
  <rect x="760" y="148" width="260" height="118" rx="10" fill="#dceafd" stroke="#1f4e8c" stroke-width="2.5"/>
  <text x="890" y="176" font-size="12.5" font-weight="700" text-anchor="middle" fill="#1f4e8c">Predicted State (a priori)</text>
  <text x="890" y="202" font-size="13" font-weight="700" text-anchor="middle" fill="#152a4a" font-family="Consolas, Menlo, monospace">x̂(k|k−1) , P(k|k−1)</text>
  <text x="890" y="224" font-size="9.5" font-style="italic" text-anchor="middle" fill="#7a8496">sent to Update phase</text>
  <text x="890" y="242" font-size="9.5" font-style="italic" text-anchor="middle" fill="#7a8496">(x̂ also bypassed to correction step)</text>

  <!-- connector down to update band -->
  <line x1="890" y1="266" x2="890" y2="398" stroke="#3a6bb0" stroke-width="2.4" marker-end="url(#arrowBlue)"/>
  <text x="900" y="330" font-size="10.5" fill="#3a6bb0">a priori: x̂(k|k−1), P(k|k−1)</text>

  <!-- ============ UPDATE BAND ============ -->
  <rect x="40" y="300" width="1130" height="520" rx="16" fill="#fdf1e6" stroke="#c9862f" stroke-width="2"/>
  <text x="64" y="326" font-size="16" font-weight="700" fill="#a05a1f">UPDATE  (Measurement Update)</text>

  <!-- Measurement input -->
  <rect x="520" y="305" width="140" height="55" rx="6" fill="#ffffff" stroke="#a05a1f" stroke-width="1.5"/>
  <text x="590" y="328" font-size="11.5" font-weight="700" text-anchor="middle" fill="#7a3d10">Measurement</text>
  <text x="590" y="346" font-size="12" text-anchor="middle" fill="#7a3d10" font-family="Consolas, Menlo, monospace">z(k)</text>
  <line x1="590" y1="360" x2="590" y2="374" stroke="#a05a1f" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="606" y="373" font-size="12" fill="#2e7d32" font-weight="700">+</text>

  <!-- H box -->
  <rect x="680" y="355" width="170" height="90" rx="8" fill="#ffffff" stroke="#a05a1f" stroke-width="1.8"/>
  <text x="765" y="378" font-size="12" font-weight="700" text-anchor="middle" fill="#7a3d10">Observation Model ×H</text>
  <text x="765" y="400" font-size="11" text-anchor="middle" fill="#7a3d10" font-family="Consolas, Menlo, monospace">ŷ(k|k−1) = H x̂(k|k−1)</text>
  <text x="765" y="420" font-size="9.5" font-style="italic" text-anchor="middle" fill="#9c7a4f">(predicted measurement)</text>

  <!-- branch point wiring (drawn before the dot so the dot sits on top) -->
  <line x1="890" y1="400" x2="850" y2="400" stroke="#a05a1f" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <line x1="890" y1="400" x2="890" y2="518" stroke="#a05a1f" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <line x1="890" y1="400" x2="1120" y2="400" stroke="#3a6bb0" stroke-width="2"/>
  <line x1="1120" y1="400" x2="1120" y2="700" stroke="#3a6bb0" stroke-width="2"/>
  <line x1="1120" y1="700" x2="360" y2="700" stroke="#3a6bb0" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="1000" y="392" font-size="9.5" fill="#3a6bb0">x̂(k|k−1) bypass (a priori term)</text>
  <circle cx="890" cy="400" r="5" fill="#a05a1f"/>

  <line x1="680" y1="400" x2="618" y2="400" stroke="#a05a1f" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <text x="655" y="392" font-size="12" fill="#c62828" font-weight="700">−</text>

  <!-- Sigma1 (innovation / residual) -->
  <circle cx="590" cy="400" r="26" fill="#ffffff" stroke="#a05a1f" stroke-width="2.4"/>
  <text x="590" y="408" font-size="19" text-anchor="middle" fill="#7a3d10" font-weight="700">Σ</text>

  <line x1="590" y1="426" x2="590" y2="563" stroke="#a05a1f" stroke-width="2"/>
  <line x1="590" y1="565" x2="598" y2="565" stroke="#a05a1f" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <text x="480" y="470" font-size="10.5" fill="#7a3d10">innovation / residual</text>
  <text x="480" y="486" font-size="11.5" fill="#7a3d10" font-family="Consolas, Menlo, monospace">e(k) = z(k) − H x̂(k|k−1)</text>

  <!-- Gain box -->
  <rect x="760" y="520" width="260" height="90" rx="8" fill="#fff4e8" stroke="#a05a1f" stroke-width="2.2"/>
  <text x="890" y="546" font-size="12.5" font-weight="700" text-anchor="middle" fill="#7a3d10">Kalman Gain  K(k)</text>
  <text x="890" y="568" font-size="10" text-anchor="middle" fill="#7a3d10" font-family="Consolas, Menlo, monospace">K(k) = P(k|k−1)Hᵀ [H P(k|k−1)Hᵀ + R]⁻¹</text>
  <text x="890" y="592" font-size="9.5" font-style="italic" text-anchor="middle" fill="#9c7a4f">(optimal blending weight)</text>

  <line x1="760" y1="565" x2="642" y2="565" stroke="#a05a1f" stroke-width="2.2" marker-end="url(#arrowOrange)"/>

  <!-- multiply node -->
  <circle cx="620" cy="565" r="20" fill="#ffffff" stroke="#a05a1f" stroke-width="2.2"/>
  <text x="620" y="573" font-size="17" text-anchor="middle" fill="#7a3d10" font-weight="700">×</text>

  <!-- R box -->
  <rect x="760" y="632" width="200" height="46" rx="6" fill="#ffffff" stroke="#a05a1f" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="860" y="659" font-size="11.5" text-anchor="middle" fill="#7a3d10">Measurement Noise R</text>
  <line x1="860" y1="632" x2="860" y2="612" stroke="#a05a1f" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowOrange)"/>

  <!-- correction path from multiply node to Sigma2 -->
  <line x1="620" y1="585" x2="620" y2="750" stroke="#a05a1f" stroke-width="2.2"/>
  <line x1="620" y1="750" x2="332" y2="750" stroke="#a05a1f" stroke-width="2.2"/>
  <line x1="330" y1="750" x2="330" y2="730" stroke="#a05a1f" stroke-width="2.2" marker-end="url(#arrowOrange)"/>
  <text x="475" y="742" font-size="10.5" fill="#7a3d10" text-anchor="middle">correction  K(k)·e(k)</text>

  <!-- Sigma2 (state correction sum) -->
  <circle cx="330" cy="700" r="28" fill="#ffffff" stroke="#a05a1f" stroke-width="2.6"/>
  <text x="330" y="709" font-size="20" text-anchor="middle" fill="#7a3d10" font-weight="700">Σ</text>
  <text x="340" y="693" font-size="12" fill="#2e7d32" font-weight="700">+</text>
  <text x="316" y="726" font-size="12" fill="#2e7d32" font-weight="700">+</text>

  <line x1="302" y1="700" x2="292" y2="700" stroke="#a05a1f" stroke-width="2.2" marker-end="url(#arrowOrange)"/>

  <!-- Output box -->
  <rect x="70" y="630" width="220" height="150" rx="10" fill="#e8f6ea" stroke="#2e7d32" stroke-width="2.4"/>
  <text x="180" y="656" font-size="13" font-weight="700" text-anchor="middle" fill="#1b5e20">STATE ESTIMATE (a posteriori)</text>
  <text x="180" y="682" font-size="11" text-anchor="middle" fill="#1b5e20" font-family="Consolas, Menlo, monospace">x̂(k|k) = x̂(k|k−1) + K(k) e(k)</text>
  <text x="180" y="704" font-size="11" text-anchor="middle" fill="#1b5e20" font-family="Consolas, Menlo, monospace">P(k|k) = (I − K(k)H) P(k|k−1)</text>
  <text x="180" y="732" font-size="10" font-style="italic" text-anchor="middle" fill="#4a7a4d">→ filter output</text>
  <text x="180" y="752" font-size="10" font-style="italic" text-anchor="middle" fill="#4a7a4d">→ fed back for next cycle (k → k+1)</text>

  <!-- feedback loop back to Prediction phase -->
  <line x1="70" y1="705" x2="30" y2="705" stroke="#2e7d32" stroke-width="2.2"/>
  <line x1="30" y1="705" x2="30" y2="480" stroke="#2e7d32" stroke-width="2.2"/>
  <rect x="8" y="430" width="44" height="50" rx="6" fill="#ffffff" stroke="#2e7d32" stroke-width="2"/>
  <text x="30" y="450" font-size="11" text-anchor="middle" fill="#1b5e20" font-weight="700">z⁻¹</text>
  <text x="30" y="464" font-size="8" text-anchor="middle" fill="#1b5e20">delay</text>
  <line x1="30" y1="430" x2="30" y2="207" stroke="#2e7d32" stroke-width="2.2"/>
  <line x1="30" y1="207" x2="68" y2="207" stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrowGreen)"/>

  <!-- legend -->
  <text x="600" y="850" font-size="11" text-anchor="middle" fill="#555555">A = state transition matrix   B = control matrix   H = observation matrix   Q = process noise covariance   R = measurement noise covariance</text>
  <text x="600" y="870" font-size="11" text-anchor="middle" fill="#555555">K(k) = Kalman gain   e(k) = innovation / residual   Σ = summing junction   (·)ᵀ = transpose   (·)⁻¹ = matrix inverse</text>
</svg>
