<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0,0 L10,5 L0,10 Z" fill="#e63946"/>
    </marker>
    <marker id="arrowViolet" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" viewBox="0 0 10 10">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7209b7"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1200" height="900" fill="#f8f7f2"/>
  <rect x="10" y="10" width="1180" height="880" fill="none" stroke="#1d3557" stroke-width="2"/>

  <!-- title -->
  <text x="600" y="40" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#1d3557" text-anchor="middle">Michelson Interferometer</text>

  <!-- ===== dimension guides (arm lengths, showing symmetry) ===== -->
  <line x1="612" y1="473" x2="612" y2="483" stroke="#6c757d" stroke-width="1.5"/>
  <line x1="938" y1="473" x2="938" y2="483" stroke="#6c757d" stroke-width="1.5"/>
  <line x1="612" y1="478" x2="938" y2="478" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="775" y="498" font-family="Helvetica, Arial, sans-serif" font-size="15" font-style="italic" fill="#6c757d" text-anchor="middle">L1</text>

  <line x1="655" y1="112" x2="665" y2="112" stroke="#6c757d" stroke-width="1.5"/>
  <line x1="655" y1="441" x2="665" y2="441" stroke="#6c757d" stroke-width="1.5"/>
  <line x1="660" y1="112" x2="660" y2="441" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="672" y="280" font-family="Helvetica, Arial, sans-serif" font-size="15" font-style="italic" fill="#6c757d">L2</text>

  <!-- ===== beam paths ===== -->
  <!-- Laser -> Beam Splitter -->
  <line x1="322" y1="450" x2="596" y2="450" stroke="#e63946" stroke-width="3" marker-end="url(#arrowRed)"/>

  <!-- Beam Splitter -> Mirror A (outgoing, upper offset) -->
  <line x1="612" y1="441" x2="938" y2="441" stroke="#e63946" stroke-width="3" marker-end="url(#arrowRed)"/>
  <!-- Mirror A -> Beam Splitter (return, lower offset) -->
  <line x1="938" y1="459" x2="612" y2="459" stroke="#e63946" stroke-width="3" marker-end="url(#arrowRed)"/>
  <path d="M938,441 Q946,450 938,459" stroke="#e63946" stroke-width="2.5" fill="none"/>

  <!-- Beam Splitter -> Mirror B (outgoing, left offset) -->
  <line x1="592" y1="441" x2="592" y2="112" stroke="#e63946" stroke-width="3" marker-end="url(#arrowRed)"/>
  <!-- Mirror B -> Beam Splitter (return, right offset) -->
  <line x1="608" y1="112" x2="608" y2="441" stroke="#e63946" stroke-width="3" marker-end="url(#arrowRed)"/>
  <path d="M592,112 Q600,105 608,112" stroke="#e63946" stroke-width="2.5" fill="none"/>

  <!-- Recombined beam: Beam Splitter -> Screen -->
  <line x1="600" y1="459" x2="600" y2="745" stroke="#7209b7" stroke-width="4" marker-end="url(#arrowViolet)"/>

  <!-- ===== Laser ===== -->
  <rect x="120" y="405" width="170" height="90" rx="6" fill="#1d3557" stroke="#14213d" stroke-width="2.5"/>
  <text x="205" y="456" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle">LASER</text>
  <rect x="286" y="438" width="26" height="24" fill="#495057" stroke="#14213d" stroke-width="1.5"/>
  <circle cx="312" cy="450" r="16" fill="#e63946" opacity="0.25"/>
  <circle cx="312" cy="450" r="8" fill="#e63946" stroke="#14213d" stroke-width="1.5"/>

  <!-- ===== Beam Splitter (BS) plate ===== -->
  <polygon points="569,411 639,481 631,489 561,419" fill="#a8dadc" fill-opacity="0.85" stroke="#1d3557" stroke-width="2.5"/>
  <line x1="745" y1="345" x2="622" y2="460" stroke="#1d3557" stroke-width="1.2" stroke-dasharray="3,3"/>
  <text x="750" y="340" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1d3557">BEAM SPLITTER (BS)</text>

  <!-- ===== Mirror A (right, vertical) ===== -->
  <rect x="950" y="400" width="16" height="100" fill="#457b9d" stroke="#14213d" stroke-width="2.5"/>
  <line x1="966" y1="402" x2="980" y2="414" stroke="#457b9d" stroke-width="2"/>
  <line x1="966" y1="420" x2="980" y2="432" stroke="#457b9d" stroke-width="2"/>
  <line x1="966" y1="438" x2="980" y2="450" stroke="#457b9d" stroke-width="2"/>
  <line x1="966" y1="456" x2="980" y2="468" stroke="#457b9d" stroke-width="2"/>
  <line x1="966" y1="474" x2="980" y2="486" stroke="#457b9d" stroke-width="2"/>
  <line x1="966" y1="490" x2="980" y2="502" stroke="#457b9d" stroke-width="2"/>
  <text x="958" y="520" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1d3557" text-anchor="middle">MIRROR A</text>

  <!-- ===== Mirror B (top, horizontal) ===== -->
  <rect x="545" y="84" width="110" height="16" fill="#457b9d" stroke="#14213d" stroke-width="2.5"/>
  <line x1="555" y1="84" x2="543" y2="68" stroke="#457b9d" stroke-width="2"/>
  <line x1="572" y1="84" x2="560" y2="68" stroke="#457b9d" stroke-width="2"/>
  <line x1="589" y1="84" x2="577" y2="68" stroke="#457b9d" stroke-width="2"/>
  <line x1="606" y1="84" x2="594" y2="68" stroke="#457b9d" stroke-width="2"/>
  <line x1="623" y1="84" x2="611" y2="68" stroke="#457b9d" stroke-width="2"/>
  <line x1="640" y1="84" x2="628" y2="68" stroke="#457b9d" stroke-width="2"/>
  <text x="600" y="60" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1d3557" text-anchor="middle">MIRROR B</text>

  <!-- ===== Screen ===== -->
  <defs>
    <clipPath id="screenClip">
      <rect x="520" y="750" width="160" height="120"/>
    </clipPath>
  </defs>
  <rect x="520" y="750" width="160" height="120" fill="#ffffff" stroke="#1d3557" stroke-width="2.5"/>
  <g clip-path="url(#screenClip)">
    <circle cx="600" cy="810" r="14" fill="none" stroke="#457b9d" stroke-width="3" opacity="0.7"/>
    <circle cx="600" cy="810" r="28" fill="none" stroke="#a8dadc" stroke-width="3" opacity="0.7"/>
    <circle cx="600" cy="810" r="42" fill="none" stroke="#457b9d" stroke-width="3" opacity="0.7"/>
    <circle cx="600" cy="810" r="56" fill="none" stroke="#a8dadc" stroke-width="3" opacity="0.7"/>
    <circle cx="600" cy="810" r="70" fill="none" stroke="#457b9d" stroke-width="3" opacity="0.7"/>
    <circle cx="600" cy="810" r="84" fill="none" stroke="#a8dadc" stroke-width="3" opacity="0.7"/>
    <circle cx="600" cy="810" r="98" fill="none" stroke="#457b9d" stroke-width="3" opacity="0.7"/>
  </g>
  <text x="600" y="884" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#1d3557" text-anchor="middle">SCREEN</text>

  <!-- ===== legend ===== -->
  <rect x="35" y="755" width="420" height="95" fill="#ffffff" fill-opacity="0.85" stroke="#6c757d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="50" y="778" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1d3557">LEGEND</text>
  <line x1="50" y1="798" x2="95" y2="798" stroke="#e63946" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="105" y="803" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1d3557">Split beam (Laser to BS to Mirror A / Mirror B)</text>
  <line x1="50" y1="828" x2="95" y2="828" stroke="#7209b7" stroke-width="3.5" marker-end="url(#arrowViolet)"/>
  <text x="105" y="833" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#1d3557">Recombined beam (BS to Screen, interference)</text>
</svg>
