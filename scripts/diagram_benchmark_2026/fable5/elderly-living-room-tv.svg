<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <!-- room -->
  <rect x="0" y="0" width="1200" height="600" fill="#F6ECDA"/>
  <rect x="0" y="600" width="1200" height="300" fill="#D2B086"/>
  <g stroke="#BE9A6E" stroke-width="3">
    <line x1="0" y1="900" x2="120" y2="600"/>
    <line x1="200" y1="900" x2="320" y2="600"/>
    <line x1="400" y1="900" x2="520" y2="600"/>
    <line x1="600" y1="900" x2="720" y2="600"/>
    <line x1="800" y1="900" x2="920" y2="600"/>
    <line x1="1000" y1="900" x2="1120" y2="600"/>
  </g>

  <!-- window with curtains -->
  <rect x="460" y="80" width="280" height="260" fill="#B4D6E8" stroke="#A07448" stroke-width="8"/>
  <line x1="600" y1="80" x2="600" y2="340" stroke="#FFFFFF" stroke-width="7"/>
  <line x1="460" y1="210" x2="740" y2="210" stroke="#FFFFFF" stroke-width="7"/>
  <path d="M455 60 L455 350 Q430 220 415 60 Z" fill="#E29478"/>
  <path d="M745 60 L745 350 Q770 220 785 60 Z" fill="#E29478"/>
  <rect x="400" y="48" width="400" height="26" fill="#CD7C60" rx="10"/>

  <!-- floor lamp with warm glow -->
  <polygon points="1020,300 920,500 1120,500" fill="#FADC8C" opacity="0.4"/>
  <line x1="1020" y1="600" x2="1020" y2="300" stroke="#A07448" stroke-width="10"/>
  <rect x="975" y="595" width="90" height="16" rx="8" fill="#A07448"/>
  <polygon points="955,300 1085,300 1055,200 985,200" fill="#FADC8C" stroke="#A07448" stroke-width="5"/>

  <!-- TV on wooden stand (left) -->
  <rect x="70" y="540" width="320" height="70" fill="#A07448"/>
  <rect x="90" y="610" width="30" height="50" fill="#6E5030"/>
  <rect x="340" y="610" width="30" height="50" fill="#6E5030"/>
  <rect x="80" y="240" width="300" height="300" fill="#46464E" rx="8"/>
  <rect x="95" y="255" width="270" height="270" fill="#8CBED7"/>
  <rect x="95" y="455" width="270" height="70" fill="#5A966E"/>
  <circle cx="290" cy="330" r="26" fill="#FADC8C"/>
  <polygon points="110,300 190,255 145,255 95,285" fill="#FFFFFF" opacity="0.5"/>

  <!-- rug -->
  <ellipse cx="540" cy="830" rx="330" ry="75" fill="#E8C4A0"/>
  <ellipse cx="540" cy="830" rx="260" ry="52" fill="none" stroke="#CD7C60" stroke-width="3" stroke-dasharray="12 10"/>

  <!-- side table with steaming teacup -->
  <rect x="470" y="556" width="180" height="22" fill="#A07448"/>
  <line x1="490" y1="578" x2="490" y2="700" stroke="#A07448" stroke-width="10"/>
  <line x1="630" y1="578" x2="630" y2="700" stroke="#A07448" stroke-width="10"/>
  <rect x="540" y="523" width="50" height="33" fill="#FFFFFF" stroke="#CD7C60" stroke-width="3"/>
  <path d="M590 530 q18 12 0 24" fill="none" stroke="#CD7C60" stroke-width="4"/>
  <path d="M552 515 q-6 -14 3 -28" fill="none" stroke="#9C9C9C" stroke-width="3"/>
  <path d="M574 515 q-6 -16 3 -32" fill="none" stroke="#9C9C9C" stroke-width="3"/>

  <!-- sofa facing the TV -->
  <rect x="720" y="690" width="340" height="50" fill="#7A8E5E"/>
  <rect x="740" y="580" width="300" height="115" fill="#96AA78" stroke="#7A8E5E" stroke-width="4"/>
  <rect x="940" y="380" width="120" height="310" rx="22" fill="#96AA78" stroke="#7A8E5E" stroke-width="4"/>
  <rect x="752" y="535" width="172" height="52" rx="14" fill="#AABC8E" stroke="#7A8E5E" stroke-width="3"/>

  <!-- grandma seated, facing left toward TV -->
  <rect x="790" y="600" width="60" height="92" fill="#5A4458"/>
  <rect x="775" y="685" width="76" height="36" fill="#F6D8BC"/>
  <rect x="760" y="715" width="62" height="30" rx="10" fill="#B4B4B4"/>
  <polygon points="830,608 960,608 950,420 850,420" fill="#AA82A0"/>
  <rect x="835" y="500" width="86" height="35" fill="#AA82A0"/>
  <circle cx="805" cy="513" r="19" fill="#F6D8BC"/>
  <rect x="780" y="505" width="36" height="17" rx="5" fill="#46464E"/>

  <!-- head with white hair, eye toward TV -->
  <circle cx="900" cy="375" r="52" fill="#F6D8BC"/>
  <path d="M848 372 A 58 58 0 0 1 958 360 L 945 392 A 44 44 0 0 0 862 398 Z" fill="#E2E2E2"/>
  <circle cx="940" cy="352" r="23" fill="#E2E2E2"/>
  <circle cx="868" cy="372" r="5.5" fill="#1A1410"/>
  <path d="M858 398 Q870 408 885 400" fill="none" stroke="#1A1410" stroke-width="3" stroke-linecap="round"/>
  <path d="M852 360 q8 -8 18 -5" fill="none" stroke="#CD7C60" stroke-width="3"/>

  <!-- gaze line to TV -->
  <path d="M855 372 Q600 300 380 330" fill="none" stroke="#8C8C8C" stroke-width="3" stroke-dasharray="10 8"/>
  <polygon points="380,330 402,318 400,342" fill="#8C8C8C"/>
</svg>
