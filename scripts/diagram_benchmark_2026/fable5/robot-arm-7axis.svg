<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#C8641E"/>
    </marker>
    <linearGradient id="linkgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F5A75C"/>
      <stop offset="1" stop-color="#D9772A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="#FFFFFF"/>
  <text x="540" y="95" text-anchor="middle" font-size="32" font-weight="bold" fill="#28323C">7-axis robot arm (J1–J7)</text>
  <text x="540" y="135" text-anchor="middle" font-size="19" fill="#C8641E">orange arrows show each joint's rotation direction</text>

  <!-- floor with perspective -->
  <polygon points="60,860 1170,860 1080,740 150,740" fill="#E1E4E8"/>
  <g stroke="#FFFFFF" stroke-width="4">
    <line x1="240" y1="860" x2="300" y2="740"/>
    <line x1="460" y1="860" x2="500" y2="740"/>
    <line x1="680" y1="860" x2="700" y2="740"/>
    <line x1="900" y1="860" x2="900" y2="740"/>
    <line x1="105" y1="820" x2="1125" y2="820"/>
    <line x1="130" y1="780" x2="1100" y2="780"/>
  </g>

  <!-- base cylinder -->
  <ellipse cx="240" cy="800" rx="100" ry="28" fill="#3C444C"/>
  <rect x="140" y="720" width="200" height="80" fill="#5A646E"/>
  <ellipse cx="240" cy="720" rx="100" ry="28" fill="#96A0AA"/>
  <text x="240" y="852" text-anchor="middle" font-size="22" font-weight="bold" fill="#28323C">Base</text>

  <!-- J1 vertical axis -->
  <line x1="240" y1="760" x2="240" y2="580" stroke="#787878" stroke-width="3" stroke-dasharray="14 8 4 8"/>
  <path d="M165 645 A 75 25 0 1 1 305 655" fill="none" stroke="#C8641E" stroke-width="4.5" marker-end="url(#arr)"/>
  <text x="125" y="615" text-anchor="middle" font-size="23" font-weight="bold">J1</text>

  <!-- links (drawn base to tip) -->
  <g stroke="#C86C24" stroke-width="4" fill="url(#linkgrad)" stroke-linejoin="round">
    <polygon points="210,710 270,710 270,560 210,560"/>
    <!-- J2 (240,560) -> J3 (430,420) -->
    <polygon points="222,536 412,396 448,444 258,584"/>
    <!-- J3 (430,420) -> J4 (650,330) -->
    <polygon points="420,396 640,306 660,354 440,444"/>
    <!-- J4 (650,330) -> J5 (855,310) -->
    <polygon points="648,306 853,286 857,334 652,354"/>
    <!-- J5 (855,310) -> J6 (990,395) -->
    <polygon points="867,291 1002,376 978,414 843,329"/>
    <!-- J6 (990,395) -> J7 (1065,485) -->
    <polygon points="1005,382 1080,472 1050,498 975,408"/>
  </g>

  <!-- end effector at tip of J7 -->
  <g stroke="#46505A" stroke-width="13" stroke-linecap="round" fill="none">
    <path d="M1083 507 L1110 539"/>
    <path d="M1097 522 L1133 512 L1158 538"/>
    <path d="M1097 522 L1085 557 L1110 583"/>
  </g>
  <text x="1085" y="640" text-anchor="middle" font-size="22" font-weight="bold" fill="#28323C">End effector</text>

  <!-- joints -->
  <g>
    <circle cx="240" cy="560" r="42" fill="#46505A"/>
    <circle cx="226" cy="546" r="12" fill="#96A0AA"/>
    <circle cx="430" cy="420" r="38" fill="#46505A"/>
    <circle cx="417" cy="407" r="11" fill="#96A0AA"/>
    <circle cx="650" cy="330" r="36" fill="#46505A"/>
    <circle cx="638" cy="318" r="10" fill="#96A0AA"/>
    <circle cx="855" cy="310" r="32" fill="#46505A"/>
    <circle cx="844" cy="299" r="9" fill="#96A0AA"/>
    <circle cx="990" cy="395" r="30" fill="#46505A"/>
    <circle cx="980" cy="385" r="8" fill="#96A0AA"/>
    <circle cx="1065" cy="485" r="27" fill="#46505A"/>
    <circle cx="1056" cy="476" r="7" fill="#96A0AA"/>
  </g>

  <!-- rotation arrows -->
  <g fill="none" stroke="#C8641E" stroke-width="4.5">
    <path d="M240 495 A 65 52 0 1 0 295 595" marker-end="url(#arr)"/>
    <path d="M385 375 A 62 62 0 1 0 478 460" marker-end="url(#arr)"/>
    <path d="M650 272 A 58 46 0 1 0 700 370" marker-end="url(#arr)"/>
    <path d="M855 258 A 52 42 0 1 0 900 348" marker-end="url(#arr)"/>
    <path d="M1037 372 A 50 50 0 1 0 1040 440" marker-end="url(#arr)"/>
    <path d="M1110 470 A 46 36 0 1 0 1098 520" marker-end="url(#arr)"/>
  </g>

  <!-- joint labels -->
  <g font-size="23" font-weight="bold" fill="#28323C" text-anchor="middle">
    <text x="160" y="505">J2</text>
    <text x="352" y="368">J3</text>
    <text x="596" y="268">J4</text>
    <text x="822" y="245">J5</text>
    <text x="1078" y="362">J6</text>
    <text x="1152" y="455">J7</text>
  </g>
</svg>
