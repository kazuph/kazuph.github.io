<!DOCTYPE html>
<html lang="{{ site.lang | default: 'ja' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% include head_meta.html %}
    <link rel="stylesheet" type="text/css" media="screen" href="{{ '/stylesheets/stylesheet.css' | relative_url }}">
    {% if page.title == site.title %}
      <title>{{ site.title }}</title>
    {% else %}
      <title>{{ page.title }} | {{ site.title }}</title>
    {% endif %}
  </head>
  <body>
    <header class="site-header">
      <div class="inner header-inner">
        <div class="site-title-block">
          <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
          <p>{{ site.description }}</p>
        </div>
      </div>
    </header>

    <main class="site-main">
      <div class="inner content-layout">
        <section class="primary-content">
          {{ content }}
        </section>
        {% include sidebar.html %}
      </div>
    </main>

    <footer class="site-footer">
      <div class="inner">
        <p>&copy; kazuph</p>
      </div>
    </footer>
    <script>
      (() => {
        const openExternalLinksInNewTabs = (root = document) => {
          root.querySelectorAll?.('a[href]').forEach((link) => {
            const href = link.getAttribute('href');
            if (!href || href.startsWith('#')) return;

            let url;
            try {
              url = new URL(href, window.location.href);
            } catch (_error) {
              return;
            }

            if (!/^https?:$/.test(url.protocol) || url.origin === window.location.origin) return;

            link.target = '_blank';
            const rel = new Set((link.rel || '').split(/\s+/).filter(Boolean));
            rel.add('noopener');
            rel.add('noreferrer');
            link.rel = [...rel].join(' ');
          });
        };

        openExternalLinksInNewTabs();
        new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            mutation.addedNodes.forEach((node) => {
              if (node.nodeType === Node.ELEMENT_NODE) openExternalLinksInNewTabs(node);
            });
          });
        }).observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <script>
      (() => {
        const elements = [...document.querySelectorAll('[data-hatena-bookmark-url]')];
        if (elements.length === 0) return;

        const grouped = new Map();
        elements.forEach((element) => {
          const url = element.dataset.hatenaBookmarkUrl;
          if (!url) return;
          if (!grouped.has(url)) grouped.set(url, []);
          grouped.get(url).push(element);
        });

        const update = (url, count) => {
          const number = Number.isFinite(Number(count)) ? Number(count) : 0;
          grouped.get(url)?.forEach((element) => {
            element.classList.remove('is-loading');
            element.classList.toggle('is-empty', number === 0);
            element.querySelector('.hatena-bookmark-count__number').textContent = String(number);
          });
        };

        const urls = [...grouped.keys()];
        const batches = [];
        for (let index = 0; index < urls.length; index += 50) {
          batches.push(urls.slice(index, index + 50));
        }

        batches.forEach((batch, batchIndex) => {
          const callbackName = `__hatenaBookmarkCount${Date.now()}_${batchIndex}`;
          window[callbackName] = (counts) => {
            batch.forEach((url) => update(url, counts?.[url] ?? 0));
            delete window[callbackName];
            document.getElementById(callbackName)?.remove();
          };

          const script = document.createElement('script');
          script.id = callbackName;
          script.async = true;
          script.onerror = () => {
            batch.forEach((url) => update(url, 0));
            delete window[callbackName];
            script.remove();
          };

          const params = new URLSearchParams({ callback: callbackName });
          batch.forEach((url) => params.append('url', url));
          script.src = `https://bookmark.hatenaapis.com/count/entries?${params.toString()}`;
          document.head.append(script);
        });
      })();
    </script>
  </body>
</html>
