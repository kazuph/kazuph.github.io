<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GLASS — 屈折と分散</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #0d0d12; }
  #app { position: fixed; inset: 0; }
  .hud { position: fixed; font-family: ui-monospace, "SF Mono", Menlo, monospace; color: #e3e3ee; user-select: none; }
  .hud-tl { top: 18px; left: 20px; pointer-events: none; }
  .hud-tl h1 { margin: 0; font-size: 17px; letter-spacing: 0.2em; color: #f4f4fa; }
  .hud-tl p { margin: 6px 0 0; font-size: 11px; color: #8d8da0; }
  #panel { bottom: 18px; left: 20px; background: rgba(13, 13, 20, 0.85); border: 1px solid #3a3a4e; border-radius: 10px; padding: 12px 16px; width: 250px; }
  #panel h2 { margin: 0 0 8px; font-size: 10px; letter-spacing: 0.22em; color: #c9a8ff; }
  .row { display: flex; align-items: center; gap: 8px; font-size: 11px; margin: 6px 0; }
  .row label { width: 52px; color: #9c9cb2; }
  .row input[type=range] { flex: 1; accent-color: #c9a8ff; }
  .row output { width: 40px; text-align: right; }
  .hud-br { bottom: 18px; right: 20px; font-size: 10px; color: #6a6a80; text-align: right; line-height: 1.8; pointer-events: none; }
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
</head>
<body>
<div id="app"></div>
<div class="hud hud-tl">
  <h1>GLASS / REFRACTION &amp; DISPERSION</h1>
  <p>バックバッファ屈折 + RGB別IORの色分散 — スライダーで光学を調整</p>
</div>
<div class="hud" id="panel">
  <h2>OPTICS</h2>
  <div class="row"><label>屈折率</label><input id="s-ior" type="range" min="100" max="240" value="150"><output id="o-ior">1.50</output></div>
  <div class="row"><label>分散</label><input id="s-disp" type="range" min="0" max="100" value="36"><output id="o-disp">0.036</output></div>
  <div class="row"><label>くもり</label><input id="s-rough" type="range" min="0" max="100" value="8"><output id="o-rough">0.08</output></div>
</div>
<div class="hud hud-br">ドラッグ: 回転 / ホイール: ズーム</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
document.getElementById('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.1, 400);
camera.position.set(0, 7, 22);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 3.4, 0);
controls.maxPolarAngle = Math.PI * 0.55;
controls.minDistance = 8;
controls.maxDistance = 60;

// ---------- environment ----------
const room = new THREE.Mesh(
  new THREE.SphereGeometry(160, 32, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide,
    vertexShader: `varying vec3 vDir; void main(){ vDir = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      precision highp float; varying vec3 vDir;
      void main(){
        vec3 d = normalize(vDir);
        float t = clamp(d.y * 0.5 + 0.5, 0.0, 1.0);
        vec3 col = mix(vec3(0.16, 0.13, 0.24), vec3(0.05, 0.05, 0.10), t);
        col += vec3(0.7, 0.4, 1.0) * pow(max(1.0 - abs(d.y), 0.0), 5.0) * 0.35;
        gl_FragColor = vec4(col, 1.0);
      }`,
  })
);
scene.add(room);

// checker floor
const floor = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.ShaderMaterial({
    vertexShader: `varying vec2 vP; void main(){ vP = position.xy; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      precision highp float; varying vec2 vP;
      void main(){
        vec2 g = floor(vP * 0.25);
        float c = mod(g.x + g.y, 2.0);
        vec3 col = mix(vec3(0.12, 0.12, 0.17), vec3(0.24, 0.23, 0.30), c);
        float r = length(vP);
        col *= smoothstep(70.0, 18.0, r) * 0.85 + 0.15;
        gl_FragColor = vec4(col, 1.0);
      }`,
  })
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// neon color bars behind (make dispersion pop)
const bars = new THREE.Group();
const barColors = [0xff3b6b, 0xffa63b, 0xffe83b, 0x4dff7a, 0x3bd2ff, 0x8a6bff];
for (let i = 0; i < 6; i++) {
  const m = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 22, 1.0),
    new THREE.MeshBasicMaterial({ color: barColors[i] })
  );
  m.position.set(-15 + i * 6, 11, -18);
  bars.add(m);
}
scene.add(bars);
const barLight = new THREE.PointLight(0xffffff, 300);
barLight.position.set(0, 16, -6);
scene.add(barLight);
scene.add(new THREE.HemisphereLight(0x8888aa, 0x111118, 0.6));
const key = new THREE.DirectionalLight(0xffffff, 1.6);
key.position.set(18, 26, 14);
key.castShadow = true;
scene.add(key);

// pedestals
const pedMat = new THREE.MeshStandardMaterial({ color: 0x23232e, roughness: 0.4, metalness: 0.6 });
const pedestals = [];
for (const x of [-7.5, 0, 7.5]) {
  const p = new THREE.Mesh(new THREE.CylinderGeometry(2.3, 2.6, 2.4, 32), pedMat);
  p.position.set(x, 1.2, 0);
  p.castShadow = p.receiveShadow = true;
  scene.add(p);
  pedestals.push(p);
}

// ---------- glass shader ----------
const sceneRT = new THREE.WebGLRenderTarget(1024, 1024, {
  generateMipmaps: true,
  minFilter: THREE.LinearMipmapLinearFilter,
  magFilter: THREE.LinearFilter,
});
const glassUniforms = {
  uScene: { value: sceneRT.texture },
  uIor: { value: 1.5 },
  uDispersion: { value: 0.036 },
  uRough: { value: 0.08 },
  uCam: { value: camera.position },
  uTint: { value: new THREE.Color(0.94, 0.97, 1.0) },
};
const glassMat = new THREE.ShaderMaterial({
  uniforms: glassUniforms,
  vertexShader: `
    varying vec3 vN;
    varying vec3 vW;
    varying vec4 vClip;
    void main(){
      vN = normalize(mat3(modelMatrix) * normal);
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vW = wp.xyz;
      vClip = projectionMatrix * viewMatrix * wp;
      gl_Position = vClip;
    }`,
  fragmentShader: `
    precision highp float;
    varying vec3 vN;
    varying vec3 vW;
    varying vec4 vClip;
    uniform sampler2D uScene;
    uniform float uIor;
    uniform float uDispersion;
    uniform float uRough;
    uniform vec3 uCam;
    uniform vec3 uTint;

    vec3 envLight(vec3 d){
      float t = clamp(d.y * 0.5 + 0.5, 0.0, 1.0);
      vec3 col = mix(vec3(0.10, 0.08, 0.16), vec3(0.05, 0.05, 0.09), t);
      col += vec3(1.0) * pow(max(dot(d, normalize(vec3(0.5, 0.8, 0.4))), 0.0), 60.0) * 2.2;
      col += vec3(0.8, 0.5, 1.0) * pow(max(dot(d, normalize(vec3(-0.6, 0.4, -0.3))), 0.0), 24.0) * 0.6;
      return col;
    }

    void main(){
      vec3 n = normalize(vN);
      vec3 V = normalize(uCam - vW);
      if (dot(n, V) < 0.0) n = -n;
      vec2 suv = (vClip.xy / vClip.w) * 0.5 + 0.5;
      float bias = uRough * 6.0;

      float k = 0.14;  // screen-space refraction strength
      vec3 Vv = mat3(viewMatrix) * (-V);
      vec3 col;
      for (int i = 0; i < 3; i++) {
        float ior = uIor + uDispersion * (float(i) - 1.0);
        vec3 T = refract(-V, n, 1.0 / max(ior, 1.001));
        vec3 Tv = mat3(viewMatrix) * T;
        vec2 off = (Tv.xy - Vv.xy) * k;
        vec2 uv = clamp(suv + off, 0.001, 0.999);
        float c = i == 0 ? texture2D(uScene, uv, bias).r
                : i == 1 ? texture2D(uScene, uv, bias).g
                : texture2D(uScene, uv, bias).b;
        col[i] = c;
      }
      col *= uTint;

      float fres = pow(1.0 - max(dot(n, V), 0.0), 5.0);
      fres = mix(0.05, 1.0, fres);
      vec3 R = reflect(-V, n);
      col = mix(col, envLight(R), fres * 0.9);

      // sparkle highlights
      col += vec3(1.0) * pow(max(dot(R, normalize(vec3(0.5, 0.8, 0.4))), 0.0), 300.0) * 2.0;

      gl_FragColor = vec4(col, 1.0);
    }`,
});

const glassGroup = new THREE.Group();
scene.add(glassGroup);
function addGlass(geo, x) {
  const m = new THREE.Mesh(geo, glassMat);
  m.position.set(x, 5.4, 0);
  glassGroup.add(m);
  return m;
}
const gTorus = addGlass(new THREE.TorusKnotGeometry(1.7, 0.62, 200, 32), -7.5);
const gSphere = addGlass(new THREE.SphereGeometry(2.2, 64, 48), 0);
const gemGeo = new THREE.IcosahedronGeometry(2.4, 0);
const gGem = addGlass(gemGeo, 7.5);
gGem.material = glassMat;

// ---------- UI ----------
function bindSlider(id, out, scale, digits, uniform) {
  const s = document.getElementById(id);
  const o = document.getElementById(out);
  s.addEventListener('input', () => {
    const v = Number(s.value) * scale;
    o.textContent = v.toFixed(digits);
    glassUniforms[uniform].value = v;
  });
}
bindSlider('s-ior', 'o-ior', 0.01, 2, 'uIor');
bindSlider('s-disp', 'o-disp', 0.001, 3, 'uDispersion');
bindSlider('s-rough', 'o-rough', 0.01, 2, 'uRough');

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  gTorus.rotation.set(t * 0.4, t * 0.55, 0);
  gSphere.rotation.y = t * 0.3;
  gGem.rotation.set(0.3, t * 0.5, 0.2);
  for (const m of glassGroup.children) m.position.y = 5.4 + Math.sin(t * 0.9 + m.position.x) * 0.25;

  // pass 1: scene without glass into RT
  glassGroup.visible = false;
  renderer.setRenderTarget(sceneRT);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  // pass 2: full scene
  glassGroup.visible = true;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
