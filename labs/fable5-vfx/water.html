<!DOCTYPE html>
<html lang="ja">
<head>

<style>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>

<body>
<div id="app"></div>
<div class="hud hud-tl">
  <h1>NISHIKIGOI POND / 小千谷</h1>
  <p>錦鯉発祥の地の池 — クリックで餌をまくと鯉が寄ってきます</p>
</div>
<div class="hud hud-bl">
  <button id="b-rain">雨を降らせる</button>
  <button id="b-calm">凪に戻す</button>
  <button id="b-trails">軌跡を見る</button>
</div>
<div class="hud hud-br">なでる: 波紋 / クリック: 餌やり<br>ドラッグ: 回転 / ホイール: ズーム</div>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const SIM = 384;
const SIZE = 40;                  // uv mapping extent for the sim
const POND_R = 17;                // pond radius
const DEPTH = 2.6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('app').appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15201a);
scene.fog = new THREE.Fog(0x15201a, 120, 320);
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0.5, 26, 4);   // near top-down, like looking into the pond
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, -0.5, 0);
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 7;
controls.maxDistance = 80;
// deterministic camera for screenshots / debugging: ?view=close
if (new URLSearchParams(location.search).get('view') === 'close') {
  camera.position.set(2, 6.5, 13);
  controls.target.set(0, -1, 0);
}

const SUN_DIR = new THREE.Vector3(0.5, 0.7, -0.4).normalize();
scene.add(new THREE.HemisphereLight(0xd8ecdd, 0x2a3a2e, 1.1));
const sun = new THREE.DirectionalLight(0xfff4dc, 2.3);
sun.position.copy(SUN_DIR).multiplyScalar(60);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40; sun.shadow.camera.bottom = -40;
scene.add(sun);

// ---------- ripple simulation (ping-pong) ----------
const rtOpts = { type: THREE.HalfFloatType, format: THREE.RGBAFormat, minFilter: THREE.LinearFilter, magFilter: THREE.LinearFilter, depthBuffer: false };
let rtA = new THREE.WebGLRenderTarget(SIM, SIM, rtOpts);
let rtB = new THREE.WebGLRenderTarget(SIM, SIM, rtOpts);
const simScene = new THREE.Scene();
const simCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
const simMat = new THREE.ShaderMaterial({
  uniforms: {
    uPrev: { value: null },
    uTexel: { value: new THREE.Vector2(1 / SIM, 1 / SIM) },
    uDrop: { value: new THREE.Vector2(-10, -10) },
    uDropStrength: { value: 0 },
    uDropRadius: { value: 900.0 },
    uClear: { value: 0 },
    uDamp: { value: 0.989 },
  },
  vertexShader: `varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }`,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    uniform sampler2D uPrev;
    uniform vec2 uTexel;
    uniform vec2 uDrop;
    uniform float uDropStrength;
    uniform float uDropRadius;
    uniform float uClear;
    uniform float uDamp;
    void main(){
      vec2 c = texture2D(uPrev, vUv).rg;
      float h = c.r, v = c.g;
      float sum = texture2D(uPrev, vUv + vec2(uTexel.x, 0.0)).r
                + texture2D(uPrev, vUv - vec2(uTexel.x, 0.0)).r
                + texture2D(uPrev, vUv + vec2(0.0, uTexel.y)).r
                + texture2D(uPrev, vUv - vec2(0.0, uTexel.y)).r;
      float lap = sum * 0.25 - h;
      v += lap * 1.9;
      v *= uDamp;
      h += v;
      h *= 0.9995;
      if (uDropStrength != 0.0) {
        vec2 d = vUv - uDrop;
        h += uDropStrength * exp(-dot(d, d) * uDropRadius);
      }
      float edge = smoothstep(0.0, 0.03, vUv.x) * smoothstep(0.0, 0.03, 1.0 - vUv.x)
                 * smoothstep(0.0, 0.03, vUv.y) * smoothstep(0.0, 0.03, 1.0 - vUv.y);
      h *= edge;
      v *= edge;
      gl_FragColor = mix(vec4(h, v, 0.0, 1.0), vec4(0.0), uClear);
    }`,
});
simScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), simMat));
const dropQueue = [];
function queueDrop(u, v, strength, radius) {
  if (dropQueue.length < 24) dropQueue.push([u, v, strength, radius]);
}
function stepSim() {
  if (dropQueue.length) {
    const d = dropQueue.shift();
    simMat.uniforms.uDrop.value.set(d[0], d[1]);
    simMat.uniforms.uDropStrength.value = d[2];
    simMat.uniforms.uDropRadius.value = d[3];
  }
  simMat.uniforms.uPrev.value = rtA.texture;
  renderer.setRenderTarget(rtB);
  renderer.render(simScene, simCam);
  renderer.setRenderTarget(null);
  const t = rtA; rtA = rtB; rtB = t;
  simMat.uniforms.uDropStrength.value = 0;
  simMat.uniforms.uClear.value = 0;
}

// ---------- pond floor with caustics ----------
const floorMat = new THREE.ShaderMaterial({
  uniforms: {
    uHeight: { value: null },
    uTexel: { value: new THREE.Vector2(1 / SIM, 1 / SIM) },
    uSize: { value: SIZE },
  },
  vertexShader: `
    varying vec3 vW;
    void main(){
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vW = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    precision highp float;
    varying vec3 vW;
    uniform sampler2D uHeight;
    uniform vec2 uTexel;
    uniform float uSize;
    float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
    void main(){
      // pebble field: nearest-point voronoi-ish shading
      vec2 p = vW.xz * 1.1;
      vec2 ip = floor(p);
      float dmin = 9.0; vec2 cell = vec2(0.0);
      for (int dx = -1; dx <= 1; dx++) for (int dy = -1; dy <= 1; dy++) {
        vec2 g = ip + vec2(float(dx), float(dy));
        vec2 o = vec2(hash(g), hash(g + 7.3));
        float d = distance(p, g + o);
        if (d < dmin) { dmin = d; cell = g; }
      }
      float tone = 0.35 + 0.5 * hash(cell + 3.1);
      vec3 stone = mix(vec3(0.13, 0.14, 0.12), vec3(0.27, 0.26, 0.21), tone);
      stone *= smoothstep(1.05, 0.55, dmin) * 0.6 + 0.4;     // pebble rounding
      // greenish algae toward center
      float r = length(vW.xz);
      stone = mix(stone, vec3(0.08, 0.16, 0.10), smoothstep(15.0, 4.0, r) * 0.6);

      // caustics from the ripple field
      vec2 uv = vW.xz / uSize + 0.5;
      float hC = texture2D(uHeight, uv).r;
      float lap = (texture2D(uHeight, uv + vec2(uTexel.x, 0.0)).r + texture2D(uHeight, uv - vec2(uTexel.x, 0.0)).r
                 + texture2D(uHeight, uv + vec2(0.0, uTexel.y)).r + texture2D(uHeight, uv - vec2(0.0, uTexel.y)).r) - 4.0 * hC;
      float caustic = clamp(-lap * 650.0, 0.0, 1.4);
      stone += vec3(1.0, 0.97, 0.85) * caustic * 0.55;

      gl_FragColor = vec4(stone, 1.0);
    }`,
});
const floor = new THREE.Mesh(new THREE.CircleGeometry(POND_R, 64), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -DEPTH;
scene.add(floor);

// ---------- koi (parametric body + shaped fins + traveling-wave swim) ----------
function sstep(a, b, x) { const t = Math.min(Math.max((x - a) / (b - a), 0), 1); return t * t * (3 - 2 * t); }

function koiTexture(variety) {
  const W = 1024, H = 512;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  // u: 0 = belly, 0.5 = back (seam hidden under the belly). v: 0 = nose (canvas bottom).
  const px = (u) => u * W;
  const py = (v) => (1 - v) * H;

  // base: warm white with a darker dorsal sheen
  ctx.fillStyle = '#f7f3e9';
  ctx.fillRect(0, 0, W, H);
  const dorsal = ctx.createLinearGradient(0, 0, W, 0);
  dorsal.addColorStop(0.0, 'rgba(255,255,255,0.5)');
  dorsal.addColorStop(0.32, 'rgba(190,180,160,0.06)');
  dorsal.addColorStop(0.5, 'rgba(150,140,120,0.12)');
  dorsal.addColorStop(0.68, 'rgba(190,180,160,0.06)');
  dorsal.addColorStop(1.0, 'rgba(255,255,255,0.5)');
  ctx.fillStyle = dorsal;
  ctx.fillRect(0, 0, W, H);

  // irregular patch with crisp darker edge; stretched sideways so the
  // pattern wraps down the flanks like a real koi
  function patch(cx, cy, R, fill, edge, xScale = 1.4) {
    const N = 12;
    const radii = [];
    for (let i = 0; i < N; i++) radii.push(R * (0.66 + Math.random() * 0.7));
    for (const ox of [-W, 0, W]) {      // wrap across the seam
      ctx.save();
      ctx.translate(cx + ox, cy);
      ctx.scale(xScale, 1);
      ctx.beginPath();
      for (let i = 0; i <= N; i++) {
        const a = (i / N) * Math.PI * 2;
        const r0 = radii[i % N], r1 = radii[(i + 1) % N];
        const x0 = Math.cos(a) * r0, y0 = Math.sin(a) * r0;
        const a1 = ((i + 1) / N) * Math.PI * 2;
        const x1 = Math.cos(a1) * r1, y1 = Math.sin(a1) * r1;
        if (i === 0) ctx.moveTo((x0 + x1) / 2, (y0 + y1) / 2);
        else ctx.quadraticCurveTo(x0, y0, (x0 + x1) / 2, (y0 + y1) / 2);
      }
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.lineWidth = 4;
      ctx.strokeStyle = edge;
      ctx.stroke();
      ctx.restore();
    }
  }
  const HI = '#e63d08';          // vivid beni vermilion
  const HI_EDGE = 'rgba(150,26,2,0.55)';
  const SUMI = '#17171c';        // sumi black
  const SUMI_EDGE = 'rgba(0,0,0,0.5)';
  const BACK = px(0.5);

  if (variety === 'kohaku') {
    patch(BACK, py(0.10), 82, HI, HI_EDGE);                                  // head crest
    patch(BACK + (Math.random() - 0.5) * 140, py(0.36), 122, HI, HI_EDGE);
    patch(BACK + (Math.random() - 0.5) * 140, py(0.68), 110, HI, HI_EDGE);
    if (Math.random() < 0.7) patch(BACK + (Math.random() - 0.5) * 160, py(0.9), 70, HI, HI_EDGE);
  } else if (variety === 'showa') {
    patch(BACK + 50, py(0.14), 95, HI, HI_EDGE);
    patch(BACK - 60, py(0.5), 115, HI, HI_EDGE);
    patch(BACK + 40, py(0.8), 90, HI, HI_EDGE);
    patch(BACK - 30, py(0.3), 95, SUMI, SUMI_EDGE);                          // wrapping sumi bands
    patch(BACK + 80, py(0.64), 88, SUMI, SUMI_EDGE);
    patch(BACK - 90, py(0.07), 50, SUMI, SUMI_EDGE);                         // head sumi
  } else if (variety === 'hi') {
    ctx.fillStyle = '#f25c0e';
    ctx.fillRect(0, 0, W, H);
    const sheen = ctx.createLinearGradient(0, 0, W, 0);
    sheen.addColorStop(0.0, 'rgba(255,215,160,0.55)');                       // pale belly
    sheen.addColorStop(0.3, 'rgba(230,80,15,0.0)');
    sheen.addColorStop(0.5, 'rgba(165,35,5,0.4)');                           // deep back
    sheen.addColorStop(0.7, 'rgba(230,80,15,0.0)');
    sheen.addColorStop(1.0, 'rgba(255,215,160,0.55)');
    ctx.fillStyle = sheen;
    ctx.fillRect(0, 0, W, H);
  } else if (variety === 'tancho') {
    patch(BACK, py(0.09), 78, HI, HI_EDGE);                                  // single head dot
  }

  // scale netting: overlapping arc rows (gives the "resolution" feel)
  ctx.strokeStyle = 'rgba(95,85,70,0.16)';
  ctx.lineWidth = 1.6;
  const SR = 17;
  for (let row = 0; row < H / (SR * 0.62); row++) {
    const y = H - row * SR * 0.62;
    const off = (row % 2) * SR;
    for (let x = -SR; x < W + SR; x += SR * 2) {
      ctx.beginPath();
      ctx.arc(x + off, y, SR, Math.PI * 1.15, Math.PI * 1.85);
      ctx.stroke();
    }
  }
  // belly whitening (u near 0 and 1)
  const belly = ctx.createLinearGradient(0, 0, W, 0);
  belly.addColorStop(0.0, 'rgba(255,252,244,0.85)');
  belly.addColorStop(0.16, 'rgba(255,252,244,0)');
  belly.addColorStop(0.84, 'rgba(255,252,244,0)');
  belly.addColorStop(1.0, 'rgba(255,252,244,0.85)');
  ctx.fillStyle = belly;
  ctx.fillRect(0, 0, W, H);

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

// torpedo body: rounded nose, deep mid-body, narrow caudal peduncle
function koiBodyGeometry() {
  const RINGS = 40, SEGS = 22, L = 3.8;
  const pos = [], uvs = [], idx = [];
  for (let i = 0; i <= RINGS; i++) {
    const t = i / RINGS;                          // 0 nose .. 1 tail
    const x = L / 2 - t * L;
    let r = Math.pow(Math.sin(Math.PI * Math.pow(t, 0.62)), 0.95);
    r *= 0.60 * (1 - 0.62 * sstep(0.6, 1.0, t)); // taper into the peduncle
    r = Math.max(r, 0.035);
    const ry = r * 0.92;                          // koi are taller than wide
    const rz = r * 0.62;
    for (let j = 0; j <= SEGS; j++) {
      const th = (j / SEGS) * Math.PI * 2;        // 0 = belly
      let y = -Math.cos(th) * ry;
      if (y < 0) y *= 0.88;                       // slightly flattened belly
      pos.push(x, y, Math.sin(th) * rz);
      uvs.push(j / SEGS, t);
    }
  }
  for (let i = 0; i < RINGS; i++) {
    for (let j = 0; j < SEGS; j++) {
      const a = i * (SEGS + 1) + j, b = a + SEGS + 1;
      idx.push(a, a + 1, b, b, a + 1, b + 1);     // CCW from outside
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  return geo;
}

function finShape(points) {
  const s = new THREE.Shape();
  s.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length - 1; i += 2) {
    s.quadraticCurveTo(points[i][0], points[i][1], points[i + 1][0], points[i + 1][1]);
  }
  s.closePath();
  return new THREE.ShapeGeometry(s, 10);
}
function koiFinsGeometry() {
  const fins = [];
  // caudal (large flowing fan, like a brush stroke from above)
  fins.push(finShape([[-1.78, 0.12], [-2.7, 0.85], [-3.35, 0.8], [-2.75, 0.2], [-2.6, 0.0], [-2.75, -0.2], [-3.35, -0.8], [-2.7, -0.85], [-1.78, -0.12], [-1.7, 0], [-1.78, 0.12]]));
  // dorsal (long and low along the back)
  fins.push(finShape([[0.45, 0.5], [-0.2, 0.86], [-0.9, 0.78], [-1.25, 0.52], [-1.35, 0.34], [-0.4, 0.42], [0.45, 0.5]]));
  // anal
  fins.push(finShape([[-1.15, -0.3], [-1.45, -0.62], [-1.62, -0.55], [-1.55, -0.3], [-1.5, -0.22], [-1.3, -0.24], [-1.15, -0.3]]));
  // pelvic pair (angled out)
  for (const s of [-1, 1]) {
    const g = finShape([[-0.25, 0], [-0.7, -0.5], [-1.0, -0.46], [-0.75, -0.12], [-0.6, 0.02], [-0.4, 0.04], [-0.25, 0]]);
    g.rotateX(s * 0.85);
    g.translate(0, -0.32, s * 0.16);
    fins.push(g);
  }
  return mergeBuffer(fins);
}
function mergeBuffer(geos) {
  // minimal non-indexed merge (position/uv), normals recomputed
  let total = 0;
  const parts = geos.map((g) => g.toNonIndexed());
  for (const g of parts) total += g.attributes.position.count;
  const pos = new Float32Array(total * 3);
  const uv = new Float32Array(total * 2);
  let o = 0;
  for (const g of parts) {
    pos.set(g.attributes.position.array, o * 3);
    if (g.attributes.uv) uv.set(g.attributes.uv.array, o * 2);
    o += g.attributes.position.count;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  geo.computeVertexNormals();
  return geo;
}

const KOI_BODY_GEO = koiBodyGeometry();
const KOI_FINS_GEO = koiFinsGeometry();

// whole-body traveling wave, amplified toward the tail
function undulate(mat, uni) {
  mat.onBeforeCompile = (sh) => {
    sh.uniforms.uPhase = uni.phase;
    sh.uniforms.uAmp = uni.amp;
    sh.uniforms.uBend = uni.bend;
    sh.vertexShader = 'uniform float uPhase;\nuniform float uAmp;\nuniform float uBend;\n' + sh.vertexShader.replace(
      '#include <begin_vertex>',
      `#include <begin_vertex>
       float along = clamp((1.9 - transformed.x) / 3.8, 0.0, 1.45);
       float aw = 0.07 + along * along * 0.93;
       transformed.z += sin(uPhase - along * 5.0) * uAmp * aw + uBend * along * along;`
    );
  };
  mat.customProgramCacheKey = () => 'koi-undulate';
  return mat;
}

function makeKoi(variety, scale) {
  const g = new THREE.Group();
  g.rotation.order = 'YZX';
  const uni = { phase: { value: Math.random() * 10 }, amp: { value: 0.14 }, bend: { value: 0 } };
  const bodyMat = undulate(new THREE.MeshStandardMaterial({ map: koiTexture(variety), roughness: 0.42 }), uni);
  const body = new THREE.Mesh(KOI_BODY_GEO, bodyMat);
  body.castShadow = true;
  g.add(body);
  const finMat = undulate(new THREE.MeshStandardMaterial({
    color: variety === 'hi' ? 0xe88a4a : 0xf4e0c8,
    transparent: true, opacity: 0.78, side: THREE.DoubleSide, roughness: 0.7,
  }), uni);
  g.add(new THREE.Mesh(KOI_FINS_GEO, finMat));
  // eyes
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x0c0c10, roughness: 0.25 });
  const pects = [];
  for (const s of [-1, 1]) {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.055, 12, 8), eyeMat);
    eye.position.set(1.42, 0.06, s * 0.27);
    g.add(eye);
    // pectoral fins (separate so they can row)
    const pect = new THREE.Mesh(
      finShape([[0, 0], [-0.32, -0.3], [-0.62, -0.34], [-0.4, -0.08], [-0.3, 0.04], [-0.12, 0.05], [0, 0]]),
      finMat
    );
    pect.position.set(1.0, -0.22, s * 0.3);
    pect.rotation.x = s * 1.15;
    pect.rotation.y = s * 0.35;
    g.add(pect);
    pects.push(pect);
  }
  g.scale.setScalar(scale);
  g.userData.uni = uni;
  g.userData.pects = pects;
  scene.add(g);
  // soft drop shadow on the pond floor (like the fish in a sumi-e print)
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(1, 24),
    new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.24, depthWrite: false })
  );
  shadow.rotation.x = -Math.PI / 2;
  shadow.scale.set(2.0 * scale, 0.7 * scale, 1);
  shadow.position.y = -DEPTH + 0.06;
  scene.add(shadow);
  g.userData.shadow = shadow;
  return g;
}

// drifting bokeh spots on the surface (stray light / petals)
const bokeh = [];
{
  const bc = document.createElement('canvas');
  bc.width = bc.height = 64;
  const bctx = bc.getContext('2d');
  const grad = bctx.createRadialGradient(32, 32, 2, 32, 32, 30);
  grad.addColorStop(0, 'rgba(244,250,236,0.9)');
  grad.addColorStop(0.65, 'rgba(244,250,236,0.35)');
  grad.addColorStop(1, 'rgba(244,250,236,0)');
  bctx.fillStyle = grad;
  bctx.fillRect(0, 0, 64, 64);
  const bTex = new THREE.CanvasTexture(bc);
  for (let i = 0; i < 16; i++) {
    const m = new THREE.Sprite(new THREE.SpriteMaterial({ map: bTex, transparent: true, opacity: 0.16, depthWrite: false }));
    const s = 1.4 + Math.random() * 2.6;
    m.scale.set(s, s, 1);
    const a = Math.random() * Math.PI * 2, r = Math.sqrt(Math.random()) * (POND_R - 2);
    m.position.set(Math.cos(a) * r, 0.15, Math.sin(a) * r);
    m.userData.seed = Math.random() * 10;
    scene.add(m);
    bokeh.push(m);
  }
}

const KOI = [];
const varieties = ['kohaku', 'hi', 'showa', 'kohaku', 'tancho', 'hi', 'shiro'];
for (let i = 0; i < varieties.length; i++) {
  const s = 1.0 + Math.random() * 0.5;
  const k = makeKoi(varieties[i], s);
  const a = (i / varieties.length) * Math.PI * 2;
  KOI.push({
    g: k,
    s,
    pos: new THREE.Vector2(Math.cos(a) * 8, Math.sin(a) * 8),
    heading: a + Math.PI / 2,
    turn: 0,
    speed: 1.3 + Math.random() * 0.8,
    phase: Math.random() * 10,
    depth: -0.9 - Math.random() * 0.9,
    targetDepth: -0.9 - Math.random() * 0.9,
    nextDepthChange: Math.random() * 5,
    target: new THREE.Vector2(Math.cos(a + 2) * 8, Math.sin(a + 2) * 8),
    retarget: 2 + Math.random() * 6,
    orbitDir: Math.random() < 0.5 ? -1 : 1,
    rep: new THREE.Vector2(),
  });
}
let feedPoint = null, feedTimer = 0;

// trajectory visualisation: off by default, toggled by the 軌跡 button (or ?trails=1)
let trailsOn = new URLSearchParams(location.search).get('trails') === '1';
const trailLines = [];
function ensureTrails() {
  if (trailLines.length) return;
  const trailColors = [0xff6633, 0xffd24d, 0x66ccff, 0xff4d6f, 0x9dff66, 0xcc88ff, 0xffffff];
  for (let i = 0; i < KOI.length; i++) {
    const N = 1500;
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(N * 3), 3));
    geo.setDrawRange(0, 0);
    const line = new THREE.Line(geo, new THREE.LineBasicMaterial({ color: trailColors[i % 7], transparent: true, opacity: 0.95, depthTest: false }));
    line.renderOrder = 10;
    scene.add(line);
    trailLines.push({ line, n: 0, N, skip: 0 });
  }
}
if (trailsOn) ensureTrails();
function updateTrails() {
  for (let i = 0; i < KOI.length; i++) {
    const tr = trailLines[i];
    if (tr.skip++ % 3 !== 0) continue;
    const attr = tr.line.geometry.attributes.position;
    if (tr.n < tr.N) {
      attr.setXYZ(tr.n, KOI[i].pos.x, 0.5, KOI[i].pos.y);
      tr.n++;
      tr.line.geometry.setDrawRange(0, tr.n);
    } else {
      attr.array.copyWithin(0, 3);
      attr.setXYZ(tr.N - 1, KOI[i].pos.x, 0.5, KOI[i].pos.y);
    }
    attr.needsUpdate = true;
  }
}

// deterministic koi placement for screenshots / debugging: ?freeze=1
const FREEZE = new URLSearchParams(location.search).get('freeze') === '1';
if (FREEZE) {
  const spots = [[0, 2.5, 0.4], [3, -1.5, 2.4], [-3.2, 0.5, 5.2], [1.5, 5.5, 3.6], [-1.5, -4, 1.2], [4.5, 3.5, 5.8], [-4.5, -2.5, 4.4]];
  KOI.forEach((k, i) => { const s = spots[i % spots.length]; k.pos.set(s[0], s[1]); k.heading = s[2]; k.depth = -0.9; });
}

// ---------- rocks + surroundings ----------
const rockMat = new THREE.MeshStandardMaterial({ color: 0x6e675c, roughness: 0.95, flatShading: true });
for (let i = 0; i < 42; i++) {
  const a = (i / 42) * Math.PI * 2 + Math.random() * 0.1;
  const r = POND_R + 0.8 + Math.random() * 1.2;
  const s = 1.1 + Math.random() * 1.6;
  const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), rockMat);
  rock.position.set(Math.cos(a) * r, 0.25 + s * 0.18, Math.sin(a) * r);
  rock.rotation.set(Math.random() * 3, Math.random() * 3, Math.random() * 3);
  rock.scale.y = 0.65;
  rock.castShadow = rock.receiveShadow = true;
  scene.add(rock);
}
const grass = new THREE.Mesh(
  new THREE.RingGeometry(POND_R + 0.5, 90, 64),
  new THREE.MeshStandardMaterial({ color: 0x3c5530, roughness: 1 })
);
grass.rotation.x = -Math.PI / 2;
grass.position.y = 0.05;
grass.receiveShadow = true;
scene.add(grass);
// pond inner wall
const wall = new THREE.Mesh(
  new THREE.CylinderGeometry(POND_R, POND_R - 0.6, DEPTH, 64, 1, true),
  new THREE.MeshStandardMaterial({ color: 0x4c483e, roughness: 1, side: THREE.BackSide })
);
wall.position.y = -DEPTH / 2;
scene.add(wall);
// a stone lantern for the garden mood
const lantern = new THREE.Group();
const lanternMat = new THREE.MeshStandardMaterial({ color: 0x8b867c, roughness: 0.9 });
const lBase = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.5, 1, 6), lanternMat); lBase.position.y = 0.5; lantern.add(lBase);
const lPole = new THREE.Mesh(new THREE.CylinderGeometry(0.45, 0.55, 2.6, 6), lanternMat); lPole.position.y = 2.2; lantern.add(lPole);
const lBox = new THREE.Mesh(new THREE.CylinderGeometry(1.05, 0.85, 1.1, 6), lanternMat); lBox.position.y = 4.0; lantern.add(lBox);
const lRoof = new THREE.Mesh(new THREE.ConeGeometry(1.6, 1.0, 6), lanternMat); lRoof.position.y = 5.0; lantern.add(lRoof);
lantern.position.set(-POND_R - 4, 0, -6);
lantern.traverse((m) => { if (m.isMesh) m.castShadow = m.receiveShadow = true; });
scene.add(lantern);

// lily pads
const padMat = new THREE.MeshStandardMaterial({ color: 0x2f6b35, roughness: 0.8, side: THREE.DoubleSide });
const pads = [];
for (let i = 0; i < 6; i++) {
  const shape = new THREE.Shape();
  shape.absarc(0, 0, 0.9 + Math.random() * 0.5, 0.25, Math.PI * 2 - 0.25, false);
  shape.lineTo(0, 0);
  const pad = new THREE.Mesh(new THREE.ShapeGeometry(shape, 24), padMat);
  pad.rotation.x = -Math.PI / 2;
  pad.rotation.z = Math.random() * Math.PI * 2;
  const a = Math.random() * Math.PI * 2;
  const r = POND_R - 3 - Math.random() * 3;
  pad.position.set(Math.cos(a) * r, 0.06, Math.sin(a) * r);
  scene.add(pad);
  pads.push(pad);
}

// ---------- sky reflection helpers ----------
const skyFns = `
  vec3 skyColor(vec3 d, vec3 sunDir){
    float t = clamp(d.y * 0.5 + 0.5, 0.0, 1.0);
    vec3 horizon = vec3(0.72, 0.82, 0.72);
    vec3 zenith = vec3(0.32, 0.52, 0.66);
    vec3 sky = mix(horizon, zenith, pow(t, 0.8));
    float sun = pow(max(dot(d, sunDir), 0.0), 500.0);
    sky += vec3(1.0, 0.92, 0.7) * sun * 4.0;
    return sky;
  }`;

// ---------- water surface (samples real refraction buffer) ----------
const sceneRT = new THREE.WebGLRenderTarget(innerWidth, innerHeight);
const waterMat = new THREE.ShaderMaterial({
  uniforms: {
    uHeight: { value: null },
    uScene: { value: sceneRT.texture },
    uTexel: { value: new THREE.Vector2(1 / SIM, 1 / SIM) },
    uSun: { value: SUN_DIR },
    uCam: { value: camera.position },
    uSize: { value: SIZE },
    uTime: { value: 0 },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorld;
    varying vec4 vClip;
    void main(){
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorld = wp.xyz;
      vClip = projectionMatrix * viewMatrix * wp;
      gl_Position = vClip;
    }`,
  fragmentShader: `
    precision highp float;
    varying vec2 vUv;
    varying vec3 vWorld;
    varying vec4 vClip;
    uniform sampler2D uHeight;
    uniform sampler2D uScene;
    uniform vec2 uTexel;
    uniform vec3 uSun;
    uniform vec3 uCam;
    uniform float uSize;
    uniform float uTime;
    ${skyFns}
    float h(vec2 uv){ return texture2D(uHeight, uv).r; }
    void main(){
      vec2 suv = (vClip.xy / vClip.w) * 0.5 + 0.5;
      // one world-based mapping shared by the surface, the floor caustics and
      // every ripple source — so a drop, its rings and its light always agree
      vec2 sUv = vWorld.xz / uSize + 0.5;
      float hC = h(sUv);
      float hX = h(sUv + vec2(uTexel.x, 0.0)) - h(sUv - vec2(uTexel.x, 0.0));
      float hY = h(sUv + vec2(0.0, uTexel.y)) - h(sUv - vec2(0.0, uTexel.y));
      float mw = sin((sUv.x * 21.0) + uTime * 1.0) * sin((sUv.y * 18.0) - uTime * 0.8) * 0.0014
               + sin((sUv.x * 9.0) - uTime * 0.55) * sin((sUv.y * 12.0) + uTime * 0.45) * 0.0022;
      vec3 n = normalize(vec3(-(hX * 55.0 + mw * 16.0), 1.0, -(hY * 55.0 - mw * 13.0)));
      vec3 V = normalize(uCam - vWorld);

      // real refraction: distort the rendered underwater scene
      vec3 T = refract(-V, n, 1.0 / 1.333);
      vec3 Tv = mat3(viewMatrix) * T;
      vec3 Vv = mat3(viewMatrix) * (-V);
      vec2 off = (Tv.xy - Vv.xy) * 0.35;
      vec3 refr = texture2D(uScene, clamp(suv + off, 0.001, 0.999)).rgb;
      // matcha-green pond water, deeper toward the middle
      float depthT = smoothstep(15.0, 4.0, length(vWorld.xz));
      refr = mix(refr, vec3(0.10, 0.17, 0.12), 0.30 + depthT * 0.12);

      vec3 R = reflect(-V, n);
      R.y = abs(R.y);
      vec3 refl = mix(skyColor(R, uSun), vec3(0.16, 0.23, 0.17), 0.75);
      float fres = mix(0.05, 1.0, pow(1.0 - max(dot(n, V), 0.0), 3.5));
      vec3 col = mix(refr * 1.1, refl, fres * 0.2);

      float spec = pow(max(dot(R, uSun), 0.0), 360.0);
      col += vec3(1.0, 0.95, 0.8) * spec * 1.2;

      // bold sumi-e ripple bands: bright crests, shaded troughs
      float crest = hC * 18.0;
      col += vec3(0.38, 0.44, 0.36) * smoothstep(0.12, 0.5, crest);
      col *= 1.0 - 0.22 * smoothstep(0.12, 0.55, -crest);

      gl_FragColor = vec4(col, 1.0);
    }`,
});
const water = new THREE.Mesh(new THREE.CircleGeometry(POND_R, 64), waterMat);
water.rotation.x = -Math.PI / 2;
scene.add(water);

// ---------- interaction ----------
const ray = new THREE.Raycaster();
const ndc = new THREE.Vector2();
function pondHit(clientX, clientY) {
  ndc.set((clientX / innerWidth) * 2 - 1, -(clientY / innerHeight) * 2 + 1);
  ray.setFromCamera(ndc, camera);
  return ray.intersectObject(water)[0] || null;
}
function dropAt(hit, strength, radius) {
  // world-based mapping, same as the surface/floor shaders
  queueDrop(hit.point.x / SIZE + 0.5, hit.point.z / SIZE + 0.5, strength, radius);
}
let dragging = false;
addEventListener('pointerdown', (e) => {
  dragging = true;
  const hit = pondHit(e.clientX, e.clientY);
  if (hit) {
    dropAt(hit, -0.55, 700);
    feedPoint = new THREE.Vector2(hit.point.x, hit.point.z);
    feedTimer = 5.0;
  }
});
addEventListener('pointerup', () => { dragging = false; });
addEventListener('pointermove', (e) => {
  if (dragging) return;
  const hit = pondHit(e.clientX, e.clientY);
  if (hit) dropAt(hit, -0.16, 2400);
});

let rain = false;
const bRain = document.getElementById('b-rain');
bRain.addEventListener('click', () => {
  rain = !rain;
  bRain.classList.toggle('on');
  bRain.textContent = rain ? '雨 やめる' : '雨を降らせる';
});
document.getElementById('b-calm').addEventListener('click', () => { simMat.uniforms.uClear.value = 1; });
const bTrails = document.getElementById('b-trails');
function syncTrailsButton() {
  bTrails.classList.toggle('on', trailsOn);
  bTrails.textContent = trailsOn ? '軌跡を消す' : '軌跡を見る';
}
bTrails.addEventListener('click', () => {
  trailsOn = !trailsOn;
  ensureTrails();
  for (const tr of trailLines) {
    tr.line.visible = trailsOn;
    if (!trailsOn) { tr.n = 0; tr.line.geometry.setDrawRange(0, 0); }   // start fresh next time
  }
  syncTrailsButton();
});
syncTrailsButton();

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  sceneRT.setSize(innerWidth, innerHeight);
});

// ---------- koi behaviour ----------
const tmpV2 = new THREE.Vector2();
function shortestArc(a) {
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}
// separation: koi never overlap — gentle positional push + a repulsion vector
// that feeds into the steering (the turn-rate limit keeps it from spinning)
const sepDir = new THREE.Vector2();
function separateKoi(dt) {
  let minDist = Infinity;
  for (const k of KOI) k.rep.set(0, 0);
  for (let i = 0; i < KOI.length; i++) {
    for (let j = i + 1; j < KOI.length; j++) {
      const a = KOI[i], b = KOI[j];
      sepDir.copy(b.pos).sub(a.pos);
      let d = sepDir.length();
      const minD = 1.5 * (a.s + b.s);          // personal space scales with body size
      minDist = Math.min(minDist, d / minD);
      if (d < 1e-4) { sepDir.set(Math.random() - 0.5, Math.random() - 0.5); d = sepDir.length(); }
      if (d < minD) {
        sepDir.divideScalar(d);
        const w = 1 - d / minD;
        const push = (minD - d) * Math.min(1, dt * 12) * 0.5;
        a.pos.addScaledVector(sepDir, -push);
        b.pos.addScaledVector(sepDir, push);
        a.rep.addScaledVector(sepDir, -w);
        b.rep.addScaledVector(sepDir, w);
        if (Math.abs(a.depth - b.depth) < 0.3) {
          a.targetDepth = Math.max(-1.9, Math.min(-0.5, a.targetDepth - 0.2));
          b.targetDepth = Math.max(-1.9, Math.min(-0.5, b.targetDepth + 0.2));
        }
      }
    }
  }
  window.__koiMinSep = minDist;                  // 1.0+ means no overlap (debug/verification)
}

function updateKoi(dt, t) {
  if (FREEZE) {
    for (const k of KOI) {
      const uni = k.g.userData.uni;
      uni.phase.value += dt * 5.0;
      uni.amp.value = 0.16;
      k.g.position.set(k.pos.x, k.depth, k.pos.y);
      k.g.rotation.y = -k.heading;
      k.g.userData.shadow.position.set(k.pos.x + 0.5, -DEPTH + 0.06, k.pos.y + 0.4);
      k.g.userData.shadow.rotation.z = -k.heading;
    }
    return;
  }
  if (feedTimer > 0) feedTimer -= dt;
  separateKoi(dt);
  for (const k of KOI) {
    // 1) waypoint cruising: pick a far-away spot, swim there in a long arc
    k.retarget -= dt;
    const distTarget = tmpV2.copy(k.target).sub(k.pos).length();
    if (k.retarget <= 0 || distTarget < 2.2) {
      for (let tries = 0; tries < 8; tries++) {
        const a = Math.random() * Math.PI * 2;
        const r = 3 + Math.random() * (POND_R - 7);
        k.target.set(Math.cos(a) * r, Math.sin(a) * r);
        if (k.target.distanceTo(k.pos) > 9) break;   // prefer long straights
      }
      k.retarget = 8 + Math.random() * 8;
    }

    // 2) desired direction (waypoint, or food behaviour)
    tmpV2.copy(k.target).sub(k.pos).normalize();
    let dvx = tmpV2.x, dvy = tmpV2.y;
    let speedMult = 1.0;
    if (feedTimer > 0 && feedPoint) {
      const fx = feedPoint.x - k.pos.x, fy = feedPoint.y - k.pos.y;
      const df = Math.hypot(fx, fy);
      if (df > 2.8) {
        dvx = fx / df; dvy = fy / df;
        speedMult = 1.7;
      } else {
        // hold a slow orbit on the feeding ring
        dvx = (-fy / df) * k.orbitDir + (fx / df) * 0.18;
        dvy = (fx / df) * k.orbitDir + (fy / df) * 0.18;
        speedMult = 0.5;
      }
      k.targetDepth = -0.5;
    }

    // 3) blend in separation repulsion, then steer with a fish-like turn limit
    dvx += k.rep.x * 1.6;
    dvy += k.rep.y * 1.6;
    const desired = Math.atan2(dvy, dvx);
    const maxTurn = feedTimer > 0 ? 1.1 : 0.7;      // rad/s — long bodies turn slowly
    const dh = THREE.MathUtils.clamp(shortestArc(desired - k.heading), -maxTurn * dt, maxTurn * dt);
    k.heading += dh;
    k.turn += (dh / Math.max(dt, 1e-4) - k.turn) * Math.min(1, dt * 5);

    // 4) burst & glide propulsion
    const cruise = 0.78 + 0.32 * Math.sin(t * 0.35 + k.phase * 2.0);
    const speed = k.speed * cruise * speedMult;
    k.pos.x += Math.cos(k.heading) * speed * dt;
    k.pos.y += Math.sin(k.heading) * speed * dt;

    // 5) hard containment: never leave the pond, and aim back inside
    const r = k.pos.length();
    if (r > POND_R - 2.2) {
      k.pos.multiplyScalar((POND_R - 2.2) / r);
      const a = Math.atan2(k.pos.y, k.pos.x) + (Math.random() - 0.5) * 1.6 + Math.PI;
      const tr = 2 + Math.random() * 5;
      k.target.set(Math.cos(a) * tr, Math.sin(a) * tr);
      k.retarget = 8 + Math.random() * 6;
    }

    // slow depth wandering
    k.nextDepthChange -= dt;
    if (k.nextDepthChange < 0) {
      k.nextDepthChange = 3 + Math.random() * 5;
      k.targetDepth = -0.6 - Math.random() * 1.3;
    }
    k.depth += (k.targetDepth - k.depth) * Math.min(1, dt * 0.7);

    // whole-body traveling wave: faster + tighter when swimming hard
    const uni = k.g.userData.uni;
    uni.phase.value += dt * (3.2 + speed * 2.4);
    uni.amp.value = 0.10 + 0.045 * speed;
    uni.bend.value = THREE.MathUtils.clamp(-k.turn * 0.55, -0.5, 0.5);

    // pose: yaw, pitch toward depth target, bank into turns
    k.g.position.set(k.pos.x, k.depth + Math.sin(t * 0.7 + k.phase) * 0.12, k.pos.y);
    k.g.userData.shadow.position.set(k.pos.x + 0.5, -DEPTH + 0.06, k.pos.y + 0.4);
    k.g.userData.shadow.rotation.z = -k.heading;
    k.g.rotation.y = -k.heading;
    k.g.rotation.z = THREE.MathUtils.clamp((k.targetDepth - k.depth) * 0.9, -0.35, 0.35);
    k.g.rotation.x = THREE.MathUtils.clamp(-k.turn * 0.45, -0.5, 0.5);

    // pectoral fin rowing
    const [pL, pR] = k.g.userData.pects;
    const row = Math.sin(t * (2.6 + speed) + k.phase * 5.0) * 0.4;
    pL.rotation.z = 0.25 + row;
    pR.rotation.z = -0.25 - row;

    // surface kiss while feeding: small ripples where a koi mouth breaks water
    if (feedTimer > 0 && feedPoint && k.pos.distanceTo(feedPoint) < 3.4 && Math.random() < 0.06) {
      queueDrop(k.pos.x / SIZE + 0.5, k.pos.y / SIZE + 0.5, -0.18, 3200);
    }
  }
  window.__koiState = KOI.map((k) => [k.pos.x, k.pos.y, k.heading]);
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  simMat.uniforms.uDamp.value = rain ? 0.972 : 0.989;   // rain rings die young
  if (rain) {
    // rain = sparse sharp droplets, each ring blooming and fading on its own,
    // plus the occasional fat drop
    if (Math.random() < 0.25) {
      const a = Math.random() * Math.PI * 2, r = Math.sqrt(Math.random()) * (POND_R - 1) / SIZE;
      if (Math.random() < 0.07) {
        queueDrop(0.5 + Math.cos(a) * r, 0.5 + Math.sin(a) * r, -0.38, 3800);          // fat drop
      } else {
        queueDrop(0.5 + Math.cos(a) * r, 0.5 + Math.sin(a) * r, -(0.05 + Math.random() * 0.11), 9000 + Math.random() * 5000);
      }
    }
  } else if (Math.random() < 0.022) {
    // ambient sprinkles so interference rings are always alive
    const a = Math.random() * Math.PI * 2, r = Math.sqrt(Math.random()) * (POND_R - 1.5) / SIZE;
    queueDrop(0.5 + Math.cos(a) * r, 0.5 + Math.sin(a) * r, -0.2, 5200);
  }
  stepSim();
  stepSim();
  updateKoi(dt, t);
  if (trailsOn) updateTrails();
  for (const pad of pads) pad.position.y = 0.06 + Math.sin(t * 1.1 + pad.position.x) * 0.02;
  for (const b of bokeh) {
    b.position.x += Math.sin(t * 0.12 + b.userData.seed) * dt * 0.4;
    b.position.z += Math.cos(t * 0.1 + b.userData.seed * 1.7) * dt * 0.4;
    b.material.opacity = 0.10 + 0.06 * Math.sin(t * 0.5 + b.userData.seed * 3.0);
  }

  floorMat.uniforms.uHeight.value = rtA.texture;
  waterMat.uniforms.uHeight.value = rtA.texture;
  waterMat.uniforms.uTime.value = t;

  // pass 1: underwater world without the surface
  water.visible = false;
  renderer.setRenderTarget(sceneRT);
  renderer.render(scene, camera);
  renderer.setRenderTarget(null);
  // pass 2: full scene
  water.visible = true;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
