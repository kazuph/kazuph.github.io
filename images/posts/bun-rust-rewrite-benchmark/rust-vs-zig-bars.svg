<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Bun Rust rewrite benchmark speedup bars</title>
  <desc id="desc">Before RustとAfter Rustのどちらが何倍速いかを、倍率に比例した横棒で示した比較図</desc>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="40" y="54" fill="#111111" font-family="Helvetica Neue, Arial, sans-serif" font-size="30" font-weight="800">Before Rust / After Rust どちらが何倍速いか</text>
  <text x="40" y="84" fill="#52616f" font-family="Helvetica Neue, Arial, sans-serif" font-size="16">中央が1.0x。左はBefore Rustが速いケース、右はAfter Rustが速いケース。棒の長さは倍率に比例。</text>

  <line x1="560" y1="112" x2="560" y2="700" stroke="#111111" stroke-width="2"/>
  <text x="540" y="106" fill="#111111" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700">1.0x</text>
  <text x="250" y="122" fill="#b24a16" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700">Before Rustが速い</text>
  <text x="850" y="122" fill="#1768a6" font-family="Helvetica Neue, Arial, sans-serif" font-size="14" font-weight="700">After Rustが速い</text>
  <line x1="230" y1="132" x2="1080" y2="132" stroke="#e6edf3" stroke-width="1"/>

  <g font-family="Helvetica Neue, Arial, sans-serif" font-size="15">
    <g transform="translate(0 152)">
      <text x="40" y="14" fill="#111111" font-weight="700">hash-loop</text>
      <rect x="560" y="0" width="520" height="18" fill="#1677b9"/><text x="1094" y="14" fill="#111111" font-weight="700">4.1x</text>
    </g>
    <g transform="translate(0 186)">
      <text x="40" y="14" fill="#111111" font-weight="700">bundle-big-ts</text>
      <rect x="560" y="0" width="299" height="18" fill="#1677b9"/><text x="873" y="14" fill="#111111" font-weight="700">2.8x</text>
    </g>
    <g transform="translate(0 220)">
      <text x="40" y="14" fill="#111111" font-weight="700">transpiler-loop</text>
      <rect x="560" y="0" width="260" height="18" fill="#1677b9"/><text x="834" y="14" fill="#111111" font-weight="700">2.5x</text>
    </g>
    <g transform="translate(0 254)">
      <text x="40" y="14" fill="#111111">run-big-tsx</text>
      <rect x="560" y="0" width="78" height="18" fill="#2d8ac7"/><text x="652" y="14" fill="#111111">1.6x</text>
    </g>
    <g transform="translate(0 288)">
      <text x="40" y="14" fill="#111111">run-big-ts</text>
      <rect x="560" y="0" width="52" height="18" fill="#2d8ac7"/><text x="626" y="14" fill="#111111">1.4x</text>
    </g>
    <g transform="translate(0 322)">
      <text x="40" y="14" fill="#111111">bundle-big-tsx</text>
      <rect x="560" y="0" width="47" height="18" fill="#2d8ac7"/><text x="621" y="14" fill="#111111">1.36x</text>
    </g>
    <g transform="translate(0 356)">
      <text x="40" y="14" fill="#111111">bundle-many-modules</text>
      <rect x="560" y="0" width="44" height="18" fill="#2d8ac7"/><text x="618" y="14" fill="#111111">1.34x</text>
    </g>
    <g transform="translate(0 390)">
      <text x="40" y="14" fill="#111111">build-api-loop</text>
      <rect x="560" y="0" width="18" height="18" fill="#63a9d4"/><text x="592" y="14" fill="#111111">1.14x</text>
    </g>
    <g transform="translate(0 424)">
      <text x="40" y="14" fill="#111111">version</text>
      <rect x="560" y="0" width="13" height="18" fill="#8cc0dc"/><text x="587" y="14" fill="#111111">1.10x</text>
    </g>
    <g transform="translate(0 458)">
      <text x="40" y="14" fill="#111111">glob-loop</text>
      <rect x="560" y="0" width="4" height="18" fill="#b8d3df"/><text x="578" y="14" fill="#111111">1.03x</text>
    </g>
    <g transform="translate(0 492)">
      <text x="40" y="14" fill="#111111">run-many-modules</text>
      <rect x="560" y="0" width="3" height="18" fill="#b8d3df"/><text x="577" y="14" fill="#111111">1.02x</text>
    </g>
    <g transform="translate(0 526)">
      <text x="40" y="14" fill="#111111">file-read-loop</text>
      <rect x="559" y="0" width="1" height="18" fill="#d49a6a"/><text x="501" y="14" fill="#111111">1.01x</text>
    </g>
    <g transform="translate(0 560)">
      <text x="40" y="14" fill="#111111">package-scripts</text>
      <rect x="557" y="0" width="3" height="18" fill="#d49a6a"/><text x="495" y="14" fill="#111111">1.027x</text>
    </g>
    <g transform="translate(0 594)">
      <text x="40" y="14" fill="#111111">eval-arithmetic</text>
      <rect x="526" y="0" width="34" height="18" fill="#cf6f32"/><text x="454" y="14" fill="#111111">1.261x</text>
    </g>
    <g transform="translate(0 628)">
      <text x="40" y="14" fill="#111111" font-weight="700">test-runner-400</text>
      <rect x="504" y="0" width="56" height="18" fill="#c95829"/><text x="425" y="14" fill="#111111" font-weight="700">1.428x</text>
    </g>
    <g transform="translate(0 662)">
      <text x="40" y="14" fill="#111111" font-weight="700">json-parse</text>
      <rect x="466" y="0" width="94" height="18" fill="#b94124"/><text x="386" y="14" fill="#111111" font-weight="700">1.725x</text>
    </g>
  </g>
</svg>
